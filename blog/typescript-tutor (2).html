<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TypeScript Tutor — Phase 1 &amp; 2</title>
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: rgb(17, 17, 17);
    --bg2: rgb(28, 28, 28);
    --bg3: rgb(8, 8, 8);
    --border: rgba(235, 236, 243, 0.1);
    --border2: rgba(190, 99, 249, 0.2);
    --text: rgb(235, 236, 243);
    --text2: rgba(235, 236, 243, 0.75);
    --text3: rgba(235, 236, 243, 0.45);
    --blue: #be63f9;
    --blue-bg: rgba(190, 99, 249, 0.08);
    --green: #4ade90;
    --green-bg: rgba(74, 222, 144, 0.08);
    --amber: #fbbf24;
    --amber-bg: rgba(251, 191, 36, 0.08);
    --red: #f87171;
    --red-bg: rgba(248, 113, 113, 0.08);
    --purple: #be63f9;
    --purple-bg: rgba(190, 99, 249, 0.08);
    --mono: 'JetBrains Mono', monospace;
    --serif: 'Ubuntu', sans-serif;
    --sans: 'Ubuntu', sans-serif;
    --radius: 12px;
    --glow: 0 0 24px rgba(190, 99, 249, 0.12);
  }

  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 15px; line-height: 1.6; min-height: 100vh; overflow-x: hidden; }

  /* ── SIDEBAR ── */
  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0; width: 240px;
    background: var(--bg2); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; z-index: 100; padding: 28px 0 20px;
  }
  .sidebar-logo { padding: 0 24px 24px; border-bottom: 1px solid var(--border); }
  .sidebar-logo .badge { font-family: var(--mono); font-size: 10px; color: var(--blue); background: var(--blue-bg); border: 1px solid rgba(190, 99, 249, 0.2); padding: 2px 8px; border-radius: 4px; display: inline-block; margin-bottom: 8px; }
  .sidebar-logo h1 { font-family: var(--sans); font-size: 24px; font-weight: 900; color: var(--text); letter-spacing: -0.5px; text-transform: uppercase; }
  .sidebar-logo h1 span { color: var(--blue); }
  .sidebar-logo p { font-size: 11px; color: var(--text3); margin-top: 4px; letter-spacing: 0.05em; text-transform: uppercase; font-family: var(--sans); }
  .nav { flex: 1; overflow-y: auto; padding: 16px 0; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 24px; cursor: pointer; transition: all .2s; border-left: 2px solid transparent; color: var(--text2); font-size: 13px; }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active { background: var(--blue-bg); color: var(--blue); border-left-color: var(--blue); }
  .nav-num { font-family: var(--mono); font-size: 10px; color: var(--text3); width: 16px; flex-shrink: 0; }
  .nav-item.active .nav-num { color: var(--blue); }
  .nav-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border2); flex-shrink: 0; }
  .nav-item.active .nav-dot { background: var(--blue); }
  .nav-item.done .nav-dot { background: var(--green); }
  .sidebar-progress { padding: 16px 24px; border-top: 1px solid var(--border); }
  .progress-label { font-size: 11px; color: var(--text3); margin-bottom: 6px; display: flex; justify-content: space-between; }
  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--purple)); border-radius: 2px; transition: width .5s ease; }

  /* ── MAIN ── */
  .main { margin-left: 240px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  .topic-page { display: none; padding: 48px 52px; max-width: 1000px; width: 100%; box-sizing: border-box; }
  .topic-page.active { display: block; animation: fadeIn .35s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  /* ── HERO ── */
  .topic-hero { margin-bottom: 36px; }
  .topic-tag { font-family: var(--mono); font-size: 11px; color: var(--text3); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .topic-tag::before { content:''; display:inline-block; width:24px; height:1px; background:var(--border2); }
  .topic-title { font-family: var(--serif); font-size: 34px; font-weight: 700; line-height: 1.15; letter-spacing: -.5px; color: var(--text); margin-bottom: 12px; }
  .topic-title span { color: var(--blue); font-style: italic; }
  .topic-desc { font-size: 15px; color: var(--text2); line-height: 1.7; max-width: 640px; }

  /* ── CARDS ── */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; margin-bottom: 16px; }
  .card-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .card-body { font-size: 13px; color: var(--text2); line-height: 1.75; }
  .card.highlight { border-color: rgba(190, 99, 249, 0.3); background: var(--blue-bg); }
  .card.warn { border-color: rgba(251,191,36,.25); background: var(--amber-bg); }
  .card.success { border-color: rgba(74,222,144,.25); background: var(--green-bg); }
  .card.danger { border-color: rgba(248,113,113,.25); background: var(--red-bg); }

  /* ── CODE ── */
  .code-block { background: #0c0c0c; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin: 12px 0; }
  .code-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 14px; background: var(--bg2); border-bottom: 1px solid var(--border); }
  .code-lang { font-family: var(--mono); font-size: 10px; color: var(--text3); }
  .code-dots { display: flex; gap: 5px; }
  .code-dots span { width: 8px; height: 8px; border-radius: 50%; }
  .code-dots span:nth-child(1) { background: #ff5f57; }
  .code-dots span:nth-child(2) { background: #febc2e; }
  .code-dots span:nth-child(3) { background: #28c840; }
  pre { padding: 16px 18px; font-family: var(--mono); font-size: 12.5px; line-height: 1.9; overflow-x: auto; }
  .kw  { color: #d6a6ff; }
  .str { color: #7ee8a2; }
  .cmt { color: #6a737d; }
  .err { color: #f87171; }
  .typ { color: #fbbf24; }
  .ok  { color: #4ade90; }
  .num { color: #fb923c; }

  /* ── TABS ── */
  .tab-bar { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; border-bottom: 1px solid var(--border); padding-bottom: 0; }
  .tab-btn { font-family: var(--mono); font-size: 12px; padding: 8px 16px; cursor: pointer; color: var(--text3); border-bottom: 2px solid transparent; transition: all .2s; background: none; border-top: none; border-left: none; border-right: none; margin-bottom: -1px; }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }
  .tab-pane { display: none; animation: fadeIn .2s ease; }
  .tab-pane.active { display: block; }

  /* ── GRID ── */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 14px 0; }
  .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin: 14px 0; }
  .col-label { font-family: var(--mono); font-size: 10px; color: var(--text3); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .05em; }

  /* ── PILLS / TAGS ── */
  .pill { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 4px; font-family: var(--mono); }
  .pill-blue   { background: var(--blue-bg);   color: var(--blue);   border: 1px solid rgba(190, 99, 249, 0.2); }
  .pill-green  { background: var(--green-bg);  color: var(--green);  border: 1px solid rgba(74,222,144, 0.2); }
  .pill-amber  { background: var(--amber-bg);  color: var(--amber);  border: 1px solid rgba(251,191,36, 0.2); }
  .pill-red    { background: var(--red-bg);    color: var(--red);    border: 1px solid rgba(248,113,113, 0.2); }
  .pill-purple { background: var(--purple-bg); color: var(--purple); border: 1px solid rgba(190, 99, 249, 0.2); }

  /* ── SECTIONS ── */
  .section-label { font-family: var(--mono); font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; margin: 24px 0 10px; display: flex; align-items: center; gap: 10px; }
  .section-label::after { content:''; flex:1; height:1px; background:var(--border); }

  /* ── NAVIGATION ── */
  .topic-nav { display: flex; align-items: center; justify-content: space-between; margin-top: 40px; padding-top: 24px; border-top: 1px solid var(--border); }
  .nav-btn { display: flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 8px; font-size: 13px; cursor: pointer; transition: all .2s; border: 1px solid var(--border); background: var(--bg2); color: var(--text2); font-family: var(--sans); }
  .nav-btn:hover { border-color: var(--blue); color: var(--blue); }
  .nav-btn.primary { background: var(--blue); color: #080808; font-weight: 600; border-color: var(--blue); }
  .nav-btn.primary:hover { background: #d6a6ff; border-color: #d6a6ff; }
  .nav-btn:disabled { opacity: .3; cursor: not-allowed; }
  .nav-btn:disabled:hover { border-color: var(--border); color: var(--text2); }

  /* ── SPECTRUM / DIAGRAM ── */
  .spectrum { display: flex; flex-direction: column; gap: 8px; margin: 16px 0; }
  .spectrum-row { display: flex; align-items: center; gap: 12px; }
  .spectrum-label { font-family: var(--mono); font-size: 12px; font-weight: 600; width: 80px; flex-shrink: 0; }
  .spectrum-bar { flex: 1; border-radius: 6px; padding: 10px 14px; font-size: 12px; color: var(--text2); border: 1px solid transparent; }
  .spectrum-tag { font-size: 10px; font-weight: 500; margin-left: auto; padding: 2px 7px; border-radius: 4px; flex-shrink: 0; }

  /* ── INFER TABLE ── */
  .infer-table { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 12px; margin: 12px 0; }
  .infer-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
  .infer-table td:first-child { color: var(--text2); }
  .infer-table td:nth-child(2) { color: var(--text3); text-align: center; font-size: 16px; }
  .infer-table td:nth-child(3) { color: var(--amber); }
  .infer-table tr:last-child td { border-bottom: none; }
  .infer-table tr:hover td { background: var(--bg3); }

  /* ── PIPELINE ── */
  .pipeline { display: flex; align-items: center; gap: 0; margin: 16px 0; }
  .pipe-node { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 14px; text-align: center; }
  .pipe-node .pipe-label { font-family: var(--mono); font-size: 11px; color: var(--blue); font-weight: 600; margin-bottom: 4px; }
  .pipe-node .pipe-sub { font-size: 11px; color: var(--text3); }
  .pipe-arrow { color: var(--text3); font-size: 18px; padding: 0 8px; flex-shrink: 0; }

  /* ── QUIZ ── */
  .quiz-q { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 14px; }
  .quiz-q p { font-size: 14px; color: var(--text); margin-bottom: 12px; font-weight: 500; }
  .quiz-opts { display: flex; flex-direction: column; gap: 8px; }
  .quiz-opt { padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--text2); transition: all .2s; background: var(--bg3); font-family: var(--sans); text-align: left; }
  .quiz-opt:hover:not(:disabled) { border-color: var(--blue); color: var(--text); }
  .quiz-opt.correct { border-color: var(--green); background: var(--green-bg); color: var(--green); }
  .quiz-opt.wrong { border-color: var(--red); background: var(--red-bg); color: var(--red); }
  .quiz-feedback { margin-top: 10px; font-size: 12px; padding: 8px 12px; border-radius: 6px; display: none; }
  .quiz-feedback.show { display: block; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .main { margin-left: 0; }
    .topic-page { padding: 24px 20px; }
    .two-col, .three-col { grid-template-columns: 1fr; }
  }

  /* ── MISC ── */
  .divider { height: 1px; background: var(--border); margin: 24px 0; }
  .text-mono { font-family: var(--mono); }
  a { color: var(--blue); text-decoration: none; }
  strong { color: var(--text); font-weight: 500; }
  code { font-family: var(--mono); font-size: 12px; background: var(--bg3); border: 1px solid var(--border); padding: 1px 6px; border-radius: 4px; color: var(--amber); }
</style>
</head>
<body>

<!-- ══ SIDEBAR ══ -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="badge">tsc --strict</div>
    <a href="/"><h1>TS<span>.</span></h1></a>
    <p>Interactive Tutor</p>
  </div>
  <nav class="nav" id="nav"></nav>
  <div class="sidebar-progress">
    <div class="progress-label">
      <span>Progress</span>
      <span id="prog-text">0 / 5</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
</aside>

<!-- ══ MAIN CONTENT ══ -->
<main class="main" id="main"></main>

<script>
/* ══════════════════════════════════════════════
   DATA
══════════════════════════════════════════════ */
const topics = [
  /* ─── TOPIC 1 ─── */
  {
    num: "01", tag: "Why TypeScript", title: "Why TypeScript <span>exists</span>",
    desc: "JavaScript was built for small scripts. TypeScript was built for teams. Here's the exact problem it solves and why it matters.",
    content: `
      <div class="card highlight">
        <div class="card-title">💡 The Core Thesis</div>
        <div class="card-body">JavaScript decides what a value <em>is</em> at <strong>runtime</strong> — when code runs. TypeScript decides what a value <em>must be</em> at <strong>compile time</strong> — before a single line executes. This shift is the entire thesis of TypeScript.</div>
      </div>

      <div class="section-label">The problem in plain JavaScript</div>
      <div class="two-col">
        <div>
          <div class="col-label">JavaScript — error at runtime</div>
          <div class="code-block">
            <div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript</span></div>
            <pre><span class="kw">function</span> greet(user) {
  <span class="kw">return</span> <span class="str">"Hello, "</span> + user.name.toUpperCase();
}

<span class="cmt">// Months later, in production:</span>
greet(<span class="kw">undefined</span>);
<span class="err">// TypeError: Cannot read properties
// of undefined — user sees a crash</span></pre>
          </div>
        </div>
        <div>
          <div class="col-label">TypeScript — error in your editor</div>
          <div class="code-block">
            <div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
            <pre><span class="kw">function</span> greet(user: { name: <span class="typ">string</span> }) {
  <span class="kw">return</span> <span class="str">"Hello, "</span> + user.name.toUpperCase();
}

<span class="cmt">// Before you even save the file:</span>
greet(<span class="err">undefined</span>);
<span class="err">// TS2345: Argument of type 'undefined'
// is not assignable to parameter</span></pre>
          </div>
        </div>
      </div>

      <div class="section-label">Cost of finding a bug</div>
      <div class="three-col">
        <div class="card success">
          <div class="card-title"><span class="pill pill-green">compile time</span></div>
          <div class="card-body" style="font-size:22px;font-family:var(--mono);color:var(--green);margin:4px 0;">~0s</div>
          <div class="card-body">Caught instantly in your editor</div>
        </div>
        <div class="card warn">
          <div class="card-title"><span class="pill pill-amber">during tests</span></div>
          <div class="card-body" style="font-size:22px;font-family:var(--mono);color:var(--amber);margin:4px 0;">mins–hrs</div>
          <div class="card-body">Found during test runs, needs a fix</div>
        </div>
        <div class="card danger">
          <div class="card-title"><span class="pill pill-red">in production</span></div>
          <div class="card-body" style="font-size:22px;font-family:var(--mono);color:var(--red);margin:4px 0;">hrs–days</div>
          <div class="card-body">Users hit the bug, hotfix, deploy</div>
        </div>
      </div>

      <div class="section-label">The compilation pipeline</div>
      <div class="pipeline">
        <div class="pipe-node"><div class="pipe-label">your-code.ts</div><div class="pipe-sub">TypeScript source</div></div>
        <div class="pipe-arrow">→</div>
        <div class="pipe-node" style="border-color:rgba(107,140,255,.3);"><div class="pipe-label" style="color:var(--purple);">tsc compiler</div><div class="pipe-sub">Type-check → strip types</div></div>
        <div class="pipe-arrow">→</div>
        <div class="pipe-node"><div class="pipe-label" style="color:var(--green);">output.js</div><div class="pipe-sub">Plain JavaScript</div></div>
      </div>
      <div class="card-body" style="font-size:12px;color:var(--text3);margin-top:6px;">Errors are reported at the compiler stage. The output <code>.js</code> is identical to hand-written JavaScript — zero runtime overhead.</div>

      <div class="section-label">What TypeScript actually is</div>
      <div class="three-col">
        <div class="card">
          <div class="card-title">✓ A superset of JS</div>
          <div class="card-body" style="font-size:12px;">All valid JS is valid TS. You add types on top — nothing is removed.</div>
        </div>
        <div class="card">
          <div class="card-title">✓ A compiler, not a runtime</div>
          <div class="card-body" style="font-size:12px;">TS compiles away to plain JS. Browsers and Node never see types.</div>
        </div>
        <div class="card">
          <div class="card-title">✓ A documentation layer</div>
          <div class="card-body" style="font-size:12px;">Types tell you and your team what every function expects and returns.</div>
        </div>
      </div>`
  },

  /* ─── TOPIC 2 ─── */
  {
    num: "02", tag: "Setup", title: "Installing & <span>setting up</span> TypeScript",
    desc: "A step-by-step walkthrough of creating a TypeScript + Node.js project from scratch, with every command explained.",
    content: `
      <div id="setup-tabs">
        <div class="tab-bar">
          <button class="tab-btn active" onclick="switchTab('setup','prereq')">Prerequisites</button>
          <button class="tab-btn" onclick="switchTab('setup','init')">Init project</button>
          <button class="tab-btn" onclick="switchTab('setup','install')">Install TS</button>
          <button class="tab-btn" onclick="switchTab('setup','tsconfig')">tsconfig.json</button>
          <button class="tab-btn" onclick="switchTab('setup','firstfile')">First .ts file</button>
          <button class="tab-btn" onclick="switchTab('setup','compile')">Compile & run</button>
          <button class="tab-btn" onclick="switchTab('setup','structure')">Project structure</button>
        </div>

        <div class="tab-pane active" id="setup-prereq">
          <div class="card highlight"><div class="card-title">Check Node.js is installed (need v16+)</div></div>
          <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">bash</span></div><pre>node --version    <span class="cmt"># Should output v16+ (v20 LTS recommended)</span>
npm --version     <span class="cmt"># Should output 8+</span>
<span class="ok">v20.11.0
10.2.4</span></pre></div>
          <div class="card-body" style="font-size:13px;color:var(--text2);">If Node isn\'t installed, get it at <a href="https://nodejs.org" target="_blank">nodejs.org</a>. TypeScript is installed via npm — it\'s just a package.</div>
        </div>

        <div class="tab-pane" id="setup-init">
          <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">bash</span></div><pre><span class="cmt"># Create a folder and enter it</span>
mkdir my-ts-project
cd my-ts-project

<span class="cmt"># Initialise npm — creates package.json</span>
npm init -y</pre></div>
          <div class="card warn"><div class="card-body">The <code>-y</code> flag accepts all defaults. You can edit <code>package.json</code> manually later.</div></div>
        </div>

        <div class="tab-pane" id="setup-install">
          <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">bash</span></div><pre><span class="cmt"># Install TypeScript as a dev dependency</span>
npm install --save-dev typescript

<span class="cmt"># Install Node type definitions</span>
npm install --save-dev @types/node

<span class="cmt"># Verify</span>
npx tsc --version
<span class="ok">Version 5.4.5</span></pre></div>
          <div class="card highlight"><div class="card-title">Why <code>--save-dev</code>?</div><div class="card-body">TypeScript is a build tool, not a runtime dependency. It should never end up in your production bundle. <code>@types/node</code> gives TS knowledge of Node APIs like <code>fs</code>, <code>path</code>, <code>process</code>.</div></div>
        </div>

        <div class="tab-pane" id="setup-tsconfig">
          <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">bash</span></div><pre>npx tsc --init    <span class="cmt"># Generates tsconfig.json</span></pre></div>
          <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">json</span></div><pre>{
  <span class="str">"compilerOptions"</span>: {
    <span class="str">"target"</span>:         <span class="str">"ES2022"</span>,    <span class="cmt">// output JS version</span>
    <span class="str">"module"</span>:         <span class="str">"commonjs"</span>, <span class="cmt">// Node uses require()</span>

        <button class="tab-btn" onclick="switchTab('infer','contextual')">contextual</button>
        <button class="tab-btn" onclick="switchTab('infer','generic')">generic</button>
        <button class="tab-btn" onclick="switchTab('infer','when')">when to annotate</button>
      </div>

      <div class="tab-pane active" id="infer-variable">
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div><pre><span class="cmt">// You write this (no annotations):</span>
<span class="kw">const</span> age    = 25;
<span class="kw">const</span> name   = <span class="str">"Priya"</span>;
<span class="kw">const</span> active = <span class="kw">true</span>;
<span class="kw">const</span> scores = [95, 87, 100];
<span class="kw">const</span> user   = { name: <span class="str">"Priya"</span>, age: 25 };</pre></div>
        <div class="card-body" style="font-size:13px;color:var(--text2);margin:10px 0;">TypeScript infers:</div>
        <table class="infer-table">
          <tr><td>const age = 25</td><td>→</td><td>number</td></tr>
          <tr><td>const name = "Priya"</td><td>→</td><td>string</td></tr>
          <tr><td>const active = true</td><td>→</td><td>boolean</td></tr>
          <tr><td>const scores = [95, 87, 100]</td><td>→</td><td>number[]</td></tr>
          <tr><td>const mixed = [1, "a"]</td><td>→</td><td>(number | string)[]</td></tr>
          <tr><td>const user = { name: "Priya", age: 25 }</td><td>→</td><td>{ name: string; age: number }</td></tr>
        </table>
        <div class="two-col" style="margin-top:14px;">
          <div>
            <div class="col-label">const — literal type (narrower)</div>
            <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div><pre><span class="kw">const</span> dir = <span class="str">"north"</span>;
<span class="cmt">// type: "north" (literal)
// not just string
// because it can never change</span></pre></div>
          </div>
          <div>
            <div class="col-label">let — widened type (broader)</div>
            <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div><pre><span class="kw">let</span> dir = <span class="str">"north"</span>;
<span class="cmt">// type: string (widened)
// because you can reassign it</span>
dir = <span class="str">"south"</span>; <span class="ok">// ✓</span></pre></div>
          </div>
        </div>
      </div>

      <div class="tab-pane" id="infer-return">
        <div class="card highlight"><div class="card-body">TypeScript infers return types by analysing all possible return paths inside the body — you annotate parameters, the return type is usually free.</div></div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div><pre><span class="kw">function</span> add(a: <span class="typ">number</span>, b: <span class="typ">number</span>) {
  <span class="kw">return</span> a + b;  <span class="cmt">// inferred: number</span>
}

<span class="kw">function</span> greet(name: <span class="typ">string</span>) {
  <span class="kw">return</span> <span class="str">\`Hello, &#36;{name}!\`</span>;  <span class="cmt">// inferred: string</span>
}

<span class="kw">function</span> firstOrNull(items: <span class="typ">string[]</span>) {
  <span class="kw">if</span> (items.length === 0) <span class="kw">return null</span>;
  <span class="kw">return</span> items[0];
  <span class="cmt">// inferred: string | null
  // (two return paths → TS unions them)</span>
}</pre></div>
        <div class="two-col">
          <div>
            <div class="col-label">Inferred — fine for private helpers</div>
            <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div><pre><span class="kw">function</span> double(n: <span class="typ">number</span>) {
  <span class="kw">return</span> n * 2; <span class="cmt">// → number</span>
}</pre></div>
          </div>
          <div>
            <div class="col-label">Explicit — better for public APIs</div>
            <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div><pre><span class="kw">export function</span> double(n: <span class="typ">number</span>): <span class="typ">number</span> {
  <span class="kw">return</span> n * 2; <span class="cmt">// contract enforced</span>
}</pre></div>
          </div>
        </div>
      </div>

      <div class="tab-pane" id="infer-contextual">
        <div class="card highlight"><div class="card-body">Contextual typing — inference flows <em>backwards</em> from how a value is used, not just forwards from assignment.</div></div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div><pre><span class="cmt">// TS knows addEventListener's callback signature
// so 'event' is inferred as MouseEvent:</span>
document.addEventListener(<span class="str">"click"</span>, (event) => {
  console.log(event.clientX); <span class="ok">// ✓ TS knows this exists</span>
  console.log(<span class="err">event.foo</span>);    <span class="cmt">// ✗ doesn\'t exist on MouseEvent</span>
});

<span class="cmt">// Array methods — context flows into the callback:</span>
<span class="kw">const</span> nums = [1, 2, 3, 4, 5];
<span class="kw">const</span> doubled = nums.map((n) => n * 2);
<span class="cmt">// n is inferred as number (from nums: number[])
// doubled is inferred as number[]</span>

<span class="cmt">// Object literal against a type:</span>
<span class="kw">type</span> Config = { port: <span class="typ">number</span>; host: <span class="typ">string</span> };
<span class="kw">const</span> cfg: Config = {
  port: 3000,
  host: <span class="str">"localhost"</span>,
  <span class="err">debug: true</span>  <span class="cmt">// ✗ not in Config — caught!</span>
};</pre></div>
        <div class="card-body" style="font-size:13px;color:var(--text2);">This is why you almost never annotate callback parameters inside <code>.map()</code>, <code>.filter()</code>, or event handlers — TypeScript already knows what they receive.</div>
      </div>

      <div class="tab-pane" id="infer-generic">
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div><pre><span class="kw">function</span> identity&lt;T&gt;(value: T): T {
  <span class="kw">return</span> value;
}

<span class="cmt">// TypeScript infers T from the argument:</span>
<span class="kw">const</span> a = identity(42);        <span class="cmt">// T → number</span>
<span class="kw">const</span> b = identity(<span class="str">"hello"</span>);  <span class="cmt">// T → string</span>
<span class="kw">const</span> c = identity([1,2,3]);   <span class="cmt">// T → number[]</span>

<span class="cmt">// Real-world: all array methods are generic</span>
<span class="kw">const</span> names = [<span class="str">"Alice"</span>, <span class="str">"Bob"</span>];
<span class="kw">const</span> lengths = names.map((n) => n.length);
<span class="cmt">// map&lt;U&gt;(fn: (v: T) => U): U[]
// T → string, U → number
// lengths: number[] — fully inferred!</span>

<span class="cmt">// Promise inference chains</span>
<span class="kw">async function</span> fetchName(): <span class="typ">Promise</span>&lt;<span class="typ">string</span>&gt; {
  <span class="kw">return</span> <span class="str">"Priya"</span>;
}
<span class="kw">const</span> name = <span class="kw">await</span> fetchName(); <span class="cmt">// name: string</span></pre></div>
        <div class="card success"><div class="card-body">Every <code>.map()</code>, <code>.filter()</code>, <code>Promise.all()</code> — they\'re all generic, and return types are fully inferred from what you pass in.</div></div>
      </div>

      <div class="tab-pane" id="infer-when">
        <div class="card highlight"><div class="card-body"><strong>Mental model:</strong> annotate at <em>boundaries</em> (function params, exported APIs); let inference handle the interior. Annotations are fences — put them at the edges of your property, not everywhere inside.</div></div>
        <div class="two-col">
          <div>
            <div class="col-label" style="color:var(--green);">✓ Always annotate these</div>
            <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div><pre><span class="cmt">// 1. Function parameters</span>
<span class="kw">function</span> fn(x: <span class="typ">number</span>, y: <span class="typ">string</span>) {}

<span class="cmt">// 2. Exported function return types</span>
<span class="kw">export function</span> parse(s: <span class="typ">string</span>): <span class="typ">number</span> {}

<span class="cmt">// 3. Empty arrays</span>
<span class="kw">const</span> items: <span class="typ">string[]</span> = [];

<span class="cmt">// 4. Variables with no initial value</span>
<span class="kw">let</span> result: <span class="typ">string</span>;
result = compute();</pre></div>
          </div>
          <div>
            <div class="col-label" style="color:var(--blue);">✓ Let TS infer these</div>
            <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div><pre><span class="cmt">// 1. Assigned primitives</span>
<span class="kw">const</span> age = 25; <span class="cmt">// → number</span>

<span class="cmt">// 2. Object/array literals with values</span>
<span class="kw">const</span> pts = [{x:1,y:2}]; <span class="cmt">// inferred</span>

<span class="cmt">// 3. Callback parameters</span>
[1,2,3].map((n) => n * 2);

<span class="cmt">// 4. Chained operations</span>
<span class="kw">const</span> upper = <span class="str">"hello"</span>
  .split(<span class="str">""</span>)
  .map(c => c.toUpperCase())
  .join(<span class="str">""</span>);</pre></div>
          </div>
        </div>
      </div>

      <div class="divider"></div>
      <div class="section-label">Test yourself</div>
      <div id="quiz"></div>`
  }

<span class="cmt">// Extend with a keyword:</span>

}

<span class="cmt">// A class can implement it:</span>
<span class="kw">class</span> <span class="typ">Manager</span> <span class="kw">implements</span> <span class="typ">Admin</span> {

  email = <span class="str">"a@co.com"</span>; role = <span class="str">"mgr"</span>;

        <div class="section-label">Industry conventions</div>
        <div class="two-col">
          <div class="card"><div class="card-title">React / Frontend</div><div class="card-body" style="font-size:12px;">Use <code>type</code> for component props and state — they often contain unions. Use <code>interface</code> for context values and patterns others implement.</div></div>
          <div class="card"><div class="card-title">Node / Backend</div><div class="card-body" style="font-size:12px;">Use <code>interface</code> for service contracts and repository patterns. Use <code>type</code> for DTOs, response shapes, and union-heavy domain types.</div></div>
