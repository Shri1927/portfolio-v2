      <!-- CLASS BASICS -->
      <div class="st-pane on" id="t13-basics">
        <div class="section-label">Anatomy of a TypeScript class</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">class</span> <span class="typ">UserService</span> {
  <span class="cmt">// Property declarations (required with strict mode)</span>
  <span class="kw">private</span> users: <span class="typ">Map</span>&lt;<span class="typ">number</span>, <span class="typ">User</span>&gt; = <span class="kw">new</span> <span class="typ">Map</span>();
  <span class="kw">private</span> nextId: <span class="typ">number</span> = <span class="num">1</span>;

  <span class="cmt">// Constructor</span>
  <span class="kw">constructor</span>(<span class="kw">private</span> <span class="kw">readonly</span> db: <span class="typ">Database</span>) {}

  <span class="cmt">// Public method — part of the public API</span>
  <span class="kw">async</span> findById(id: <span class="typ">number</span>): <span class="typ">Promise</span>&lt;<span class="typ">User</span> | <span class="kw">null</span>&gt; {
    <span class="kw">return</span> <span class="kw">this</span>.db.users.findUnique({ where: { id } });
  }

  <span class="cmt">// Private helper — internal implementation detail</span>
  <span class="kw">private</span> hashPassword(plain: <span class="typ">string</span>): <span class="typ">string</span> {
    <span class="kw">return</span> bcrypt.hashSync(plain, <span class="num">10</span>);
  }

  <span class="cmt">// Getter — computed property</span>
  <span class="kw">get</span> userCount(): <span class="typ">number</span> {
    <span class="kw">return</span> <span class="kw">this</span>.users.size;
  }
}</pre></div>

        <div class="section-label">Parameter properties — shorthand for common pattern</div>
        <div class="two-col">
          <div>
            <div class="col-label">Without parameter properties</div>
            <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
            <pre><span class="kw">class</span> <span class="typ">OrderService</span> {
  <span class="kw">private</span> db: <span class="typ">Database</span>;
  <span class="kw">private</span> mailer: <span class="typ">Mailer</span>;
  <span class="kw">private</span> logger: <span class="typ">Logger</span>;

  <span class="kw">constructor</span>(
    db: <span class="typ">Database</span>,
    mailer: <span class="typ">Mailer</span>,
    logger: <span class="typ">Logger</span>
  ) {
    <span class="kw">this</span>.db     = db;
    <span class="kw">this</span>.mailer = mailer;
    <span class="kw">this</span>.logger = logger;
  }
}</pre></div>
          </div>
          <div>
            <div class="col-label">With parameter properties &#10003;</div>
            <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
            <pre><span class="cmt">// Declare + assign in one line:</span>
<span class="kw">class</span> <span class="typ">OrderService</span> {
  <span class="kw">constructor</span>(
    <span class="kw">private</span>          db:     <span class="typ">Database</span>,
    <span class="kw">private</span>          mailer: <span class="typ">Mailer</span>,
    <span class="kw">private readonly</span> logger: <span class="typ">Logger</span>
  ) {}
  <span class="cmt">// this.db, this.mailer, this.logger
  // are all available automatically</span>
}</pre></div>
          </div>
        </div>
        <div class="card" style="border-color:rgba(74,222,144,.25);background:var(--green-bg);margin-top:10px;">
          <div class="card-title">&#10003; Parameter properties are idiomatic TypeScript</div>
          <div class="card-body">Prefix a constructor parameter with <code>public</code>, <code>private</code>, <code>protected</code>, or <code>readonly</code> and TypeScript automatically declares the property and assigns it. This is the standard pattern for injecting dependencies into a class.</div>
        </div>
      </div>

      <!-- ACCESS MODIFIERS -->
      <div class="st-pane" id="t13-modifiers">
        <div class="card hl-blue">
          <div class="card-title">Three access modifiers — what each enforces</div>
          <div class="card-body">Access modifiers are <strong>compile-time only</strong> — they produce no runtime JavaScript. The compiled output is plain JavaScript objects with no visibility enforcement. They exist purely to have TypeScript catch incorrect usage before it reaches production.</div>
        </div>

        <div class="section-label">public — default, accessible everywhere</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">class</span> <span class="typ">UserService</span> {
  <span class="kw">public</span> name: <span class="typ">string</span> = <span class="str">"UserService"</span>; <span class="cmt">// explicit (same as no modifier)</span>

  <span class="kw">public</span> findAll(): <span class="typ">Promise</span>&lt;<span class="typ">User</span>[]&gt; {
    <span class="kw">return</span> <span class="kw">this</span>.db.users.findMany();
  }
}

<span class="kw">const</span> svc = <span class="kw">new</span> <span class="typ">UserService</span>(db);
svc.findAll();  <span class="ok">// &#10003; accessible from anywhere</span>
svc.name;       <span class="ok">// &#10003; accessible from anywhere</span></pre></div>

        <div class="section-label">private — only accessible within the class</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">class</span> <span class="typ">AuthService</span> {
  <span class="kw">private</span> jwtSecret: <span class="typ">string</span>;
  <span class="kw">private</span> tokenStore: <span class="typ">Map</span>&lt;<span class="typ">string</span>, <span class="typ">string</span>&gt; = <span class="kw">new</span> <span class="typ">Map</span>();

  <span class="kw">constructor</span>(secret: <span class="typ">string</span>) {
    <span class="kw">this</span>.jwtSecret = secret;
  }

  <span class="kw">private</span> sign(payload: <span class="typ">object</span>): <span class="typ">string</span> {
    <span class="kw">return</span> jwt.sign(payload, <span class="kw">this</span>.jwtSecret);
  }

  <span class="kw">public</span> login(user: <span class="typ">User</span>): <span class="typ">string</span> {
    <span class="kw">return</span> <span class="kw">this</span>.sign({ id: user.id, role: user.role });
  }
}

<span class="kw">const</span> auth = <span class="kw">new</span> <span class="typ">AuthService</span>(<span class="str">"secret"</span>);
auth.login(user);          <span class="ok">// &#10003; public method</span>
auth.jwtSecret;            <span class="err">// &#10007; private — compile error</span>
auth.sign({ id: <span class="num">1</span> });    <span class="err">// &#10007; private — compile error</span></pre></div>

        <div class="section-label">protected — accessible in class and subclasses</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">class</span> <span class="typ">BaseRepository</span>&lt;T&gt; {
  <span class="kw">protected</span> db: <span class="typ">Database</span>;
  <span class="kw">protected</span> tableName: <span class="typ">string</span>;

  <span class="kw">constructor</span>(db: <span class="typ">Database</span>, tableName: <span class="typ">string</span>) {
    <span class="kw">this</span>.db        = db;
    <span class="kw">this</span>.tableName = tableName;
  }

  <span class="kw">protected</span> log(msg: <span class="typ">string</span>): <span class="typ">void</span> {
    console.log(<span class="str">\`[\${this.tableName}] \${msg}\`</span>);
  }
}

<span class="kw">class</span> <span class="typ">UserRepository</span> <span class="kw">extends</span> <span class="typ">BaseRepository</span>&lt;<span class="typ">User</span>&gt; {
  <span class="kw">constructor</span>(db: <span class="typ">Database</span>) {
    <span class="kw">super</span>(db, <span class="str">"users"</span>);
  }

  <span class="kw">async</span> findByEmail(email: <span class="typ">string</span>): <span class="typ">Promise</span>&lt;<span class="typ">User</span> | <span class="kw">null</span>&gt; {
    <span class="kw">this</span>.log(<span class="str">\`Finding user by email: \${email}\`</span>);
    <span class="kw">return</span> <span class="kw">this</span>.db.users.findFirst({ where: { email } });
  }
}

<span class="kw">const</span> repo = <span class="kw">new</span> <span class="typ">UserRepository</span>(db);
repo.findByEmail(<span class="str">"a@x.com"</span>); <span class="ok">// &#10003; public</span>
repo.db;                       <span class="err">// &#10007; protected — not accessible outside</span>
repo.log(<span class="str">"test"</span>);            <span class="err">// &#10007; protected — not accessible outside</span></pre></div>

        <div class="section-label">Modifier comparison</div>
        <table class="compare-table">
          <tr><th>Modifier</th><th>Same class</th><th>Subclass</th><th>Outside class</th><th>Use for</th></tr>
          <tr><td>public</td><td class="yes">&#10003;</td><td class="yes">&#10003;</td><td class="yes">&#10003;</td><td>Public API of the class</td></tr>
          <tr><td>protected</td><td class="yes">&#10003;</td><td class="yes">&#10003;</td><td class="no">&#10007;</td><td>Shared behaviour for subclasses</td></tr>
          <tr><td>private</td><td class="yes">&#10003;</td><td class="no">&#10007;</td><td class="no">&#10007;</td><td>Internal implementation details</td></tr>
          <tr><td>#field (JS)</td><td class="yes">&#10003;</td><td class="no">&#10007;</td><td class="no">&#10007;</td><td>True runtime privacy (JS feature)</td></tr>
        </table>
      </div>

      <!-- READONLY & STATIC -->
      <div class="st-pane" id="t13-readonly13">
        <div class="section-label">readonly — set once, never changed</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">class</span> <span class="typ">Config</span> {
  <span class="kw">readonly</span> appName:  <span class="typ">string</span>;
  <span class="kw">readonly</span> version:  <span class="typ">string</span>;
  <span class="kw">readonly</span> port:     <span class="typ">number</span>;

  <span class="kw">constructor</span>(config: { appName: <span class="typ">string</span>; version: <span class="typ">string</span>; port: <span class="typ">number</span> }) {
    <span class="kw">this</span>.appName = config.appName;
    <span class="kw">this</span>.version = config.version;
    <span class="kw">this</span>.port    = config.port;
    <span class="cmt">// readonly properties can ONLY be assigned in the constructor</span>
  }

  display(): <span class="typ">string</span> {
    <span class="kw">this</span>.port = <span class="err"><span class="num">9000</span></span>; <span class="err">// &#10007; Cannot assign — readonly</span>
    <span class="kw">return</span> <span class="str">\`\${this.appName} v\${this.version} on \${this.port}\`</span>;
  }
}</pre></div>

        <div class="section-label">static — belongs to the class, not instances</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">class</span> <span class="typ">Logger</span> {
  <span class="kw">private static</span> instance: <span class="typ">Logger</span>;       <span class="cmt">// singleton</span>
  <span class="kw">static readonly</span> DEFAULT_LEVEL = <span class="str">"info"</span>; <span class="cmt">// class constant</span>
  <span class="kw">private static</span> count = <span class="num">0</span>;

  <span class="kw">private constructor</span>() {}  <span class="cmt">// prevent external instantiation</span>

  <span class="kw">static</span> getInstance(): <span class="typ">Logger</span> {
    <span class="kw">if</span> (!<span class="typ">Logger</span>.instance) {
      <span class="typ">Logger</span>.instance = <span class="kw">new</span> <span class="typ">Logger</span>();
    }
    <span class="kw">return</span> <span class="typ">Logger</span>.instance;
  }

  <span class="kw">static</span> getCount(): <span class="typ">number</span> { <span class="kw">return</span> <span class="typ">Logger</span>.count; }

  log(msg: <span class="typ">string</span>): <span class="typ">void</span> {
    <span class="typ">Logger</span>.count++;
    console.log(<span class="str">\`[\${Logger.DEFAULT_LEVEL}] \${msg}\`</span>);
  }
}

<span class="kw">const</span> logger = <span class="typ">Logger</span>.getInstance(); <span class="ok">// &#10003;</span>
<span class="kw">new</span> <span class="typ">Logger</span>();                         <span class="err">// &#10007; constructor is private</span>
<span class="typ">Logger</span>.DEFAULT_LEVEL;                  <span class="ok">// &#10003; "info"</span></pre></div>
      </div>

      <!-- ABSTRACT CLASSES -->
      <div class="st-pane" id="t13-abstract">
        <div class="card hl-purple">
          <div class="card-title">Abstract classes — partial implementations that cannot be instantiated</div>
          <div class="card-body">An abstract class defines a template — some methods are fully implemented (shared behaviour), others are declared abstract (must be implemented by subclasses). Perfect for the <strong>Template Method pattern</strong> in backends: define the algorithm structure, let subclasses fill in the steps.</div>
        </div>

        <div class="section-label">Abstract base repository</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">abstract class</span> <span class="typ">BaseRepository</span>&lt;T, ID&gt; {
  <span class="kw">constructor</span>(<span class="kw">protected</span> db: <span class="typ">Database</span>) {}

  <span class="cmt">// Abstract methods — subclass MUST implement:</span>
  <span class="kw">abstract</span> findById(id: ID): <span class="typ">Promise</span>&lt;T | <span class="kw">null</span>&gt;;
  <span class="kw">abstract</span> findAll(): <span class="typ">Promise</span>&lt;T[]&gt;;
  <span class="kw">abstract</span> create(data: <span class="typ">Omit</span>&lt;T, <span class="str">"id"</span>&gt;): <span class="typ">Promise</span>&lt;T&gt;;
  <span class="kw">abstract</span> update(id: ID, data: <span class="typ">Partial</span>&lt;T&gt;): <span class="typ">Promise</span>&lt;T&gt;;
  <span class="kw">abstract</span> delete(id: ID): <span class="typ">Promise</span>&lt;<span class="typ">void</span>&gt;;

  <span class="cmt">// Concrete methods — shared by all subclasses:</span>
  <span class="kw">async</span> findOrFail(id: ID): <span class="typ">Promise</span>&lt;T&gt; {
    <span class="kw">const</span> entity = <span class="kw">await this</span>.findById(id);
    <span class="kw">if</span> (!entity) <span class="kw">throw new</span> Error(<span class="str">\`Entity \${id} not found\`</span>);
    <span class="kw">return</span> entity;
  }

  <span class="kw">async</span> exists(id: ID): <span class="typ">Promise</span>&lt;<span class="typ">boolean</span>&gt; {
    <span class="kw">return</span> (<span class="kw">await this</span>.findById(id)) !== <span class="kw">null</span>;
  }
}

<span class="cmt">// Concrete implementation — must implement all abstract methods:</span>
<span class="kw">class</span> <span class="typ">UserRepository</span> <span class="kw">extends</span> <span class="typ">BaseRepository</span>&lt;<span class="typ">User</span>, <span class="typ">number</span>&gt; {
  <span class="kw">async</span> findById(id: <span class="typ">number</span>): <span class="typ">Promise</span>&lt;<span class="typ">User</span> | <span class="kw">null</span>&gt; {
    <span class="kw">return</span> <span class="kw">this</span>.db.users.findUnique({ where: { id } });
  }
  <span class="kw">async</span> findAll(): <span class="typ">Promise</span>&lt;<span class="typ">User</span>[]&gt; { <span class="kw">return</span> <span class="kw">this</span>.db.users.findMany(); }
  <span class="kw">async</span> create(data: <span class="typ">Omit</span>&lt;<span class="typ">User</span>, <span class="str">"id"</span>&gt;): <span class="typ">Promise</span>&lt;<span class="typ">User</span>&gt; {
    <span class="kw">return</span> <span class="kw">this</span>.db.users.create({ data });
  }
  <span class="kw">async</span> update(id: <span class="typ">number</span>, data: <span class="typ">Partial</span>&lt;<span class="typ">User</span>&gt;): <span class="typ">Promise</span>&lt;<span class="typ">User</span>&gt; {
    <span class="kw">return</span> <span class="kw">this</span>.db.users.update({ where: { id }, data });
  }
  <span class="kw">async</span> delete(id: <span class="typ">number</span>): <span class="typ">Promise</span>&lt;<span class="typ">void</span>&gt; {
    <span class="kw">await</span> <span class="kw">this</span>.db.users.delete({ where: { id } });
  }
}

<span class="kw">new</span> <span class="typ">BaseRepository</span>(db); <span class="err">// &#10007; Cannot instantiate abstract class</span>
<span class="kw">new</span> <span class="typ">UserRepository</span>(db); <span class="ok">// &#10003; concrete class</span></pre></div>
      </div>

      <!-- IMPLEMENTS -->
      <div class="st-pane" id="t13-implements">
        <div class="card hl-blue">
          <div class="card-title">implements — class contract with an interface</div>
          <div class="card-body"><code>implements</code> forces a class to provide every method and property declared in an interface. Unlike <code>extends</code> (which inherits), <code>implements</code> only enforces shape — the class provides its own implementation. One class can implement multiple interfaces.</div>
        </div>

        <div class="section-label">Service interface + implementation</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="cmt">// The contract — what consumers depend on:</span>
<span class="kw">interface</span> <span class="typ">IUserService</span> {
  create(dto: <span class="typ">CreateUserDto</span>):          <span class="typ">Promise</span>&lt;<span class="typ">User</span>&gt;;
  findById(id: <span class="typ">number</span>):               <span class="typ">Promise</span>&lt;<span class="typ">User</span> | <span class="kw">null</span>&gt;;
  update(id: <span class="typ">number</span>, dto: <span class="typ">UpdateUserDto</span>): <span class="typ">Promise</span>&lt;<span class="typ">User</span>&gt;;
  delete(id: <span class="typ">number</span>):                 <span class="typ">Promise</span>&lt;<span class="typ">void</span>&gt;;
}

<span class="cmt">// Production implementation:</span>
<span class="kw">class</span> <span class="typ">UserService</span> <span class="kw">implements</span> <span class="typ">IUserService</span> {
  <span class="kw">constructor</span>(<span class="kw">private</span> repo: <span class="typ">UserRepository</span>) {}

  <span class="kw">async</span> create(dto: <span class="typ">CreateUserDto</span>): <span class="typ">Promise</span>&lt;<span class="typ">User</span>&gt; {
    <span class="kw">const</span> hashed = <span class="kw">await</span> bcrypt.hash(dto.password, <span class="num">10</span>);
    <span class="kw">return</span> <span class="kw">this</span>.repo.create({ ...dto, password: hashed });
  }
  <span class="kw">async</span> findById(id: <span class="typ">number</span>)  { <span class="kw">return</span> <span class="kw">this</span>.repo.findById(id); }
  <span class="kw">async</span> update(id, dto)       { <span class="kw">return</span> <span class="kw">this</span>.repo.update(id, dto); }
  <span class="kw">async</span> delete(id)            { <span class="kw">return</span> <span class="kw">this</span>.repo.delete(id); }
}

<span class="cmt">// Test double — same interface, different implementation:</span>
<span class="kw">class</span> <span class="typ">MockUserService</span> <span class="kw">implements</span> <span class="typ">IUserService</span> {
  <span class="kw">private</span> store: <span class="typ">User</span>[] = [];

  <span class="kw">async</span> create(dto: <span class="typ">CreateUserDto</span>): <span class="typ">Promise</span>&lt;<span class="typ">User</span>&gt; {
    <span class="kw">const</span> user = { ...dto, id: <span class="kw">this</span>.store.length + <span class="num">1</span>, createdAt: <span class="kw">new</span> <span class="typ">Date</span>() };
    <span class="kw">this</span>.store.push(user <span class="kw">as</span> <span class="typ">User</span>);
    <span class="kw">return</span> user <span class="kw">as</span> <span class="typ">User</span>;
  }
  <span class="kw">async</span> findById(id: <span class="typ">number</span>) { <span class="kw">return</span> <span class="kw">this</span>.store.find(u => u.id === id) ?? <span class="kw">null</span>; }
  <span class="kw">async</span> update(id: <span class="typ">number</span>, dto: <span class="typ">UpdateUserDto</span>) {
    <span class="kw">const</span> u = <span class="kw">this</span>.store.find(x => x.id === id)!;
    <span class="kw">return</span> Object.assign(u, dto);
  }
  <span class="kw">async</span> delete(id: <span class="typ">number</span>) { <span class="kw">this</span>.store = <span class="kw">this</span>.store.filter(u => u.id !== id); }
}</pre></div>

        <div class="card" style="border-color:rgba(74,222,144,.25);background:var(--green-bg);margin-top:10px;">
          <div class="card-title">&#10003; The key benefit — swappable implementations</div>
          <div class="card-body">Controllers depend on <code>IUserService</code>, not <code>UserService</code>. In tests, inject <code>MockUserService</code>. In production, inject <code>UserService</code>. The controller code changes zero lines. This is the heart of testable, maintainable backend architecture.</div>
        </div>
      </div>

      <!-- BACKEND PATTERNS -->
      <div class="st-pane" id="t13-patterns">
        <div class="section-label">Pattern 1 — Generic repository base class</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">interface</span> <span class="typ">IRepository</span>&lt;T, ID&gt; {
  findById(id: ID):               <span class="typ">Promise</span>&lt;T | <span class="kw">null</span>&gt;;
  findAll(opts?: <span class="typ">FindOptions</span>):   <span class="typ">Promise</span>&lt;T[]&gt;;
  create(data: <span class="typ">Partial</span>&lt;T&gt;):      <span class="typ">Promise</span>&lt;T&gt;;
  update(id: ID, data: <span class="typ">Partial</span>&lt;T&gt;): <span class="typ">Promise</span>&lt;T&gt;;
  delete(id: ID):                  <span class="typ">Promise</span>&lt;<span class="typ">void</span>&gt;;
}

<span class="kw">class</span> <span class="typ">PrismaRepository</span>&lt;T, ID&gt; <span class="kw">implements</span> <span class="typ">IRepository</span>&lt;T, ID&gt; {
  <span class="kw">constructor</span>(<span class="kw">private</span> model: <span class="typ">PrismaDelegate</span>&lt;T&gt;) {}

  findById(id: ID)              { <span class="kw">return</span> <span class="kw">this</span>.model.findUnique({ where: { id } }); }
  findAll(opts = {})            { <span class="kw">return</span> <span class="kw">this</span>.model.findMany(opts); }
  create(data: <span class="typ">Partial</span>&lt;T&gt;)     { <span class="kw">return</span> <span class="kw">this</span>.model.create({ data }); }
  update(id: ID, data: <span class="typ">Partial</span>&lt;T&gt;) { <span class="kw">return</span> <span class="kw">this</span>.model.update({ where: { id }, data }); }
  delete(id: ID)                { <span class="kw">return</span> <span class="kw">this</span>.model.delete({ where: { id } }).then(() => {}); }
}</pre></div>

        <div class="section-label">Pattern 2 — Builder pattern with a class</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">class</span> <span class="typ">QueryBuilder</span>&lt;T&gt; {
  <span class="kw">private</span> conditions: <span class="typ">Record</span>&lt;<span class="typ">string</span>, <span class="typ">unknown</span>&gt; = {};
  <span class="kw">private</span> limitVal  = <span class="num">20</span>;
  <span class="kw">private</span> offsetVal = <span class="num">0</span>;
  <span class="kw">private</span> orderVal: { field: <span class="typ">keyof</span> T; dir: <span class="str">"asc"</span> | <span class="str">"desc"</span> } | <span class="kw">null</span> = <span class="kw">null</span>;

  where(field: <span class="kw">keyof</span> T, value: <span class="typ">unknown</span>): <span class="kw">this</span> {
    <span class="kw">this</span>.conditions[field <span class="kw">as</span> <span class="typ">string</span>] = value;
    <span class="kw">return this</span>;  <span class="cmt">// returns this for chaining</span>
  }
  limit(n: <span class="typ">number</span>):                           <span class="kw">this</span> { <span class="kw">this</span>.limitVal   = n; <span class="kw">return this</span>; }
  offset(n: <span class="typ">number</span>):                          <span class="kw">this</span> { <span class="kw">this</span>.offsetVal  = n; <span class="kw">return this</span>; }
  orderBy(field: <span class="kw">keyof</span> T, dir: <span class="str">"asc"</span>|<span class="str">"desc"</span>): <span class="kw">this</span> { <span class="kw">this</span>.orderVal   = { field, dir }; <span class="kw">return this</span>; }

  build() {
    <span class="kw">return</span> { where: <span class="kw">this</span>.conditions, take: <span class="kw">this</span>.limitVal, skip: <span class="kw">this</span>.offsetVal, orderBy: <span class="kw">this</span>.orderVal };
  }
}

<span class="cmt">// Fluent, type-safe query building:</span>
<span class="kw">const</span> query = <span class="kw">new</span> <span class="typ">QueryBuilder</span>&lt;<span class="typ">User</span>&gt;()
  .where(<span class="str">"role"</span>, <span class="str">"admin"</span>)
  .orderBy(<span class="str">"createdAt"</span>, <span class="str">"desc"</span>)
  .limit(<span class="num">10</span>)
  .build();</pre></div>
      </div>

  }

  /* ══ TOPIC 14 — DEPENDENCY INJECTION BASICS ══ */
  {
    num: '14', tag: 'Dependency Injection', title: 'Dependency <em>Injection</em> Basics',
    desc: 'Dependency Injection is the practice of passing what a class needs rather than having it create those things itself. TypeScript makes DI elegant — interfaces define contracts, classes depend on abstractions, and the composition root wires everything together.',
    content: `
      <div class="card hl-purple">
        <div class="card-title">&#128161; The core idea in one sentence</div>
        <div class="card-body">Instead of a class <em>creating</em> its dependencies (<code>new Database()</code>), you <em>pass</em> them in through the constructor. The class only knows the <strong>interface</strong> — not the concrete implementation. This makes every class independently testable and swappable.</div>
      </div>

      <div class="st-bar">
        <button class="st-btn on" onclick="stTab('t14','problem')">the problem</button>
        <button class="st-btn"    onclick="stTab('t14','manual')">manual DI</button>
        <button class="st-btn"    onclick="stTab('t14','interfaces14')">DI with interfaces</button>
        <button class="st-btn"    onclick="stTab('t14','container')">DI container</button>
        <button class="st-btn"    onclick="stTab('t14','testing')">testing with DI</button>
        <button class="st-btn"    onclick="stTab('t14','patterns14')">real patterns</button>
        <button class="st-btn"    onclick="stTab('t14','quiz14')">quiz</button>
      </div>

      <!-- THE PROBLEM -->
      <div class="st-pane on" id="t14-problem">
        <div class="section-label">Without DI — tight coupling, impossible to test</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="cmt">// &#10060; Tightly coupled — hard to test, hard to swap</span>
<span class="kw">class</span> <span class="typ">UserService</span> {
  <span class="kw">private</span> db   = <span class="kw">new</span> <span class="typ">PostgresDatabase</span>(); <span class="cmt">// hardcoded!</span>
  <span class="kw">private</span> mail = <span class="kw">new</span> <span class="typ">SendGridMailer</span>();    <span class="cmt">// hardcoded!</span>
  <span class="kw">private</span> log  = <span class="kw">new</span> <span class="typ">WinstonLogger</span>();    <span class="cmt">// hardcoded!</span>

  <span class="kw">async</span> create(dto: <span class="typ">CreateUserDto</span>): <span class="typ">Promise</span>&lt;<span class="typ">User</span>&gt; {
    <span class="kw">const</span> user = <span class="kw">await</span> <span class="kw">this</span>.db.insert(dto);
    <span class="kw">await</span> <span class="kw">this</span>.mail.send(dto.email, <span class="str">"Welcome!"</span>);
    <span class="kw">this</span>.log.info(<span class="str">\`Created user \${user.id}\`</span>);
    <span class="kw">return</span> user;
  }
}

<span class="cmt">// Problems:
// 1. To test UserService you need a real PostgresDB + SendGrid + Winston
// 2. Swapping SendGrid for SES means editing UserService source code
// 3. If PostgresDatabase constructor throws, UserService blows up on import
// 4. No way to run tests without network/db connections</span></pre></div>

        <div class="section-label">With DI — loose coupling, fully testable</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="cmt">// &#10003; Loosely coupled — dependencies injected from outside</span>
<span class="kw">class</span> <span class="typ">UserService</span> {
  <span class="kw">constructor</span>(
    <span class="kw">private</span> db:     <span class="typ">IDatabase</span>,   <span class="cmt">// interface, not class</span>
    <span class="kw">private</span> mailer: <span class="typ">IMailer</span>,    <span class="cmt">// interface, not class</span>
    <span class="kw">private</span> logger: <span class="typ">ILogger</span>     <span class="cmt">// interface, not class</span>
  ) {}

  <span class="kw">async</span> create(dto: <span class="typ">CreateUserDto</span>): <span class="typ">Promise</span>&lt;<span class="typ">User</span>&gt; {
    <span class="kw">const</span> user = <span class="kw">await</span> <span class="kw">this</span>.db.insert(dto);
    <span class="kw">await</span> <span class="kw">this</span>.mailer.send(dto.email, <span class="str">"Welcome!"</span>);
    <span class="kw">this</span>.logger.info(<span class="str">\`Created user \${user.id}\`</span>);
    <span class="kw">return</span> user;
  }
}

<span class="cmt">// Now you can inject:
// - PostgresDatabase or SQLiteDatabase or MockDatabase
// - SendGridMailer or SESMailer or NoopMailer (for tests)
// - WinstonLogger or ConsoleLogger or SilentLogger
// UserService code never changes.</span></pre></div>
      </div>

      <!-- MANUAL DI -->
      <div class="st-pane" id="t14-manual">
        <div class="card hl-blue">
          <div class="card-title">Manual DI — no framework needed</div>
          <div class="card-body">You do not need a DI framework to practice dependency injection. For small-to-medium Node.js services, manual DI in a single <strong>composition root</strong> file is simpler, more explicit, and produces zero magic. This is the approach used by many production Node.js services.</div>
        </div>

        <div class="section-label">Composition root — wire everything together once</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript — src/container.ts</span></div>
        <pre><span class="kw">import</span> { PrismaClient }       <span class="kw">from</span> <span class="str">"@prisma/client"</span>;
<span class="kw">import</span> { WinstonLogger }      <span class="kw">from</span> <span class="str">"./infra/logger"</span>;
<span class="kw">import</span> { SendGridMailer }     <span class="kw">from</span> <span class="str">"./infra/mailer"</span>;
<span class="kw">import</span> { UserRepository }     <span class="kw">from</span> <span class="str">"./repositories/user"</span>;
<span class="kw">import</span> { PostRepository }     <span class="kw">from</span> <span class="str">"./repositories/post"</span>;
<span class="kw">import</span> { UserService }        <span class="kw">from</span> <span class="str">"./services/user"</span>;
<span class="kw">import</span> { PostService }        <span class="kw">from</span> <span class="str">"./services/post"</span>;
<span class="kw">import</span> { UserController }     <span class="kw">from</span> <span class="str">"./controllers/user"</span>;

<span class="cmt">// 1. Infra — leaf nodes, no dependencies on our code</span>
<span class="kw">const</span> db     = <span class="kw">new</span> <span class="typ">PrismaClient</span>();
<span class="kw">const</span> logger = <span class="kw">new</span> <span class="typ">WinstonLogger</span>();
<span class="kw">const</span> mailer = <span class="kw">new</span> <span class="typ">SendGridMailer</span>(process.env.SENDGRID_KEY!);

<span class="cmt">// 2. Repositories — depend on infra</span>
<span class="kw">const</span> userRepo = <span class="kw">new</span> <span class="typ">UserRepository</span>(db);
<span class="kw">const</span> postRepo = <span class="kw">new</span> <span class="typ">PostRepository</span>(db);

<span class="cmt">// 3. Services — depend on repos + infra</span>
<span class="kw">const</span> userService = <span class="kw">new</span> <span class="typ">UserService</span>(userRepo, mailer, logger);
<span class="kw">const</span> postService = <span class="kw">new</span> <span class="typ">PostService</span>(postRepo, userService, logger);

<span class="cmt">// 4. Controllers — depend on services</span>
<span class="kw">export const</span> userController = <span class="kw">new</span> <span class="typ">UserController</span>(userService);

<span class="cmt">// Wire the graph once. Everything else imports from here.</span></pre></div>

        <div class="card" style="border-color:rgba(74,222,144,.25);background:var(--green-bg);margin-top:10px;">
          <div class="card-title">&#10003; The composition root is the only place that knows about concretions</div>
          <div class="card-body">Every other file in your app imports <em>interfaces</em>. Only <code>container.ts</code> imports concrete classes. This means changing PostgreSQL to a different database, or SendGrid to SES, requires editing exactly one file.</div>
        </div>
      </div>

      <!-- DI WITH INTERFACES -->
      <div class="st-pane" id="t14-interfaces14">
        <div class="section-label">Define the contracts — three infrastructure interfaces</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript — src/ports/index.ts</span></div>
        <pre><span class="cmt">// Logger contract</span>
<span class="kw">interface</span> <span class="typ">ILogger</span> {
  info(msg: <span class="typ">string</span>,  meta?: <span class="typ">Record</span>&lt;<span class="typ">string</span>, <span class="typ">unknown</span>&gt;): <span class="typ">void</span>;
  warn(msg: <span class="typ">string</span>,  meta?: <span class="typ">Record</span>&lt;<span class="typ">string</span>, <span class="typ">unknown</span>&gt;): <span class="typ">void</span>;
  error(msg: <span class="typ">string</span>, meta?: <span class="typ">Record</span>&lt;<span class="typ">string</span>, <span class="typ">unknown</span>&gt;): <span class="typ">void</span>;
}

<span class="cmt">// Mailer contract</span>
<span class="kw">interface</span> <span class="typ">IMailer</span> {
  send(to: <span class="typ">string</span>, subject: <span class="typ">string</span>, body: <span class="typ">string</span>): <span class="typ">Promise</span>&lt;<span class="typ">void</span>&gt;;
  sendTemplate(to: <span class="typ">string</span>, templateId: <span class="typ">string</span>, data: <span class="typ">Record</span>&lt;<span class="typ">string</span>, <span class="typ">unknown</span>&gt;): <span class="typ">Promise</span>&lt;<span class="typ">void</span>&gt;;
}

<span class="cmt">// Cache contract</span>
<span class="kw">interface</span> <span class="typ">ICache</span> {
  get&lt;T&gt;(key: <span class="typ">string</span>): <span class="typ">Promise</span>&lt;T | <span class="kw">null</span>&gt;;
  set&lt;T&gt;(key: <span class="typ">string</span>, value: T, ttlMs?: <span class="typ">number</span>): <span class="typ">Promise</span>&lt;<span class="typ">void</span>&gt;;
  del(key: <span class="typ">string</span>): <span class="typ">Promise</span>&lt;<span class="typ">void</span>&gt;;
}

<span class="cmt">// Repository contract</span>
<span class="kw">interface</span> <span class="typ">IUserRepository</span> {
  findById(id: <span class="typ">number</span>):                    <span class="typ">Promise</span>&lt;<span class="typ">User</span> | <span class="kw">null</span>&gt;;
  findByEmail(email: <span class="typ">string</span>):              <span class="typ">Promise</span>&lt;<span class="typ">User</span> | <span class="kw">null</span>&gt;;
  create(dto: <span class="typ">CreateUserDto</span>):              <span class="typ">Promise</span>&lt;<span class="typ">User</span>&gt;;
  update(id: <span class="typ">number</span>, dto: <span class="typ">UpdateUserDto</span>):  <span class="typ">Promise</span>&lt;<span class="typ">User</span>&gt;;
  delete(id: <span class="typ">number</span>):                       <span class="typ">Promise</span>&lt;<span class="typ">void</span>&gt;;
}</pre></div>

        <div class="section-label">Concrete implementations</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="cmt">// Production logger — wraps Winston</span>
<span class="kw">class</span> <span class="typ">WinstonLogger</span> <span class="kw">implements</span> <span class="typ">ILogger</span> {
  <span class="kw">private</span> logger = winston.createLogger({ level: <span class="str">"info"</span> });
  info(msg: <span class="typ">string</span>,  meta?: <span class="typ">Record</span>&lt;<span class="typ">string</span>, <span class="typ">unknown</span>&gt;) { <span class="kw">this</span>.logger.info(msg, meta); }
  warn(msg: <span class="typ">string</span>,  meta?: <span class="typ">Record</span>&lt;<span class="typ">string</span>, <span class="typ">unknown</span>&gt;) { <span class="kw">this</span>.logger.warn(msg, meta); }
  error(msg: <span class="typ">string</span>, meta?: <span class="typ">Record</span>&lt;<span class="typ">string</span>, <span class="typ">unknown</span>&gt;) { <span class="kw">this</span>.logger.error(msg, meta); }
}

<span class="cmt">// Test logger — silent, but captures logs for assertions</span>
<span class="kw">class</span> <span class="typ">TestLogger</span> <span class="kw">implements</span> <span class="typ">ILogger</span> {
  logs: { level: <span class="typ">string</span>; msg: <span class="typ">string</span> }[] = [];
  info(msg: <span class="typ">string</span>)  { <span class="kw">this</span>.logs.push({ level: <span class="str">"info"</span>,  msg }); }
  warn(msg: <span class="typ">string</span>)  { <span class="kw">this</span>.logs.push({ level: <span class="str">"warn"</span>,  msg }); }
  error(msg: <span class="typ">string</span>) { <span class="kw">this</span>.logs.push({ level: <span class="str">"error"</span>, msg }); }
}

<span class="cmt">// Now UserService depends on ILogger, not WinstonLogger.
// Swap implementations freely — service code never changes.</span></pre></div>
      </div>

      <!-- DI CONTAINER -->
      <div class="st-pane" id="t14-container">
        <div class="card hl-purple">
          <div class="card-title">Typed DIY container — when manual wiring gets complex</div>
          <div class="card-body">For larger applications, a simple typed container tracks singletons and resolves them lazily. You still stay in control — no decorators, no magic, no reflection. Just a typed <code>Map</code> and factory functions.</div>
        </div>

        <div class="section-label">A simple type-safe container</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">type</span> <span class="typ">Factory</span>&lt;T&gt; = () => T;

<span class="kw">class</span> <span class="typ">Container</span> {
  <span class="kw">private</span> singletons = <span class="kw">new</span> <span class="typ">Map</span>&lt;<span class="typ">string</span>, <span class="typ">unknown</span>&gt;();
  <span class="kw">private</span> factories  = <span class="kw">new</span> <span class="typ">Map</span>&lt;<span class="typ">string</span>, <span class="typ">Factory</span>&lt;<span class="typ">unknown</span>&gt;&gt;();

  <span class="cmt">// Register a factory — evaluated lazily on first resolve</span>
  register&lt;T&gt;(token: <span class="typ">string</span>, factory: <span class="typ">Factory</span>&lt;T&gt;): <span class="kw">this</span> {
    <span class="kw">this</span>.factories.set(token, factory <span class="kw">as</span> <span class="typ">Factory</span>&lt;<span class="typ">unknown</span>&gt;);
    <span class="kw">return this</span>;
  }

  <span class="cmt">// Resolve — create singleton on first call, cache after</span>
  resolve&lt;T&gt;(token: <span class="typ">string</span>): T {
    <span class="kw">if</span> (!<span class="kw">this</span>.singletons.has(token)) {
      <span class="kw">const</span> factory = <span class="kw">this</span>.factories.get(token);
      <span class="kw">if</span> (!factory) <span class="kw">throw new</span> Error(<span class="str">\`No factory registered for: \${token}\`</span>);
      <span class="kw">this</span>.singletons.set(token, factory());
    }
    <span class="kw">return this</span>.singletons.get(token) <span class="kw">as</span> T;
  }
}

<span class="cmt">// Tokens — typed string constants prevent typos</span>
<span class="kw">const</span> TOKENS = {
  Logger:         <span class="str">"ILogger"</span>,
  Mailer:         <span class="str">"IMailer"</span>,
  UserRepo:       <span class="str">"IUserRepository"</span>,
  UserService:    <span class="str">"IUserService"</span>,
  UserController: <span class="str">"UserController"</span>,
} <span class="kw">as const</span>;

<span class="cmt">// Wire the app:</span>
<span class="kw">const</span> container = <span class="kw">new</span> <span class="typ">Container</span>()
  .register(TOKENS.Logger,      () => <span class="kw">new</span> <span class="typ">WinstonLogger</span>())
  .register(TOKENS.Mailer,      () => <span class="kw">new</span> <span class="typ">SendGridMailer</span>(process.env.SG_KEY!))
  .register(TOKENS.UserRepo,    () => <span class="kw">new</span> <span class="typ">UserRepository</span>(db))
  .register(TOKENS.UserService, () => <span class="kw">new</span> <span class="typ">UserService</span>(
    container.resolve&lt;<span class="typ">IUserRepository</span>&gt;(TOKENS.UserRepo),
    container.resolve&lt;<span class="typ">IMailer</span>&gt;(TOKENS.Mailer),
    container.resolve&lt;<span class="typ">ILogger</span>&gt;(TOKENS.Logger)
  ))
  .register(TOKENS.UserController, () => <span class="kw">new</span> <span class="typ">UserController</span>(
    container.resolve&lt;<span class="typ">IUserService</span>&gt;(TOKENS.UserService)
  ));

<span class="kw">export const</span> userController =
  container.resolve&lt;<span class="typ">UserController</span>&gt;(TOKENS.UserController);</pre></div>
      </div>

      <!-- TESTING WITH DI -->
      <div class="st-pane" id="t14-testing">
        <div class="card hl-blue">
          <div class="card-title">The payoff — pure unit tests with no mocking framework</div>
          <div class="card-body">Because every dependency is injected through an interface, you can write unit tests by simply passing in fake implementations. No <code>jest.mock()</code>, no <code>sinon.stub()</code>, no monkey-patching. Just plain TypeScript classes that implement the interface.</div>
        </div>

        <div class="section-label">In-memory fakes — implement the interface, no real I/O</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript — tests/fakes.ts</span></div>
        <pre><span class="kw">class</span> <span class="typ">FakeUserRepository</span> <span class="kw">implements</span> <span class="typ">IUserRepository</span> {
  <span class="kw">private</span> store: <span class="typ">User</span>[] = [];
  <span class="kw">private</span> nextId = <span class="num">1</span>;

  <span class="kw">async</span> findById(id: <span class="typ">number</span>) {
    <span class="kw">return</span> <span class="kw">this</span>.store.find(u => u.id === id) ?? <span class="kw">null</span>;
  }
  <span class="kw">async</span> findByEmail(email: <span class="typ">string</span>) {
    <span class="kw">return</span> <span class="kw">this</span>.store.find(u => u.email === email) ?? <span class="kw">null</span>;
  }
  <span class="kw">async</span> create(dto: <span class="typ">CreateUserDto</span>): <span class="typ">Promise</span>&lt;<span class="typ">User</span>&gt; {
    <span class="kw">const</span> user = { ...dto, id: <span class="kw">this</span>.nextId++, createdAt: <span class="kw">new</span> <span class="typ">Date</span>() } <span class="kw">as</span> <span class="typ">User</span>;
    <span class="kw">this</span>.store.push(user);
    <span class="kw">return</span> user;
  }
  <span class="kw">async</span> update(id: <span class="typ">number</span>, dto: <span class="typ">UpdateUserDto</span>) {
    <span class="kw">const</span> user = <span class="kw">this</span>.store.find(u => u.id === id)!;
    <span class="kw">return</span> Object.assign(user, dto);
  }
  <span class="kw">async</span> delete(id: <span class="typ">number</span>) {
    <span class="kw">this</span>.store = <span class="kw">this</span>.store.filter(u => u.id !== id);
  }
}

<span class="kw">class</span> <span class="typ">FakeMailer</span> <span class="kw">implements</span> <span class="typ">IMailer</span> {
  sent: { to: <span class="typ">string</span>; subject: <span class="typ">string</span> }[] = [];
  <span class="kw">async</span> send(to: <span class="typ">string</span>, subject: <span class="typ">string</span>) { <span class="kw">this</span>.sent.push({ to, subject }); }
  <span class="kw">async</span> sendTemplate(to: <span class="typ">string</span>, tid: <span class="typ">string</span>, data: <span class="typ">Record</span>&lt;<span class="typ">string</span>, <span class="typ">unknown</span>&gt;) { <span class="kw">this</span>.sent.push({ to, subject: tid }); }
}</pre></div>

        <div class="section-label">Unit tests — pure, fast, no network</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript — tests/user-service.test.ts</span></div>
        <pre><span class="kw">describe</span>(<span class="str">"UserService"</span>, () => {
  <span class="kw">let</span> repo:    <span class="typ">FakeUserRepository</span>;
  <span class="kw">let</span> mailer:  <span class="typ">FakeMailer</span>;
  <span class="kw">let</span> logger:  <span class="typ">TestLogger</span>;
  <span class="kw">let</span> service: <span class="typ">UserService</span>;

  <span class="kw">beforeEach</span>(() => {
    repo    = <span class="kw">new</span> <span class="typ">FakeUserRepository</span>();
    mailer  = <span class="kw">new</span> <span class="typ">FakeMailer</span>();
    logger  = <span class="kw">new</span> <span class="typ">TestLogger</span>();
    service = <span class="kw">new</span> <span class="typ">UserService</span>(repo, mailer, logger); <span class="cmt">// inject fakes</span>
  });

  <span class="kw">it</span>(<span class="str">"creates a user and sends welcome email"</span>, <span class="kw">async</span> () => {
    <span class="kw">const</span> dto = { name: <span class="str">"Alice"</span>, email: <span class="str">"alice@x.com"</span>, password: <span class="str">"secret123"</span> };
    <span class="kw">const</span> user = <span class="kw">await</span> service.create(dto);

    expect(user.id).toBe(<span class="num">1</span>);
    expect(user.name).toBe(<span class="str">"Alice"</span>);
    expect(mailer.sent).toHaveLength(<span class="num">1</span>);         <span class="cmt">// email was sent</span>
    expect(mailer.sent[<span class="num">0</span>].to).toBe(<span class="str">"alice@x.com"</span>); <span class="cmt">// to correct address</span>
    expect(logger.logs.some(l => l.level === <span class="str">"info"</span>)).toBe(<span class="kw">true</span>);
  });

  <span class="kw">it</span>(<span class="str">"throws when email already exists"</span>, <span class="kw">async</span> () => {
    <span class="kw">const</span> dto = { name: <span class="str">"Bob"</span>, email: <span class="str">"bob@x.com"</span>, password: <span class="str">"pass1234"</span> };
    <span class="kw">await</span> service.create(dto);
    <span class="kw">await</span> expect(service.create(dto)).rejects.toThrow(<span class="str">"Email already in use"</span>);
  });
});</pre></div>
      </div>

      <!-- REAL PATTERNS -->
      <div class="st-pane" id="t14-patterns14">
        <div class="section-label">Pattern 1 — Layered architecture with DI</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="cmt">// Each layer only depends on the layer below via interfaces:</span>
<span class="cmt">//
//  HTTP layer (controllers)
//      ↓ depends on
//  Application layer (services) via IUserService
//      ↓ depends on
//  Domain layer (repositories) via IUserRepository
//      ↓ depends on
//  Infrastructure (Prisma, Redis, SMTP) — concretions
//
// Concretions only appear at the composition root.
// All arrows point inward — the Dependency Rule.</span>

<span class="kw">class</span> <span class="typ">UserController</span> {
  <span class="kw">constructor</span>(<span class="kw">private</span> userService: <span class="typ">IUserService</span>) {}

  <span class="kw">async</span> createUser(req: Request, res: Response): <span class="typ">Promise</span>&lt;<span class="typ">void</span>&gt; {
    <span class="kw">const</span> result = <span class="kw">await</span> <span class="kw">this</span>.userService.create(req.body);
    res.status(<span class="num">201</span>).json(result);
  }
}

<span class="kw">class</span> <span class="typ">UserServiceImpl</span> <span class="kw">implements</span> <span class="typ">IUserService</span> {
  <span class="kw">constructor</span>(
    <span class="kw">private</span> repo:   <span class="typ">IUserRepository</span>,
    <span class="kw">private</span> mailer: <span class="typ">IMailer</span>,
    <span class="kw">private</span> logger: <span class="typ">ILogger</span>
  ) {}
  <span class="cmt">// ... implementation</span>
}</pre></div>

        <div class="section-label">Pattern 2 — Environment-based swapping</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript — src/container.ts</span></div>
        <pre><span class="kw">const</span> isTest = process.env.NODE_ENV === <span class="str">"test"</span>;

<span class="kw">const</span> mailer: <span class="typ">IMailer</span> = isTest
  ? <span class="kw">new</span> <span class="typ">FakeMailer</span>()        <span class="cmt">// no emails in test</span>
  : <span class="kw">new</span> <span class="typ">SendGridMailer</span>(key); <span class="cmt">// real emails in prod</span>

<span class="kw">const</span> logger: <span class="typ">ILogger</span> = isTest
  ? <span class="kw">new</span> <span class="typ">TestLogger</span>()         <span class="cmt">// silent in test</span>
  : <span class="kw">new</span> <span class="typ">WinstonLogger</span>();     <span class="cmt">// structured logs in prod</span>

<span class="cmt">// Zero changes to UserService, UserController, or any business logic.
// The type system ensures every implementation satisfies the interface.</span></pre></div>

        <div class="section-label">Pattern 3 — Optional dependencies with defaults</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">class</span> <span class="typ">UserService</span> {
  <span class="kw">constructor</span>(
    <span class="kw">private</span> repo:   <span class="typ">IUserRepository</span>,
    <span class="kw">private</span> mailer: <span class="typ">IMailer</span>,
    <span class="cmt">// Optional — defaults to no-op logger if not provided</span>
    <span class="kw">private</span> logger: <span class="typ">ILogger</span> = <span class="kw">new</span> <span class="typ">NoopLogger</span>()
  ) {}
}

<span class="cmt">// NoopLogger — implements ILogger with empty bodies</span>
<span class="kw">class</span> <span class="typ">NoopLogger</span> <span class="kw">implements</span> <span class="typ">ILogger</span> {
  info()  {}
  warn()  {}
  error() {}
}</pre></div>

        <div class="card" style="border-color:rgba(107,140,255,.3);background:var(--blue-bg);margin-top:10px;">
          <div class="card-title">DI at a glance — what you gain</div>
          <div class="card-body">
            <strong>Testability</strong> — inject fakes, test business logic with zero I/O.<br/>
            <strong>Swappability</strong> — change a concrete class without touching business logic.<br/>
            <strong>Explicitness</strong> — every dependency is visible in the constructor signature.<br/>
            <strong>Compile-time safety</strong> — TypeScript ensures every injected value satisfies the interface.
          </div>
        </div>
      </div>
