        <button class="st-btn"    onclick="stTab('t11','services')">services</button>
        <button class="st-btn"    onclick="stTab('t11','middleware')">middleware</button>
        <button class="st-btn"    onclick="stTab('t11','async')">async patterns</button>

      </div>

      <!-- BASICS -->
      <div class="st-pane on" id="t11-basics">
        <div class="section-label">Parameter & return type annotations</div>
        <div class="two-col">
          <div>
            <div class="col-label">Named functions</div>
            <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
            <pre><span class="cmt">// params: type, return: type</span>
<span class="kw">function</span> add(a: <span class="typ">number</span>, b: <span class="typ">number</span>): <span class="typ">number</span> {
  <span class="kw">return</span> a + b;
}

<span class="cmt">// void — no useful return value</span>
<span class="kw">function</span> log(msg: <span class="typ">string</span>): <span class="typ">void</span> {
  console.log(msg);
}

<span class="cmt">// never — always throws</span>
<span class="kw">function</span> fail(msg: <span class="typ">string</span>): <span class="typ">never</span> {
  <span class="kw">throw new</span> Error(msg);
}

<span class="cmt">// Optional + default params</span>
<span class="kw">function</span> greet(
  name: <span class="typ">string</span>,
  role: <span class="typ">string</span> = <span class="str">"user"</span>,
  prefix?: <span class="typ">string</span>
): <span class="typ">string</span> {
  <span class="kw">return</span> <span class="str">\`\${prefix ?? ""}\${name} [\${role}]\`</span>;
}</pre></div>
          </div>
          <div>
            <div class="col-label">Arrow functions & type aliases</div>
            <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
            <pre><span class="cmt">// Arrow function with inline types</span>
<span class="kw">const</span> double = (n: <span class="typ">number</span>): <span class="typ">number</span> => n * <span class="num">2</span>;

<span class="cmt">// Type alias for a function signature</span>
<span class="kw">type</span> <span class="typ">Transform</span>&lt;T, U&gt; = (input: T) => U;
<span class="kw">type</span> <span class="typ">Predicate</span>&lt;T&gt;   = (item: T) => <span class="typ">boolean</span>;
<span class="kw">type</span> <span class="typ">Handler</span>        = (err: <span class="typ">Error</span>) => <span class="typ">void</span>;

<span class="cmt">// Assigning to a typed variable</span>
<span class="kw">const</span> isEven: <span class="typ">Predicate</span>&lt;<span class="typ">number</span>&gt; = n => n % <span class="num">2</span> === <span class="num">0</span>;

<span class="cmt">// Rest parameters</span>
<span class="kw">function</span> sum(...nums: <span class="typ">number[]</span>): <span class="typ">number</span> {
  <span class="kw">return</span> nums.reduce((a, b) => a + b, <span class="num">0</span>);
}
sum(<span class="num">1</span>, <span class="num">2</span>, <span class="num">3</span>, <span class="num">4</span>); <span class="ok">// &#10003; 10</span></pre></div>
          </div>
        </div>

        <div class="section-label">Function types as parameters (callbacks)</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="cmt">// Inline function type in parameter</span>
<span class="kw">function</span> runWithLogging(
  label: <span class="typ">string</span>,
  fn: () => <span class="typ">void</span>
): <span class="typ">void</span> {
  console.log(<span class="str">\`Starting: \${label}\`</span>);
  fn();
  console.log(<span class="str">\`Done: \${label}\`</span>);
}

<span class="cmt">// Accepting a transform callback</span>
<span class="kw">function</span> mapArray&lt;T, U&gt;(
  items: T[],
  transform: (item: T, index: <span class="typ">number</span>) => U
): U[] {
  <span class="kw">return</span> items.map(transform);
}

<span class="kw">const</span> lengths = mapArray([<span class="str">"hello"</span>, <span class="str">"world"</span>], s => s.length);
<span class="cmt">// lengths: number[] — inferred from transform return type</span></pre></div>
      </div>

      <!-- OVERLOADS -->
      <div class="st-pane" id="t11-overloads">
        <div class="card hl-blue">
          <div class="card-title">Function overloads — multiple signatures, one implementation</div>
          <div class="card-body">Overloads let you declare several type signatures for the same function. Callers see only the overloads — not the implementation signature. TypeScript picks the matching overload at each call site.</div>
        </div>

        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="cmt">// Overload signatures (callers see these):</span>
<span class="kw">function</span> parse(input: <span class="typ">string</span>):              <span class="typ">number</span>;
<span class="kw">function</span> parse(input: <span class="typ">string</span>[]): <span class="typ">number</span>[];
<span class="kw">function</span> parse(input: <span class="typ">string</span>, radix: <span class="typ">number</span>): <span class="typ">number</span>;

<span class="cmt">// Implementation signature (must be compatible with all overloads):</span>
<span class="kw">function</span> parse(
  input: <span class="typ">string</span> | <span class="typ">string</span>[],
  radix?: <span class="typ">number</span>
): <span class="typ">number</span> | <span class="typ">number</span>[] {
  <span class="kw">if</span> (Array.isArray(input)) {
    <span class="kw">return</span> input.map(s => parseInt(s, radix));
  }
  <span class="kw">return</span> parseInt(input, radix);
}

<span class="cmt">// Each call site gets the correct return type:</span>
<span class="kw">const</span> a = parse(<span class="str">"42"</span>);          <span class="cmt">// number</span>
<span class="kw">const</span> b = parse([<span class="str">"1"</span>, <span class="str">"2"</span>]);   <span class="cmt">// number[]</span>
<span class="kw">const</span> c = parse(<span class="str">"ff"</span>, <span class="num">16</span>);     <span class="cmt">// number</span></pre></div>

        <div class="card" style="border-color:rgba(251,191,36,.25);background:var(--amber-bg);margin-top:10px;">
          <div class="card-title">&#9888;&#65039; Prefer generics over overloads when possible</div>
          <div class="card-body">Overloads are verbose and require maintaining the implementation signature separately. If the different signatures only vary in types (not runtime behavior), a generic function is almost always cleaner. Use overloads when the return type genuinely depends on the specific argument type combination.</div>
        </div>
      </div>

      <!-- GENERIC FUNCTIONS -->
      <div class="st-pane" id="t11-generics">
        <div class="card hl-purple">
          <div class="card-title">Generic functions — parameterize over types</div>
          <div class="card-body">A generic function works with any type while preserving type relationships between parameters and return values. TypeScript infers the type parameter from the argument — you almost never need to write <code>&lt;string&gt;</code> explicitly.</div>
        </div>

        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="cmt">// T is inferred from the argument</span>
<span class="kw">function</span> first&lt;T&gt;(arr: T[]): T | <span class="kw">undefined</span> {
  <span class="kw">return</span> arr[<span class="num">0</span>];
}
<span class="kw">const</span> n = first([<span class="num">1</span>, <span class="num">2</span>, <span class="num">3</span>]);  <span class="cmt">// T inferred as number → number | undefined</span>
<span class="kw">const</span> s = first([<span class="str">"a"</span>, <span class="str">"b"</span>]); <span class="cmt">// T inferred as string → string | undefined</span>

<span class="cmt">// Multiple type params</span>
<span class="kw">function</span> zip&lt;A, B&gt;(a: A[], b: B[]): [A, B][] {
  <span class="kw">return</span> a.map((item, i) => [item, b[i]]);
}
<span class="kw">const</span> pairs = zip([<span class="num">1</span>,<span class="num">2</span>], [<span class="str">"a"</span>,<span class="str">"b"</span>]);
<span class="cmt">// pairs: [number, string][]</span>

<span class="cmt">// Constraints — T must have a .length property</span>
<span class="kw">function</span> longest&lt;T <span class="kw">extends</span> { length: <span class="typ">number</span> }&gt;(a: T, b: T): T {
  <span class="kw">return</span> a.length >= b.length ? a : b;
}
longest(<span class="str">"alice"</span>, <span class="str">"bob"</span>);         <span class="ok">// &#10003; "alice"</span>
longest([<span class="num">1</span>,<span class="num">2</span>,<span class="num">3</span>], [<span class="num">1</span>,<span class="num">2</span>]);        <span class="ok">// &#10003; [1,2,3]</span>
longest(<span class="err"><span class="num">1</span></span>, <span class="err"><span class="num">2</span></span>);                   <span class="err">// &#10007; number has no .length</span></pre></div>

        <div class="section-label">Constrained keyof — type-safe property access</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="cmt">// K must be a key of T — guarantees obj[key] is valid</span>
<span class="kw">function</span> getProperty&lt;T, K <span class="kw">extends keyof</span> T&gt;(obj: T, key: K): T[K] {
  <span class="kw">return</span> obj[key];
}

<span class="kw">const</span> user = { id: <span class="num">1</span>, name: <span class="str">"Alice"</span>, email: <span class="str">"a@x.com"</span> };
<span class="kw">const</span> name  = getProperty(user, <span class="str">"name"</span>);   <span class="cmt">// type: string &#10003;</span>
<span class="kw">const</span> id    = getProperty(user, <span class="str">"id"</span>);     <span class="cmt">// type: number &#10003;</span>
<span class="kw">const</span> bad   = getProperty(user, <span class="err"><span class="str">"phone"</span></span>);  <span class="err">// &#10007; "phone" not in User</span></pre></div>
      </div>

      <!-- CONTROLLERS -->
      <div class="st-pane" id="t11-controllers">
        <div class="card hl-blue">
          <div class="card-title">Typing Express controllers</div>
          <div class="card-body">Controllers are the entry point for HTTP requests. Typing them properly means every access to <code>req.body</code>, <code>req.params</code>, and <code>req.query</code> is checked — no more silent <code>any</code> from Express's defaults.</div>
        </div>

        <div class="section-label">Typed request with generics</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">import</span> { Request, Response, NextFunction } <span class="kw">from</span> <span class="str">"express"</span>;

<span class="cmt">// Define your request body and param shapes:</span>
<span class="kw">interface</span> <span class="typ">CreateUserBody</span> {
  name:     <span class="typ">string</span>;
  email:    <span class="typ">string</span>;
  password: <span class="typ">string</span>;
}

<span class="kw">interface</span> <span class="typ">UserParams</span> { id: <span class="typ">string</span> }

<span class="cmt">// Use Express's generic Request type:</span>
<span class="cmt">// Request&lt;Params, ResBody, ReqBody, Query&gt;</span>

<span class="kw">export async function</span> createUser(
  req: Request&lt;{}, {}, <span class="typ">CreateUserBody</span>&gt;,
  res: Response
): <span class="typ">Promise</span>&lt;<span class="typ">void</span>&gt; {
  <span class="kw">const</span> { name, email, password } = req.body;
  <span class="cmt">// name: string, email: string, password: string &#10003;</span>
  <span class="kw">const</span> user = <span class="kw">await</span> userService.create({ name, email, password });
  res.status(<span class="num">201</span>).json(user);
}

<span class="kw">export async function</span> getUser(
  req: Request&lt;<span class="typ">UserParams</span>&gt;,
  res: Response
): <span class="typ">Promise</span>&lt;<span class="typ">void</span>&gt; {
  <span class="kw">const</span> id = req.params.id; <span class="cmt">// type: string &#10003;</span>
  <span class="kw">const</span> user = <span class="kw">await</span> userService.findById(Number(id));
  <span class="kw">if</span> (!user) { res.status(<span class="num">404</span>).json({ message: <span class="str">"Not found"</span> }); <span class="kw">return</span>; }
  res.json(user);
}</pre></div>

        <div class="section-label">Typed query params</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">interface</span> <span class="typ">ListQuery</span> {
  page?:   <span class="typ">string</span>; <span class="cmt">// query params are always strings from Express</span>
  limit?:  <span class="typ">string</span>;
  search?: <span class="typ">string</span>;
}

<span class="kw">export async function</span> listUsers(
  req: Request&lt;{}, {}, {}, <span class="typ">ListQuery</span>&gt;,
  res: Response
): <span class="typ">Promise</span>&lt;<span class="typ">void</span>&gt; {
  <span class="kw">const</span> page  = Number(req.query.page  ?? <span class="str">"1"</span>);
  <span class="kw">const</span> limit = Number(req.query.limit ?? <span class="str">"20"</span>);
  <span class="kw">const</span> users = <span class="kw">await</span> userService.list({ page, limit, search: req.query.search });
  res.json({ data: users, page, limit });
}</pre></div>
      </div>

      <!-- SERVICES -->
      <div class="st-pane" id="t11-services">
        <div class="card hl-blue">
          <div class="card-title">Typing service layer functions</div>
          <div class="card-body">Services contain business logic. Typing them explicitly creates a contract between the controller layer and the data layer — any change to a service signature immediately surfaces as an error at every call site.</div>
        </div>

        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="cmt">// Domain types</span>
<span class="kw">interface</span> <span class="typ">User</span> {
  id:        <span class="typ">number</span>;
  name:      <span class="typ">string</span>;
  email:     <span class="typ">string</span>;
  createdAt: <span class="typ">Date</span>;
}

<span class="kw">type</span> <span class="typ">CreateUserDto</span> = <span class="typ">Omit</span>&lt;<span class="typ">User</span>, <span class="str">"id"</span> | <span class="str">"createdAt"</span>&gt;;
<span class="kw">type</span> <span class="typ">UpdateUserDto</span> = <span class="typ">Partial</span>&lt;<span class="typ">Pick</span>&lt;<span class="typ">User</span>, <span class="str">"name"</span> | <span class="str">"email"</span>&gt;&gt;;

<span class="kw">interface</span> <span class="typ">ListOptions</span> {
  page:    <span class="typ">number</span>;
  limit:   <span class="typ">number</span>;
  search?: <span class="typ">string</span>;
}
<span class="kw">interface</span> <span class="typ">PaginatedResult</span>&lt;T&gt; {
  data:  T[];
  total: <span class="typ">number</span>;
  page:  <span class="typ">number</span>;
  pages: <span class="typ">number</span>;
}

<span class="cmt">// Service interface — explicit contract:</span>
<span class="kw">interface</span> <span class="typ">UserService</span> {
  create(dto: <span class="typ">CreateUserDto</span>):          <span class="typ">Promise</span>&lt;<span class="typ">User</span>&gt;;
  findById(id: <span class="typ">number</span>):               <span class="typ">Promise</span>&lt;<span class="typ">User</span> | <span class="kw">null</span>&gt;;
  list(opts: <span class="typ">ListOptions</span>):            <span class="typ">Promise</span>&lt;<span class="typ">PaginatedResult</span>&lt;<span class="typ">User</span>&gt;&gt;;
  update(id: <span class="typ">number</span>, dto: <span class="typ">UpdateUserDto</span>): <span class="typ">Promise</span>&lt;<span class="typ">User</span>&gt;;
  delete(id: <span class="typ">number</span>):                <span class="typ">Promise</span>&lt;<span class="typ">void</span>&gt;;
}

<span class="cmt">// Implementation must satisfy the interface:</span>
<span class="kw">class</span> <span class="typ">UserServiceImpl</span> <span class="kw">implements</span> <span class="typ">UserService</span> {
  <span class="kw">async</span> create(dto: <span class="typ">CreateUserDto</span>): <span class="typ">Promise</span>&lt;<span class="typ">User</span>&gt; {
    <span class="kw">return</span> db.users.create({ data: { ...dto, createdAt: <span class="kw">new</span> <span class="typ">Date</span>() } });
  }
  <span class="cmt">// ... other methods</span>
}</pre></div>
      </div>

      <!-- MIDDLEWARE -->
      <div class="st-pane" id="t11-middleware">
        <div class="card hl-blue">
          <div class="card-title">Typing middleware</div>
          <div class="card-body">Middleware sits between requests and controllers. The key challenge is extending the <code>Request</code> type to carry values the middleware attaches — like an authenticated user or a trace ID — without resorting to <code>any</code>.</div>
        </div>

        <div class="section-label">Extending Express Request</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript — types/express.d.ts</span></div>
        <pre><span class="cmt">// Augment Express's Request interface globally:</span>
<span class="kw">declare global</span> {
  <span class="kw">namespace</span> Express {
    <span class="kw">interface</span> <span class="typ">Request</span> {
      user?:    <span class="typ">AuthUser</span>;
      traceId:  <span class="typ">string</span>;
      tenantId?: <span class="typ">string</span>;
    }
  }
}</pre></div>

        <div class="section-label">Auth middleware — typed from end to end</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">interface</span> <span class="typ">AuthUser</span> {
  id:    <span class="typ">number</span>;
  email: <span class="typ">string</span>;
  roles: <span class="typ">string</span>[];
}

<span class="kw">export async function</span> authMiddleware(
  req: Request,
  res: Response,
  next: NextFunction
): <span class="typ">Promise</span>&lt;<span class="typ">void</span>&gt; {
  <span class="kw">const</span> token = req.headers.authorization?.split(<span class="str">" "</span>)[<span class="num">1</span>];
  <span class="kw">if</span> (!token) {
    res.status(<span class="num">401</span>).json({ message: <span class="str">"Unauthorized"</span> }); <span class="kw">return</span>;
  }
  <span class="kw">try</span> {
    <span class="kw">const</span> payload = verifyToken(token); <span class="cmt">// returns AuthUser</span>
    req.user = payload;  <span class="ok">// &#10003; typed via declaration merging</span>
    next();
  } <span class="kw">catch</span> {
    res.status(<span class="num">401</span>).json({ message: <span class="str">"Invalid token"</span> }); <span class="kw">return</span>;
  }
}

<span class="cmt">// In a controller after authMiddleware runs:</span>
<span class="kw">export async function</span> getProfile(req: Request, res: Response) {
  <span class="kw">const</span> user = req.user!; <span class="cmt">// AuthUser — set by middleware</span>
  res.json({ id: user.id, email: user.email });
}</pre></div>

        <div class="section-label">Higher-order middleware factory</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">type</span> <span class="typ">Middleware</span> = (req: Request, res: Response, next: NextFunction) => <span class="typ">void</span>;

<span class="cmt">// Factory that returns typed middleware:</span>
<span class="kw">function</span> requireRole(...roles: <span class="typ">string</span>[]): <span class="typ">Middleware</span> {
  <span class="kw">return</span> (req, res, next) => {
    <span class="kw">const</span> user = req.user;
    <span class="kw">if</span> (!user || !roles.some(r => user.roles.includes(r))) {
      res.status(<span class="num">403</span>).json({ message: <span class="str">"Forbidden"</span> }); <span class="kw">return</span>;
    }
    next();
  };
}

<span class="cmt">// Usage:</span>
router.delete(<span class="str">"/users/:id"</span>, requireRole(<span class="str">"admin"</span>), deleteUser);</pre></div>
      </div>

      <!-- ASYNC PATTERNS -->
      <div class="st-pane" id="t11-async">
        <div class="card hl-blue">
          <div class="card-title">Async function typing patterns</div>
          <div class="card-body">Every <code>async</code> function returns a <code>Promise</code>. TypeScript wraps the return type automatically — but being explicit about it in service and controller functions makes the API surface clear and prevents accidental type changes.</div>
        </div>

        <div class="section-label">async / await return types</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="cmt">// Always annotate async function returns explicitly:</span>
<span class="kw">async function</span> fetchUser(id: <span class="typ">number</span>): <span class="typ">Promise</span>&lt;<span class="typ">User</span>&gt; {
  <span class="kw">const</span> user = <span class="kw">await</span> db.findUser(id);
  <span class="kw">if</span> (!user) <span class="kw">throw new</span> Error(<span class="str">\`User \${id} not found\`</span>);
  <span class="kw">return</span> user; <span class="cmt">// TS checks this matches Promise&lt;User&gt;</span>
}

<span class="cmt">// Nullable result — be explicit:</span>
<span class="kw">async function</span> findUser(id: <span class="typ">number</span>): <span class="typ">Promise</span>&lt;<span class="typ">User</span> | <span class="kw">null</span>&gt; {
  <span class="kw">return</span> db.findUser(id) ?? <span class="kw">null</span>;
}

<span class="cmt">// Promise.all — types are preserved as a tuple:</span>
<span class="kw">const</span> [user, posts] = <span class="kw">await</span> Promise.all([
  fetchUser(<span class="num">1</span>),
  fetchPosts(<span class="num">1</span>)
]);
<span class="cmt">// user: User, posts: Post[] — fully typed &#10003;</span></pre></div>

        <div class="section-label">Typed Result pattern — avoid throwing</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">type</span> <span class="typ">Result</span>&lt;T, E = <span class="typ">string</span>&gt; =
  | { ok: <span class="kw">true</span>;  value: T }
  | { ok: <span class="kw">false</span>; error: E };

<span class="kw">async function</span> safeCreateUser(
  dto: <span class="typ">CreateUserDto</span>
): <span class="typ">Promise</span>&lt;<span class="typ">Result</span>&lt;<span class="typ">User</span>&gt;&gt; {
  <span class="kw">try</span> {
    <span class="kw">const</span> user = <span class="kw">await</span> userService.create(dto);
    <span class="kw">return</span> { ok: <span class="kw">true</span>, value: user };
  } <span class="kw">catch</span> (e) {
    <span class="kw">return</span> { ok: <span class="kw">false</span>, error: (e <span class="kw">as</span> Error).message };
  }
}

<span class="cmt">// Caller is forced to handle both cases:</span>
<span class="kw">const</span> result = <span class="kw">await</span> safeCreateUser(dto);
<span class="kw">if</span> (result.ok) {
  res.status(<span class="num">201</span>).json(result.value); <span class="ok">// &#10003; result.value: User</span>
} <span class="kw">else</span> {
  res.status(<span class="num">400</span>).json({ error: result.error }); <span class="ok">// &#10003;</span>
}</pre></div>
      </div>

      <!-- QUIZ -->
      <div class="st-pane" id="t11-quiz11">
        <div id="quiz11-out"></div>
      </div>
    `
  }
,

  /* ══ TOPIC 12 — TYPING OBJECTS & REQUEST BODIES ══ */
  {
    num: '12', tag: 'Objects & Request Bodies', title: 'Typing Objects <em>&</em> Request Bodies',
    desc: 'Every HTTP request carries data — params, query strings, headers, and bodies. Typing them precisely means bugs surface at compile time, not in production. This topic covers every layer of the request object in a Node.js backend.',
    content: `
      <div class="card hl-purple">
        <div class="card-title">&#128161; The core challenge</div>
        <div class="card-body">Express and most Node frameworks type <code>req.body</code> as <code>any</code> by default. That means <strong>zero safety</strong> — a typo in a field name, a missing required field, or a wrong type all pass through silently. The solution is layered: TypeScript types for structure, runtime validation for values.</div>
      </div>

      <div class="st-bar">
        <button class="st-btn on" onclick="stTab('t12','shapes')">object shapes</button>
        <button class="st-btn"    onclick="stTab('t12','dtos')">DTOs</button>
        <button class="st-btn"    onclick="stTab('t12','params')">params &amp; query</button>
        <button class="st-btn"    onclick="stTab('t12','validation')">runtime validation</button>
        <button class="st-btn"    onclick="stTab('t12','zod')">Zod integration</button>
        <button class="st-btn"    onclick="stTab('t12','nested')">nested &amp; arrays</button>
        <button class="st-btn"    onclick="stTab('t12','quiz12')">quiz</button>
      </div>

      <!-- OBJECT SHAPES -->
      <div class="st-pane on" id="t12-shapes">
        <div class="section-label">Interface vs type for object shapes</div>
        <div class="two-col">
          <div>
            <div class="col-label">Domain objects</div>
            <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
            <pre><span class="cmt">// Rich domain object — use interface</span>
<span class="kw">interface</span> <span class="typ">User</span> {
  id:        <span class="typ">number</span>;
  name:      <span class="typ">string</span>;
  email:     <span class="typ">string</span>;
  role:      <span class="str">"admin"</span> | <span class="str">"user"</span> | <span class="str">"guest"</span>;
  createdAt: <span class="typ">Date</span>;
  updatedAt: <span class="typ">Date</span>;
}

<span class="kw">interface</span> <span class="typ">Post</span> {
  id:        <span class="typ">number</span>;
  title:     <span class="typ">string</span>;
  content:   <span class="typ">string</span>;
  published: <span class="typ">boolean</span>;
  authorId:  <span class="typ">number</span>;
  tags:      <span class="typ">string</span>[];
  createdAt: <span class="typ">Date</span>;
}</pre></div>
          </div>
          <div>
            <div class="col-label">Index signatures — dynamic keys</div>
            <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
            <pre><span class="cmt">// When keys are not known at compile time:</span>
<span class="kw">interface</span> <span class="typ">StringMap</span> {
  [key: <span class="typ">string</span>]: <span class="typ">string</span>;
}
<span class="kw">interface</span> <span class="typ">Headers</span> {
  [key: <span class="typ">string</span>]: <span class="typ">string</span> | <span class="typ">string</span>[];
}

<span class="cmt">// Record&lt;K,V&gt; — cleaner alternative:</span>
<span class="kw">type</span> <span class="typ">Metadata</span>   = <span class="typ">Record</span>&lt;<span class="typ">string</span>, <span class="typ">string</span>&gt;;
<span class="kw">type</span> <span class="typ">Settings</span>   = <span class="typ">Record</span>&lt;<span class="typ">string</span>, <span class="typ">unknown</span>&gt;;
<span class="kw">type</span> <span class="typ">UserCache</span>  = <span class="typ">Record</span>&lt;<span class="typ">number</span>, <span class="typ">User</span>&gt;;

<span class="cmt">// Specific keys only — mapped literal union:</span>
<span class="kw">type</span> <span class="typ">FeatureFlags</span> = <span class="typ">Record</span>&lt;
  <span class="str">"darkMode"</span> | <span class="str">"beta"</span> | <span class="str">"analytics"</span>,
  <span class="typ">boolean</span>
&gt;;</pre></div>
          </div>
        </div>

        <div class="section-label">Nested object shapes</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">interface</span> <span class="typ">Address</span> {
  street:  <span class="typ">string</span>;
  city:    <span class="typ">string</span>;
  country: <span class="typ">string</span>;
  zip:     <span class="typ">string</span>;
}

<span class="kw">interface</span> <span class="typ">UserProfile</span> {
  user:    <span class="typ">User</span>;          <span class="cmt">// nested interface</span>
  address: <span class="typ">Address</span>;      <span class="cmt">// nested interface</span>
  social:  {              <span class="cmt">// inline object type</span>
    twitter?:  <span class="typ">string</span>;
    linkedin?: <span class="typ">string</span>;
    github?:   <span class="typ">string</span>;
  };
  preferences: <span class="typ">Record</span>&lt;<span class="typ">string</span>, <span class="typ">unknown</span>&gt;;
}

<span class="cmt">// Accessing nested types:</span>
<span class="kw">type</span> <span class="typ">Social</span> = <span class="typ">UserProfile</span>[<span class="str">"social"</span>]; <span class="cmt">// extract inline type</span></pre></div>
      </div>

      <!-- DTOs -->
      <div class="st-pane" id="t12-dtos">
        <div class="card hl-blue">
          <div class="card-title">Data Transfer Objects — shaping what crosses the boundary</div>
          <div class="card-body">A DTO is what your API <em>accepts</em> — not the full domain object. It excludes server-generated fields, restricts which fields can be updated, and gives each operation its own precise shape. TypeScript utility types make them trivial to derive from the domain object.</div>
        </div>

        <div class="section-label">Creating DTOs with utility types</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">interface</span> <span class="typ">User</span> {
  id:        <span class="typ">number</span>;
  name:      <span class="typ">string</span>;
  email:     <span class="typ">string</span>;
  password:  <span class="typ">string</span>;
  role:      <span class="str">"admin"</span> | <span class="str">"user"</span>;
  createdAt: <span class="typ">Date</span>;
}

<span class="cmt">// Create DTO — omit server-generated fields:</span>
<span class="kw">type</span> <span class="typ">CreateUserDto</span> = <span class="typ">Omit</span>&lt;<span class="typ">User</span>, <span class="str">"id"</span> | <span class="str">"createdAt"</span>&gt;;

<span class="cmt">// Update DTO — all fields optional, can only change name/email:</span>
<span class="kw">type</span> <span class="typ">UpdateUserDto</span> = <span class="typ">Partial</span>&lt;<span class="typ">Pick</span>&lt;<span class="typ">User</span>, <span class="str">"name"</span> | <span class="str">"email"</span>&gt;&gt;;

<span class="cmt">// Login DTO — only what login needs:</span>
<span class="kw">type</span> <span class="typ">LoginDto</span> = <span class="typ">Pick</span>&lt;<span class="typ">User</span>, <span class="str">"email"</span> | <span class="str">"password"</span>&gt;;

<span class="cmt">// Public response — never expose password/role:</span>
<span class="kw">type</span> <span class="typ">UserPublic</span> = <span class="typ">Omit</span>&lt;<span class="typ">User</span>, <span class="str">"password"</span>&gt;;

<span class="cmt">// Change one field type:</span>
<span class="kw">type</span> <span class="typ">UserApi</span> = <span class="typ">Omit</span>&lt;<span class="typ">User</span>, <span class="str">"id"</span> | <span class="str">"createdAt"</span>&gt; &amp; {
  id:        <span class="typ">string</span>;  <span class="cmt">// string in API, number in DB</span>
  createdAt: <span class="typ">string</span>;  <span class="cmt">// ISO string in JSON</span>
};</pre></div>

        <div class="section-label">DTOs as request body types</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">import</span> { Request, Response } <span class="kw">from</span> <span class="str">"express"</span>;

<span class="kw">export async function</span> registerUser(
  req: Request&lt;{}, {}, <span class="typ">CreateUserDto</span>&gt;,
  res: Response&lt;<span class="typ">UserPublic</span>&gt;
): <span class="typ">Promise</span>&lt;<span class="typ">void</span>&gt; {
  <span class="kw">const</span> { name, email, password, role } = req.body;
  <span class="cmt">// All fields typed — no accidental access to req.body.id &#10003;</span>
  <span class="kw">const</span> user = <span class="kw">await</span> userService.create({ name, email, password, role });
  <span class="kw">const</span> { password: _, ...publicUser } = user; <span class="cmt">// strip password</span>
  res.status(<span class="num">201</span>).json(publicUser);
}</pre></div>
      </div>

      <!-- PARAMS & QUERY -->
      <div class="st-pane" id="t12-params">
        <div class="card hl-blue">
          <div class="card-title">Route params, query strings &amp; headers</div>
          <div class="card-body">Express gives you <code>req.params</code> and <code>req.query</code> as <code>any</code> or loose objects. Type them with the full <code>Request</code> generic to catch field name typos and missing coercions at compile time.</div>
        </div>

        <div class="section-label">Route params — always strings</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="cmt">// Route: GET /users/:id/posts/:postId</span>
<span class="kw">interface</span> <span class="typ">UserPostParams</span> {
  id:     <span class="typ">string</span>; <span class="cmt">// always string from Express</span>
  postId: <span class="typ">string</span>;
}

<span class="kw">export async function</span> getUserPost(
  req: Request&lt;<span class="typ">UserPostParams</span>&gt;,
  res: Response
): <span class="typ">Promise</span>&lt;<span class="typ">void</span>&gt; {
  <span class="kw">const</span> userId = Number(req.params.id);     <span class="cmt">// explicit coercion</span>
  <span class="kw">const</span> postId = Number(req.params.postId);
  <span class="kw">if</span> (isNaN(userId) || isNaN(postId)) {
    res.status(<span class="num">400</span>).json({ error: <span class="str">"Invalid ID"</span> }); <span class="kw">return</span>;
  }
  <span class="kw">const</span> post = <span class="kw">await</span> postService.findByUserAndId(userId, postId);
  res.json(post);
}</pre></div>

        <div class="section-label">Query strings — typed &amp; coerced</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="cmt">// Query params are ALWAYS strings (or string[]) from Express</span>
<span class="kw">interface</span> <span class="typ">SearchQuery</span> {
  q?:       <span class="typ">string</span>;
  page?:    <span class="typ">string</span>;
  limit?:   <span class="typ">string</span>;
  sort?:    <span class="str">"asc"</span> | <span class="str">"desc"</span>;
  tags?:    <span class="typ">string</span> | <span class="typ">string</span>[]; <span class="cmt">// ?tags=a&amp;tags=b</span>
}

<span class="kw">export async function</span> searchPosts(
  req: Request&lt;{}, {}, {}, <span class="typ">SearchQuery</span>&gt;,
  res: Response
): <span class="typ">Promise</span>&lt;<span class="typ">void</span>&gt; {
  <span class="kw">const</span> page  = Math.max(<span class="num">1</span>,  Number(req.query.page  ?? <span class="str">"1"</span>));
  <span class="kw">const</span> limit = Math.min(<span class="num">100</span>, Number(req.query.limit ?? <span class="str">"20"</span>));
  <span class="kw">const</span> sort  = req.query.sort ?? <span class="str">"desc"</span>; <span class="cmt">// "asc" | "desc" &#10003;</span>
  <span class="kw">const</span> tags  = req.query.tags
    ? [req.query.tags].flat() <span class="cmt">// normalise to string[]</span>
    : [];
  <span class="kw">const</span> results = <span class="kw">await</span> postService.search({
    q: req.query.q, page, limit, sort, tags
  });
  res.json({ data: results, page, limit });
}</pre></div>

        <div class="section-label">Typed headers</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="cmt">// Headers are accessed via req.headers — no generics here</span>
<span class="cmt">// but you can narrow them cleanly:</span>
<span class="kw">function</span> extractBearerToken(req: Request): <span class="typ">string</span> | <span class="kw">null</span> {
  <span class="kw">const</span> auth = req.headers[<span class="str">"authorization"</span>];
  <span class="kw">if</span> (<span class="kw">typeof</span> auth !== <span class="str">"string"</span>) <span class="kw">return null</span>;
  <span class="kw">const</span> [scheme, token] = auth.split(<span class="str">" "</span>);
  <span class="kw">return</span> scheme === <span class="str">"Bearer"</span> ? token : <span class="kw">null</span>;
}

<span class="cmt">// Custom header with type-safe access:</span>
<span class="kw">function</span> getTraceId(req: Request): <span class="typ">string</span> {
  <span class="kw">const</span> traceId = req.headers[<span class="str">"x-trace-id"</span>];
  <span class="kw">return</span> <span class="kw">typeof</span> traceId === <span class="str">"string"</span> ? traceId : crypto.randomUUID();
}</pre></div>
      </div>

      <!-- RUNTIME VALIDATION -->
      <div class="st-pane" id="t12-validation">
        <div class="card" style="border-color:rgba(251,191,36,.25);background:var(--amber-bg);">
          <div class="card-title">&#9888;&#65039; TypeScript types alone are NOT enough for request bodies</div>
          <div class="card-body">TypeScript checks types at compile time — but HTTP requests arrive at runtime as raw JSON with no type information. Typing <code>req.body</code> as <code>CreateUserDto</code> tells TypeScript what to expect, but it <strong>does not validate</strong> that the actual request contains those fields with those types. You need runtime validation too.</div>
        </div>

        <div class="section-label">The two-layer approach</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="cmt">// Layer 1: TypeScript type — compile-time shape contract</span>
<span class="kw">interface</span> <span class="typ">CreateUserDto</span> {
  name:     <span class="typ">string</span>;
  email:    <span class="typ">string</span>;
  password: <span class="typ">string</span>;
}

<span class="cmt">// Layer 2: Runtime validation — check actual request data</span>
<span class="kw">function</span> validateCreateUser(body: <span class="typ">unknown</span>): body <span class="kw">is</span> <span class="typ">CreateUserDto</span> {
  <span class="kw">if</span> (<span class="kw">typeof</span> body !== <span class="str">"object"</span> || body === <span class="kw">null</span>) <span class="kw">return false</span>;
  <span class="kw">const</span> b = body <span class="kw">as</span> <span class="typ">Record</span>&lt;<span class="typ">string</span>, <span class="typ">unknown</span>&gt;;
  <span class="kw">return</span> (
    <span class="kw">typeof</span> b.name     === <span class="str">"string"</span> &amp;&amp; b.name.length     &gt; <span class="num">0</span> &amp;&amp;
    <span class="kw">typeof</span> b.email    === <span class="str">"string"</span> &amp;&amp; b.email.includes(<span class="str">"@"</span>) &amp;&amp;
    <span class="kw">typeof</span> b.password === <span class="str">"string"</span> &amp;&amp; b.password.length &gt;= <span class="num">8</span>
  );
}

<span class="kw">export async function</span> createUser(
  req: Request,
  res: Response
): <span class="typ">Promise</span>&lt;<span class="typ">void</span>&gt; {
  <span class="kw">if</span> (!validateCreateUser(req.body)) {
    res.status(<span class="num">400</span>).json({ error: <span class="str">"Invalid request body"</span> }); <span class="kw">return</span>;
  }
  <span class="cmt">// req.body is now narrowed to CreateUserDto &#10003;</span>
  <span class="kw">const</span> user = <span class="kw">await</span> userService.create(req.body);
  res.status(<span class="num">201</span>).json(user);
}</pre></div>

        <div class="card" style="border-color:rgba(74,222,144,.25);background:var(--green-bg);margin-top:10px;">
          <div class="card-title">&#10003; The manual approach works but does not scale</div>
          <div class="card-body">Writing validation predicates by hand is error-prone and tedious. For production backends, use a schema validation library — Zod is the best TypeScript-first option and eliminates the duplication between type and validator entirely.</div>
        </div>
      </div>

      <!-- ZOD -->
      <div class="st-pane" id="t12-zod">
        <div class="card hl-purple">
          <div class="card-title">&#128161; Zod — schema validation with automatic type inference</div>
          <div class="card-body">Zod lets you define a schema once and get both the runtime validator <em>and</em> the TypeScript type from it automatically. Zero duplication. The schema IS the type. This is the industry standard for request body validation in TypeScript backends.</div>
        </div>

        <div class="section-label">Installation &amp; basic usage</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">bash</span></div>
        <pre>npm install zod</pre></div>

        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">import</span> { z } <span class="kw">from</span> <span class="str">"zod"</span>;

<span class="cmt">// Define schema once:</span>
<span class="kw">const</span> CreateUserSchema = z.object({
  name:     z.string().min(<span class="num">1</span>, <span class="str">"Name is required"</span>),
  email:    z.string().email(<span class="str">"Invalid email"</span>),
  password: z.string().min(<span class="num">8</span>, <span class="str">"Password too short"</span>),
  role:     z.enum([<span class="str">"admin"</span>, <span class="str">"user"</span>]).default(<span class="str">"user"</span>)
});

<span class="cmt">// Infer the TypeScript type automatically — no duplication:</span>
<span class="kw">type</span> <span class="typ">CreateUserDto</span> = z.infer&lt;<span class="kw">typeof</span> CreateUserSchema&gt;;
<span class="cmt">// { name: string; email: string; password: string; role: "admin" | "user" }</span>

<span class="cmt">// Parse &amp; validate at runtime:</span>
<span class="kw">const</span> result = CreateUserSchema.safeParse(req.body);
<span class="kw">if</span> (!result.success) {
  res.status(<span class="num">400</span>).json({ errors: result.error.flatten() }); <span class="kw">return</span>;
}
<span class="cmt">// result.data is typed as CreateUserDto &#10003;</span>
<span class="kw">const</span> user = <span class="kw">await</span> userService.create(result.data);</pre></div>

        <div class="section-label">Zod middleware — validate before controller runs</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">import</span> { z, ZodSchema } <span class="kw">from</span> <span class="str">"zod"</span>;
<span class="kw">import</span> { Request, Response, NextFunction } <span class="kw">from</span> <span class="str">"express"</span>;

<span class="cmt">// Reusable validation middleware factory:</span>
<span class="kw">function</span> validate&lt;T&gt;(schema: ZodSchema&lt;T&gt;) {
  <span class="kw">return</span> (req: Request, res: Response, next: NextFunction): <span class="typ">void</span> => {
    <span class="kw">const</span> result = schema.safeParse(req.body);
    <span class="kw">if</span> (!result.success) {
      res.status(<span class="num">400</span>).json({
        error: <span class="str">"Validation failed"</span>,
        details: result.error.flatten().fieldErrors
      });
      <span class="kw">return</span>;
    }
    req.body = result.data; <span class="cmt">// replace with parsed &amp; typed data</span>
    next();
  };
}

<span class="cmt">// Usage in router — clean separation of concerns:</span>
router.post(<span class="str">"/users"</span>,
  validate(CreateUserSchema),
  createUser          <span class="cmt">// body is already validated here</span>
);
router.put(<span class="str">"/users/:id"</span>,
  validate(UpdateUserSchema),
  updateUser
);</pre></div>

        <div class="section-label">Common Zod schema patterns</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">const</span> schemas = {
  <span class="cmt">// Strings with constraints:</span>
  username:  z.string().min(<span class="num">3</span>).max(<span class="num">20</span>).regex(<span class="str">/^[a-z0-9_]+$/</span>),
  password:  z.string().min(<span class="num">8</span>).max(<span class="num">128</span>),
  email:     z.string().email(),
  url:       z.string().url(),
  uuid:      z.string().uuid(),

  <span class="cmt">// Numbers:</span>
  age:       z.number().int().min(<span class="num">0</span>).max(<span class="num">150</span>),
  price:     z.number().positive().multipleOf(<span class="num">0.01</span>),

  <span class="cmt">// Arrays:</span>
  tags:      z.array(z.string()).max(<span class="num">10</span>),
  ids:       z.array(z.number().int().positive()),

  <span class="cmt">// Optional with default:</span>
  page:      z.number().int().positive().default(<span class="num">1</span>),
  limit:     z.number().int().min(<span class="num">1</span>).max(<span class="num">100</span>).default(<span class="num">20</span>),

  <span class="cmt">// Transforms — coerce query string to number:</span>
  pageQuery: z.string().transform(Number).pipe(z.number().positive())
};</pre></div>
      </div>

      <!-- NESTED & ARRAYS -->
      <div class="st-pane" id="t12-nested">
        <div class="section-label">Nested object types</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">const</span> AddressSchema = z.object({
  street:  z.string().min(<span class="num">1</span>),
  city:    z.string().min(<span class="num">1</span>),
  country: z.string().length(<span class="num">2</span>), <span class="cmt">// ISO country code</span>
  zip:     z.string().regex(<span class="str">/^\d{5}(-\d{4})?$/</span>)
});

<span class="kw">const</span> OrderSchema = z.object({
  items: z.array(z.object({
    productId: z.number().int().positive(),
    quantity:  z.number().int().min(<span class="num">1</span>),
    notes:     z.string().optional()
  })).min(<span class="num">1</span>, <span class="str">"Order must have at least 1 item"</span>),
  shippingAddress: AddressSchema,
  billingAddress:  AddressSchema.optional(),
  couponCode:      z.string().optional()
});

<span class="kw">type</span> <span class="typ">Order</span> = z.infer&lt;<span class="kw">typeof</span> OrderSchema&gt;;
<span class="cmt">// Everything fully typed — nested objects and arrays included &#10003;</span></pre></div>

        <div class="section-label">Union request bodies — different shapes for different cases</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="cmt">// Different payload shapes for different auth methods:</span>
<span class="kw">const</span> LoginSchema = z.discriminatedUnion(<span class="str">"method"</span>, [
  z.object({
    method:   z.literal(<span class="str">"password"</span>),
    email:    z.string().email(),
    password: z.string().min(<span class="num">1</span>)
  }),
  z.object({
    method: z.literal(<span class="str">"otp"</span>),
    phone:  z.string().regex(<span class="str">/^\+\d{10,14}$/</span>),
    otp:    z.string().length(<span class="num">6</span>)
  }),
  z.object({
    method: z.literal(<span class="str">"oauth"</span>),
    provider: z.enum([<span class="str">"google"</span>, <span class="str">"github"</span>]),
    code:     z.string().min(<span class="num">1</span>)
  })
]);

<span class="kw">type</span> <span class="typ">LoginDto</span> = z.infer&lt;<span class="kw">typeof</span> LoginSchema&gt;;
<span class="cmt">// Fully typed discriminated union — switch on method &#10003;</span></pre></div>

        <div class="section-label">Response shaping — what you send back</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="cmt">// Type the response body generically:</span>
<span class="kw">interface</span> <span class="typ">ApiResponse</span>&lt;T&gt; {
  data:      T;
  message?:  <span class="typ">string</span>;
  timestamp: <span class="typ">string</span>;
}

<span class="kw">interface</span> <span class="typ">PaginatedResponse</span>&lt;T&gt; {
  data:   T[];
  total:  <span class="typ">number</span>;
  page:   <span class="typ">number</span>;
  pages:  <span class="typ">number</span>;
  limit:  <span class="typ">number</span>;
}

<span class="cmt">// Typed response helpers:</span>
<span class="kw">function</span> ok&lt;T&gt;(res: Response, data: T, status = <span class="num">200</span>): <span class="typ">void</span> {
  res.status(status).json({
    data,
    timestamp: <span class="kw">new</span> <span class="typ">Date</span>().toISOString()
  } <span class="kw">satisfies</span> <span class="typ">ApiResponse</span>&lt;T&gt;);
}

<span class="cmt">// satisfies keyword (TS 4.9+) checks the shape</span>
<span class="cmt">// without widening the type — best of both worlds</span></pre></div>
      </div>

    content: `
      <div class="card hl-purple">

        <div class="card-body">TypeScript classes give you three things functions alone cannot: <strong>encapsulation</strong> (hide internal state), <strong>contracts</strong> (implement interfaces), and <strong>inheritance</strong> (share behaviour). In a backend context they model services, repositories, and controllers cleanly — especially when combined with dependency injection.</div>

      <div class="st-bar">

        <button class="st-btn"    onclick="stTab('t13','readonly13')">readonly &amp; static</button>
