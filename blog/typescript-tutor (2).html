            <div class="col-label">Primitive unions</div>
            <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
            <pre><span class="kw">type</span> <span class="typ">ID</span>     = <span class="typ">string</span> | <span class="typ">number</span>;
<span class="kw">type</span> <span class="typ">Status</span> = <span class="str">"active"</span> | <span class="str">"inactive"</span> | <span class="str">"pending"</span>;
<span class="kw">type</span> <span class="typ">Bit</span>    = <span class="num">0</span> | <span class="num">1</span>;

<span class="kw">let</span> id: <span class="typ">ID</span> = <span class="str">"abc-123"</span>;
id = <span class="num">42</span>;           <span class="ok">// &#10003; also valid</span>
id = <span class="err">true</span>;        <span class="err">// &#10007; boolean not in union</span>

<span class="kw">let</span> s: <span class="typ">Status</span> = <span class="str">"active"</span>;
s = <span class="str">"pending"</span>;    <span class="ok">// &#10003;</span>
s = <span class="err"><span class="str">"deleted"</span></span>;   <span class="err">// &#10007; not in union</span></pre></div>
          </div>
          <div>
            <div class="col-label">The shared-members rule</div>
            <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
            <pre><span class="kw">function</span> printId(id: <span class="typ">string</span> | <span class="typ">number</span>) {
  <span class="cmt">// Only methods on BOTH types are safe:</span>
  id.toString();    <span class="ok">// &#10003; both have toString</span>
  id.toUpperCase(); <span class="err">// &#10007; number has no toUpperCase</span>
  id.toFixed();     <span class="err">// &#10007; string has no toFixed</span>

  <span class="cmt">// After narrowing, full access:</span>
  <span class="kw">if</span> (<span class="kw">typeof</span> id === <span class="str">"string"</span>) {
    id.toUpperCase(); <span class="ok">// &#10003; id: string here</span>
  } <span class="kw">else</span> {
    id.toFixed(<span class="num">2</span>);   <span class="ok">// &#10003; id: number here</span>
  }
}</pre></div>
          </div>
        </div>

        <div class="section-label">Object unions</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">type</span> <span class="typ">StringInput</span> = { type: <span class="str">"string"</span>; value: <span class="typ">string</span>; minLength?: <span class="typ">number</span> };
<span class="kw">type</span> <span class="typ">NumberInput</span> = { type: <span class="str">"number"</span>; value: <span class="typ">number</span>; min?: <span class="typ">number</span>; max?: <span class="typ">number</span> };
<span class="kw">type</span> <span class="typ">Input</span> = <span class="typ">StringInput</span> | <span class="typ">NumberInput</span>;

<span class="kw">function</span> validate(input: <span class="typ">Input</span>) {
  <span class="cmt">// Only 'type' and 'value' exist on both — safe without narrowing:</span>
  console.log(input.type);       <span class="ok">// &#10003; shared</span>
  console.log(input.value);      <span class="ok">// &#10003; shared (string | number)</span>
  console.log(input.minLength);  <span class="err">// &#10007; only on StringInput</span>
  console.log(input.min);        <span class="err">// &#10007; only on NumberInput</span>
}</pre></div>
      </div>

      <!-- DISCRIMINATED UNIONS -->
      <div class="st-pane" id="t08-discriminated">
        <div class="card hl-purple">
          <div class="card-title">&#128273; Discriminated unions — the most powerful TypeScript pattern</div>
          <div class="card-body">Add a shared <strong>literal property</strong> (the discriminant) to each variant. TypeScript reads it at the narrowing point and automatically knows exactly which variant you\'re in — giving you full access to that variant's exclusive properties.</div>
        </div>

        <div class="section-label">The pattern</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="cmt">// Each variant has a unique literal 'kind' field — the discriminant</span>
<span class="kw">type</span> <span class="typ">Shape</span> =
  | { kind: <span class="str">"circle"</span>;    radius: <span class="typ">number</span> }
  | { kind: <span class="str">"rectangle"</span>; width: <span class="typ">number</span>; height: <span class="typ">number</span> }
  | { kind: <span class="str">"triangle"</span>;  base: <span class="typ">number</span>;  height: <span class="typ">number</span> };

<span class="kw">function</span> area(shape: <span class="typ">Shape</span>): <span class="typ">number</span> {
  <span class="kw">switch</span> (shape.kind) {
    <span class="kw">case</span> <span class="str">"circle"</span>:
      <span class="cmt">// shape: { kind: "circle", radius: number }</span>
      <span class="kw">return</span> Math.PI * shape.radius ** <span class="num">2</span>;

    <span class="kw">case</span> <span class="str">"rectangle"</span>:
      <span class="cmt">// shape: { kind: "rectangle", width: number, height: number }</span>
      <span class="kw">return</span> shape.width * shape.height;

    <span class="kw">case</span> <span class="str">"triangle"</span>:
      <span class="kw">return</span> <span class="num">0.5</span> * shape.base * shape.height;
  }
}
<span class="cmt">// Add "pentagon" to Shape → TS forces you to handle it everywhere</span></pre></div>

        <div class="section-label">Real-world: API result type</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">type</span> <span class="typ">ApiResult</span>&lt;T&gt; =
  | { status: <span class="str">"success"</span>; data: T;            }
  | { status: <span class="str">"error"</span>;   error: <span class="typ">string</span>; code: <span class="typ">number</span> }
  | { status: <span class="str">"loading"</span>;                      };

<span class="kw">function</span> render&lt;T&gt;(result: <span class="typ">ApiResult</span>&lt;T&gt;) {
  <span class="kw">switch</span> (result.status) {
    <span class="kw">case</span> <span class="str">"success"</span>: <span class="kw">return</span> renderData(result.data);
    <span class="kw">case</span> <span class="str">"error"</span>:   <span class="kw">return</span> renderError(result.error, result.code);
    <span class="kw">case</span> <span class="str">"loading"</span>: <span class="kw">return</span> renderSpinner();
  }
}
<span class="cmt">// result.data and result.error are ONLY available</span>
<span class="cmt">// inside their respective cases — zero chance of confusion</span></pre></div>

        <div class="section-label">Real-world: Redux-style actions</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">type</span> <span class="typ">Action</span> =
  | { type: <span class="str">"SET_USER"</span>;    payload: <span class="typ">User</span>    }
  | { type: <span class="str">"SET_LOADING"</span>; payload: <span class="typ">boolean</span> }
  | { type: <span class="str">"CLEAR_USER"</span>                    };

<span class="kw">function</span> reducer(state: <span class="typ">State</span>, action: <span class="typ">Action</span>): <span class="typ">State</span> {
  <span class="kw">switch</span> (action.type) {
    <span class="kw">case</span> <span class="str">"SET_USER"</span>:
      <span class="kw">return</span> { ...state, user: action.payload }; <span class="cmt">// payload: User</span>
    <span class="kw">case</span> <span class="str">"SET_LOADING"</span>:
      <span class="kw">return</span> { ...state, loading: action.payload }; <span class="cmt">// payload: boolean</span>
    <span class="kw">case</span> <span class="str">"CLEAR_USER"</span>:
      <span class="kw">return</span> { ...state, user: <span class="kw">null</span> };          <span class="cmt">// no payload</span>
  }
}</pre></div>

        <div class="card" style="border-color:rgba(107,140,255,.3);background:var(--blue-bg);margin-top:10px;">
          <div class="card-title">Why the discriminant must be a literal type</div>
          <div class="card-body">The discriminant field must be a <strong>string or number literal</strong> (e.g. <code>"circle"</code>), not just <code>string</code>. TypeScript uses the exact literal value to differentiate variants. If you use <code>kind: string</code> on all variants, narrowing won\'t work — every case would still be the full union.</div>
        </div>
      </div>

      <!-- INTERSECTION -->
      <div class="st-pane" id="t08-intersection">
        <div class="card hl-purple">
          <div class="card-title">&#128161; Intersection = AND</div>
          <div class="card-body">An intersection type <code>A &amp; B</code> means a value must satisfy <em>both</em> A and B simultaneously. It combines all properties from all intersected types into one. Think of it as merging objects at the type level.</div>
        </div>

        <div class="section-label">Basic intersection</div>
        <div class="two-col">
          <div>
            <div class="col-label">Combining object types</div>
            <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
            <pre><span class="kw">type</span> <span class="typ">Person</span> = {
  name: <span class="typ">string</span>;
  age:  <span class="typ">number</span>;
};
<span class="kw">type</span> <span class="typ">Employee</span> = {
  company: <span class="typ">string</span>;
  role:    <span class="typ">string</span>;
};

<span class="kw">type</span> <span class="typ">Worker</span> = <span class="typ">Person</span> &amp; <span class="typ">Employee</span>;
<span class="cmt">// Must have ALL FOUR: name, age, company, role</span>

<span class="kw">const</span> w: <span class="typ">Worker</span> = {
  name: <span class="str">"Alice"</span>, age: <span class="num">30</span>,
  company: <span class="str">"Acme"</span>, role: <span class="str">"Eng"</span>
}; <span class="ok">// &#10003;</span></pre></div>
          </div>
          <div>
            <div class="col-label">Mixin pattern</div>
            <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
            <pre><span class="cmt">// Attach capabilities to any type:</span>
<span class="kw">type</span> <span class="typ">Timestamped</span> = {
  createdAt: <span class="typ">Date</span>;
  updatedAt: <span class="typ">Date</span>;
};
<span class="kw">type</span> <span class="typ">SoftDelete</span> = {
  deletedAt: <span class="typ">Date</span> | <span class="kw">null</span>;
};

<span class="kw">type</span> <span class="typ">UserRecord</span> = <span class="typ">User</span>
  &amp; <span class="typ">Timestamped</span>
  &amp; <span class="typ">SoftDelete</span>;

<span class="kw">type</span> <span class="typ">PostRecord</span> = <span class="typ">Post</span>
  &amp; <span class="typ">Timestamped</span>
  &amp; <span class="typ">SoftDelete</span>;</pre></div>
          </div>
        </div>

        <div class="section-label">Intersection vs interface extends — the key difference</div>
        <div class="two-col">
          <div>
            <div class="col-label">interface extends — conflict errors immediately</div>
            <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
            <pre><span class="kw">interface</span> <span class="typ">A</span> { x: <span class="typ">string</span> }
<span class="kw">interface</span> <span class="typ">B</span> <span class="kw">extends</span> <span class="typ">A</span> {
  x: <span class="err">number</span>;
}
<span class="err">// &#10007; Error right here — x is
// incompatible with base type A</span></pre></div>
          </div>
          <div>
            <div class="col-label">type intersection — conflict becomes never</div>
            <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
            <pre><span class="kw">type</span> <span class="typ">A</span> = { x: <span class="typ">string</span> };
<span class="kw">type</span> <span class="typ">B</span> = <span class="typ">A</span> &amp; { x: <span class="typ">number</span> };
<span class="cmt">// x: string &amp; number = never
// No error here — fails later:</span>
<span class="kw">const</span> b: <span class="typ">B</span> = { x: <span class="err">42</span> }; <span class="err">// &#10007; here</span></pre></div>
          </div>
        </div>
      </div>

      <!-- CONFLICTS & NEVER -->
      <div class="st-pane" id="t08-conflicts">
        <div class="card hl-purple">
          <div class="card-title">&#128161; When intersections produce never</div>
          <div class="card-body">Intersecting incompatible primitive types always produces <code>never</code>. This is TypeScript\'s way of saying "no value can satisfy both constraints simultaneously." It's not a bug — it\'s an accurate reflection of an impossible type.</div>
        </div>

        <div class="section-label">Primitive intersection = never</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">type</span> <span class="typ">A</span>  = <span class="typ">string</span> &amp; <span class="typ">number</span>;   <span class="cmt">// never — no value is both</span>
<span class="kw">type</span> <span class="typ">B</span>  = <span class="str">"a"</span>    &amp; <span class="str">"b"</span>;      <span class="cmt">// never — can\'t be both literals</span>
<span class="kw">type</span> <span class="typ">C</span>  = <span class="typ">string</span> &amp; <span class="str">"hello"</span>;  <span class="cmt">// "hello" — a subtype, valid!</span>

<span class="cmt">// Object intersections: same-name props get intersected:</span>
<span class="kw">type</span> <span class="typ">X</span> = { id: <span class="typ">string</span>; name: <span class="typ">string</span> };
<span class="kw">type</span> <span class="typ">Y</span> = { id: <span class="typ">number</span>; role: <span class="typ">string</span> };
<span class="kw">type</span> <span class="typ">XY</span> = <span class="typ">X</span> &amp; <span class="typ">Y</span>;
<span class="cmt">// { id: string &amp; number; name: string; role: string }
//   id: never ← impossible! name and role are fine.</span></pre></div>

        <div class="section-label">Using never for exhaustive checking</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">function</span> assertNever(x: <span class="typ">never</span>): <span class="typ">never</span> {
  <span class="kw">throw new</span> Error(<span class="str">"Unhandled case: "</span> + JSON.stringify(x));
}

<span class="kw">type</span> <span class="typ">Direction</span> = <span class="str">"north"</span> | <span class="str">"south"</span> | <span class="str">"east"</span> | <span class="str">"west"</span>;

<span class="kw">function</span> move(dir: <span class="typ">Direction</span>): <span class="typ">string</span> {
  <span class="kw">switch</span> (dir) {
    <span class="kw">case</span> <span class="str">"north"</span>: <span class="kw">return</span> <span class="str">"Moving north"</span>;
    <span class="kw">case</span> <span class="str">"south"</span>: <span class="kw">return</span> <span class="str">"Moving south"</span>;
    <span class="kw">case</span> <span class="str">"east"</span>:  <span class="kw">return</span> <span class="str">"Moving east"</span>;
    <span class="kw">case</span> <span class="str">"west"</span>:  <span class="kw">return</span> <span class="str">"Moving west"</span>;
    <span class="kw">default</span>: <span class="kw">return</span> assertNever(dir);
    <span class="cmt">// dir is never here — all cases handled ✓
    // Add "up" to Direction → compile error immediately</span>
  }
}</pre></div>

        <div class="section-label">Overriding one property via intersection</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="cmt">// Common pattern: widen or override a single prop in a type</span>
<span class="kw">type</span> <span class="typ">WithStringId</span>&lt;T&gt; = <span class="typ">Omit</span>&lt;T, <span class="str">"id"</span>&gt; &amp; { id: <span class="typ">string</span> };

<span class="kw">interface</span> <span class="typ">DbUser</span> { id: <span class="typ">number</span>; name: <span class="typ">string</span>; email: <span class="typ">string</span> }

<span class="kw">type</span> <span class="typ">ApiUser</span> = <span class="typ">WithStringId</span>&lt;<span class="typ">DbUser</span>&gt;;
<span class="cmt">// { id: string; name: string; email: string }
// id changed from number → string, rest preserved</span></pre></div>
      </div>

      <!-- REAL-WORLD PATTERNS -->
      <div class="st-pane" id="t08-patterns">
        <div class="section-label">Pattern 1 — Result / Either type</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">type</span> <span class="typ">Result</span>&lt;T, E = <span class="typ">string</span>&gt; =
  | { ok: <span class="kw">true</span>;  value: T }
  | { ok: <span class="kw">false</span>; error: E };

<span class="kw">async function</span> fetchUser(id: <span class="typ">number</span>): <span class="typ">Promise</span>&lt;<span class="typ">Result</span>&lt;<span class="typ">User</span>&gt;&gt; {
  <span class="kw">try</span> {
    <span class="kw">const</span> user = <span class="kw">await</span> db.findUser(id);
    <span class="kw">return</span> { ok: <span class="kw">true</span>, value: user };
  } <span class="kw">catch</span> (e) {
    <span class="kw">return</span> { ok: <span class="kw">false</span>, error: <span class="str">"User not found"</span> };
  }
}

<span class="kw">const</span> result = <span class="kw">await</span> fetchUser(<span class="num">1</span>);
<span class="kw">if</span> (result.ok) {
  console.log(result.value.name); <span class="ok">// &#10003; value: User</span>
} <span class="kw">else</span> {
  console.log(result.error);      <span class="ok">// &#10003; error: string</span>
}</pre></div>

        <div class="section-label">Pattern 2 — Event system with discriminated union</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">type</span> <span class="typ">AppEvent</span> =
  | { type: <span class="str">"USER_LOGIN"</span>;   userId: <span class="typ">string</span>; timestamp: <span class="typ">Date</span> }
  | { type: <span class="str">"USER_LOGOUT"</span>;  userId: <span class="typ">string</span>; reason: <span class="typ">string</span>  }
  | { type: <span class="str">"PAGE_VIEW"</span>;    path: <span class="typ">string</span>;   duration: <span class="typ">number</span> }
  | { type: <span class="str">"ERROR"</span>;        message: <span class="typ">string</span>; stack?: <span class="typ">string</span>  };

<span class="kw">function</span> trackEvent(event: <span class="typ">AppEvent</span>) {
  <span class="kw">switch</span> (event.type) {
    <span class="kw">case</span> <span class="str">"USER_LOGIN"</span>:
      analytics.track(<span class="str">"login"</span>, { id: event.userId }); <span class="kw">break</span>;
    <span class="kw">case</span> <span class="str">"PAGE_VIEW"</span>:
      analytics.page(event.path, event.duration);       <span class="kw">break</span>;
    <span class="cmt">// ... each case only sees its own properties</span>
  }
}</pre></div>

        <div class="section-label">Pattern 3 — Compose types via intersection</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="cmt">// Composable "capability" types</span>
<span class="kw">type</span> <span class="typ">Identifiable</span> = { id:        <span class="typ">string</span> };
<span class="kw">type</span> <span class="typ">Timestamped</span>  = { createdAt: <span class="typ">Date</span>; updatedAt: <span class="typ">Date</span> };
<span class="kw">type</span> <span class="typ">Auditable</span>    = { createdBy: <span class="typ">string</span>; updatedBy: <span class="typ">string</span> };
<span class="kw">type</span> <span class="typ">SoftDeletable</span>= { deletedAt: <span class="typ">Date</span> | <span class="kw">null</span> };

<span class="cmt">// Mix and match:</span>
<span class="kw">type</span> <span class="typ">UserRecord</span> = <span class="typ">User</span> &amp; <span class="typ">Identifiable</span> &amp; <span class="typ">Timestamped</span> &amp; <span class="typ">Auditable</span>;
<span class="kw">type</span> <span class="typ">PostRecord</span> = <span class="typ">Post</span> &amp; <span class="typ">Identifiable</span> &amp; <span class="typ">Timestamped</span> &amp; <span class="typ">SoftDeletable</span>;
<span class="kw">type</span> <span class="typ">LogRecord</span>  = <span class="typ">Log</span>  &amp; <span class="typ">Identifiable</span> &amp; <span class="typ">Timestamped</span>;</pre></div>

        <div class="card" style="border-color:rgba(74,222,144,.25);background:var(--green-bg);margin-top:10px;">
          <div class="card-title">&#10003; Mental model summary</div>
          <div class="card-body">
            <strong>Union (|)</strong> — model values that can be one of several shapes. Use with a discriminant field for clean narrowing.<br/>
            <strong>Intersection (&amp;)</strong> — model values that must be all of several shapes at once. Use to compose capabilities onto a base type.
          </div>
        </div>
      </div>

      <!-- QUIZ -->
      <div class="st-pane" id="t08-quiz08">
        <div id="quiz08-out"></div>
      </div>
    `
  }
,

  /* ══ TOPIC 09 — ENUMS & BETTER ALTERNATIVES ══ */
  {
    num: '09', tag: 'Enums', title: 'Enums <em>&amp;</em> Better Alternatives',
    desc: 'Enums look convenient until you see their quirks. Most TypeScript experts now prefer union types or const objects. Here\'s why — with every edge case shown.',
    content: `
      <div class="st-bar">
        <button class="st-btn on" onclick="stTab('t09','numeric')">numeric enums</button>
        <button class="st-btn"    onclick="stTab('t09','string')">string enums</button>
        <button class="st-btn"    onclick="stTab('t09','problems')">the problems</button>
        <button class="st-btn"    onclick="stTab('t09','union')">union alternative</button>
        <button class="st-btn"    onclick="stTab('t09','const')">const object alternative</button>
        <button class="st-btn"    onclick="stTab('t09','compare')">comparison table</button>
        <button class="st-btn"    onclick="stTab('t09','quiz09')">quiz</button>
      </div>

      <!-- NUMERIC ENUMS -->
      <div class="st-pane on" id="t09-numeric">
        <div class="card hl-purple">
          <div class="card-title">&#128161; What a numeric enum is</div>
          <div class="card-body">TypeScript\'s <code>enum</code> keyword creates a named set of constants. By default, members are assigned incrementing numbers starting from 0. The compiled JavaScript output includes a full object with both forward and reverse mappings.</div>
        </div>

        <div class="section-label">Basic numeric enum</div>
        <div class="two-col">
          <div>
            <div class="col-label">TypeScript source</div>
            <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
            <pre><span class="kw">enum</span> <span class="typ">Direction</span> {
  Up,     <span class="cmt">// 0</span>
  Down,   <span class="cmt">// 1</span>
  Left,   <span class="cmt">// 2</span>
  Right   <span class="cmt">// 3</span>
}

<span class="cmt">// Usage:</span>
<span class="typ">Direction</span>.Up     <span class="cmt">// 0</span>
<span class="typ">Direction</span>.Right  <span class="cmt">// 3</span>
<span class="kw">typeof</span> <span class="typ">Direction</span>.Up  <span class="cmt">// "number"</span>

<span class="cmt">// Reverse mapping:</span>
<span class="typ">Direction</span>[<span class="num">0</span>]     <span class="cmt">// "Up"</span>
<span class="typ">Direction</span>[<span class="str">"Up"</span>] <span class="cmt">// 0</span>

<span class="cmt">// Custom starting value:</span>
<span class="kw">enum</span> <span class="typ">HttpStatus</span> {
  OK        = <span class="num">200</span>,
  NotFound  = <span class="num">404</span>,
  ServerErr = <span class="num">500</span>
}</pre></div>
          </div>
          <div>
            <div class="col-label">What TypeScript compiles this to</div>
            <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript (compiled output)</span></div>
            <pre><span class="cmt">// enum Direction becomes this JS:</span>
<span class="kw">var</span> Direction;
(<span class="kw">function</span>(Direction) {
  Direction[Direction[<span class="str">"Up"</span>]    = <span class="num">0</span>] = <span class="str">"Up"</span>;
  Direction[Direction[<span class="str">"Down"</span>]  = <span class="num">1</span>] = <span class="str">"Down"</span>;
  Direction[Direction[<span class="str">"Left"</span>]  = <span class="num">2</span>] = <span class="str">"Left"</span>;
  Direction[Direction[<span class="str">"Right"</span>] = <span class="num">3</span>] = <span class="str">"Right"</span>;
})(Direction || (Direction = {}));

<span class="cmt">// This IIFE pattern runs at runtime.
// Every numeric enum adds this code
// to your JavaScript bundle.</span></pre></div>
          </div>
        </div>
        <div class="card" style="border-color:rgba(251,191,36,.25);background:var(--amber-bg);margin-top:10px;">
          <div class="card-title">&#9888;&#65039; Reverse mapping doubles the object</div>
          <div class="card-body">The compiled object maps both <code>Direction[0] = "Up"</code> AND <code>Direction["Up"] = 0</code>. This reverse mapping is a runtime feature — useful for debugging but it means every numeric enum ships twice as much data as you'd expect.</div>
        </div>
      </div>

      <!-- STRING ENUMS -->
      <div class="st-pane" id="t09-string">
        <div class="card" style="border-color:rgba(74,222,144,.25);background:var(--green-bg);">
          <div class="card-title">String enums — safer but still verbose</div>
          <div class="card-body">String enums require explicit values and are type-safe — arbitrary strings are rejected. No reverse mapping is generated. They produce readable values in logs and network payloads. But they still ship a runtime JS object.</div>
        </div>

        <div class="two-col">
          <div>
            <div class="col-label">TypeScript source</div>
            <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
            <pre><span class="kw">enum</span> <span class="typ">Status</span> {
  Active   = <span class="str">"ACTIVE"</span>,
  Inactive = <span class="str">"INACTIVE"</span>,
  Pending  = <span class="str">"PENDING"</span>
}

<span class="kw">function</span> setStatus(s: <span class="typ">Status</span>) { }

<span class="cmt">// Only enum members accepted:</span>
setStatus(<span class="typ">Status</span>.Active);  <span class="ok">// &#10003;</span>
setStatus(<span class="err"><span class="str">"ACTIVE"</span></span>);        <span class="err">// &#10007; string not assignable</span>
setStatus(<span class="err"><span class="str">"anything"</span></span>);     <span class="err">// &#10007; correctly rejected</span>

<span class="cmt">// typeof Status.Active is "string"</span></pre></div>
          </div>
          <div>
            <div class="col-label">Compiled JavaScript</div>
            <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript (compiled output)</span></div>
            <pre><span class="cmt">// No reverse mapping — cleaner:</span>
<span class="kw">var</span> Status;
(<span class="kw">function</span>(Status) {
  Status[<span class="str">"Active"</span>]   = <span class="str">"ACTIVE"</span>;
  Status[<span class="str">"Inactive"</span>] = <span class="str">"INACTIVE"</span>;
  Status[<span class="str">"Pending"</span>]  = <span class="str">"PENDING"</span>;
})(Status || (Status = {}));

<span class="cmt">// Still an IIFE — still runtime code
// Still can\'t pass plain strings:
// setStatus("ACTIVE") &#10007;
// This is a common frustration when
// consuming string enums from APIs</span></pre></div>
          </div>
        </div>

        <div class="section-label">const enum — compile-time only (inlined)</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="cmt">// const enum is inlined — zero runtime object:</span>
<span class="kw">const enum</span> <span class="typ">Direction</span> {
  Up = <span class="str">"UP"</span>, Down = <span class="str">"DOWN"</span>
}

<span class="kw">const</span> d = <span class="typ">Direction</span>.Up;
<span class="cmt">// Compiles to: const d = "UP"
// No object, no IIFE — just the literal value inline</span>

<span class="cmt">// &#9888; Caveat: const enums break with isolatedModules
// (required by Babel, Vite, esbuild, SWC)
// They also can\'t be used in .d.ts files safely</span></pre></div>
      </div>

      <!-- THE PROBLEMS -->
      <div class="st-pane" id="t09-problems">
        <div class="card" style="border-color:rgba(248,113,113,.25);background:var(--red-bg);">
          <div class="card-title">&#10060; The real problems with enums</div>
          <div class="card-body">Three concrete issues that bite developers in production. Understanding these is why the TypeScript community has broadly moved toward alternatives.</div>
        </div>

        <div class="section-label">Problem 1 — Numeric enums are not type-safe</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">enum</span> <span class="typ">Direction</span> { Up, Down, Left, Right }

<span class="kw">function</span> move(dir: <span class="typ">Direction</span>): <span class="typ">string</span> {
  <span class="kw">return</span> <span class="str">"moving"</span>;
}

move(<span class="typ">Direction</span>.Up);  <span class="ok">// &#10003; correct usage</span>
move(<span class="num">0</span>);             <span class="ok">// &#10003; TS allows this — same as Direction.Up</span>
move(<span class="num">999</span>);           <span class="ok">// &#10003; TS allows this — 999 is not a valid Direction!</span>
move(<span class="num">-1</span>);            <span class="ok">// &#10003; TS allows this too!</span>

<span class="cmt">// Any number is assignable to a numeric enum.
// This defeats the entire purpose of using an enum
// for safety — you gain naming but not protection.</span></pre></div>

        <div class="section-label">Problem 2 — String enums reject plain string literals</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">enum</span> <span class="typ">Status</span> { Active = <span class="str">"ACTIVE"</span>, Inactive = <span class="str">"INACTIVE"</span> }

<span class="kw">function</span> setStatus(s: <span class="typ">Status</span>) { }

<span class="cmt">// API returns { status: "ACTIVE" } — a plain string
const apiStatus = await fetchStatus(); // type: string</span>

setStatus(apiStatus);       <span class="err">// &#10007; string not assignable to Status</span>
setStatus(<span class="err"><span class="str">"ACTIVE"</span></span>);       <span class="err">// &#10007; even the exact value is rejected!</span>

<span class="cmt">// You're forced to cast:</span>
setStatus(apiStatus <span class="kw">as</span> <span class="typ">Status</span>);  <span class="ok">// &#10003; but now safety is gone</span>

<span class="cmt">// This friction is especially painful when working
// with REST APIs, databases, or external data sources.</span></pre></div>

        <div class="section-label">Problem 3 — Runtime footprint &amp; bundle weight</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="cmt">// Every enum becomes an IIFE in the JS output.
// In a large codebase with 50 enums, that\'s 50 IIFEs
// running at startup — none of which are needed if you
// just want named string constants.

// Also: enums don\'t tree-shake well.
// Even if you only use Direction.Up,
// the entire Direction object is included in your bundle.</span>

<span class="cmt">// Compare: a union type produces ZERO bytes of JS output.</span>
<span class="kw">type</span> <span class="typ">Direction</span> = <span class="str">"up"</span> | <span class="str">"down"</span> | <span class="str">"left"</span> | <span class="str">"right"</span>;
<span class="cmt">// ↑ This disappears entirely at compile time.</span></pre></div>

        <div class="card" style="border-color:rgba(251,191,36,.25);background:var(--amber-bg);margin-top:10px;">
          <div class="card-title">&#9888;&#65039; The const enum trap</div>
          <div class="card-body"><code>const enum</code> solves the runtime footprint by inlining values — but it breaks with <code>isolatedModules: true</code>, which is required by Babel, Vite, esbuild, and SWC. Since most modern toolchains use one of these, <code>const enum</code> is effectively off the table for most projects.</div>
        </div>
      </div>

      <!-- UNION ALTERNATIVE -->
      <div class="st-pane" id="t09-union">
        <div class="card" style="border-color:rgba(74,222,144,.25);background:var(--green-bg);">
          <div class="card-title">&#10003; Union of string literals — the simplest alternative</div>
          <div class="card-body">Zero JavaScript output. Full autocomplete. Plain string literals accepted. Works perfectly with APIs and external data. This is what most modern TypeScript code uses.</div>
        </div>

        <div class="section-label">Basic usage</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="cmt">// Define the type:</span>
<span class="kw">type</span> <span class="typ">Direction</span> = <span class="str">"up"</span> | <span class="str">"down"</span> | <span class="str">"left"</span> | <span class="str">"right"</span>;
<span class="kw">type</span> <span class="typ">Status</span>    = <span class="str">"active"</span> | <span class="str">"inactive"</span> | <span class="str">"pending"</span>;
<span class="kw">type</span> <span class="typ">HttpVerb</span>  = <span class="str">"GET"</span> | <span class="str">"POST"</span> | <span class="str">"PUT"</span> | <span class="str">"DELETE"</span>;

<span class="kw">function</span> move(dir: <span class="typ">Direction</span>): <span class="typ">void</span> { }

move(<span class="str">"up"</span>);        <span class="ok">// &#10003; plain string literal works!</span>
move(<span class="err"><span class="str">"sideways"</span></span>); <span class="err">// &#10007; correctly rejected</span>

<span class="cmt">// Works with API data naturally:</span>
<span class="kw">const</span> apiDir: <span class="typ">string</span> = <span class="kw">await</span> fetchDirection();
<span class="kw">if</span> (apiDir === <span class="str">"up"</span> || apiDir === <span class="str">"down"</span>
 || apiDir === <span class="str">"left"</span> || apiDir === <span class="str">"right"</span>) {
  move(apiDir); <span class="ok">// &#10003; narrowed to Direction</span>
}</pre></div>

        <div class="section-label">Compiled JavaScript — nothing</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript (compiled output)</span></div>
        <pre><span class="cmt">// type Direction = "up" | "down" | "left" | "right"
// compiles to... absolutely nothing.
// Zero bytes. Zero runtime cost.
// The type exists only in TypeScript\'s type checker.</span>

<span class="kw">function</span> move(dir) { }

move(<span class="str">"up"</span>);
<span class="cmt">// That's it. Clean, fast, zero overhead.</span></pre></div>

        <div class="section-label">Exhaustive switch with union types</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">type</span> <span class="typ">Status</span> = <span class="str">"active"</span> | <span class="str">"inactive"</span> | <span class="str">"pending"</span>;

<span class="kw">function</span> getLabel(s: <span class="typ">Status</span>): <span class="typ">string</span> {
  <span class="kw">switch</span> (s) {
    <span class="kw">case</span> <span class="str">"active"</span>:   <span class="kw">return</span> <span class="str">"Active"</span>;
    <span class="kw">case</span> <span class="str">"inactive"</span>: <span class="kw">return</span> <span class="str">"Inactive"</span>;
    <span class="kw">case</span> <span class="str">"pending"</span>:  <span class="kw">return</span> <span class="str">"Pending"</span>;
  }
}
<span class="cmt">// Add "archived" to Status → TS forces you to handle it.
// Exhaustiveness is preserved — same safety as enum.</span></pre></div>
      </div>

      <!-- CONST OBJECT ALTERNATIVE -->
      <div class="st-pane" id="t09-const">
        <div class="card" style="border-color:rgba(74,222,144,.25);background:var(--green-bg);">
          <div class="card-title">&#10003; const object + as const — best of both worlds</div>
          <div class="card-body">When you need dot-notation access at runtime (<code>Direction.Up</code>) AND type safety, use a <code>const</code> object with <code>as const</code> and derive the type from it. You get enum ergonomics without enum quirks.</div>
        </div>

        <div class="section-label">The pattern</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="cmt">// Step 1: define the const object with as const</span>
<span class="kw">const</span> <span class="typ">Direction</span> = {
  Up:    <span class="str">"up"</span>,
  Down:  <span class="str">"down"</span>,
  Left:  <span class="str">"left"</span>,
  Right: <span class="str">"right"</span>
} <span class="kw">as const</span>;
<span class="cmt">// as const freezes every value as a literal type
// Direction.Up is "up" (literal), not string</span>

<span class="cmt">// Step 2: derive the type from the object values</span>
<span class="kw">type</span> <span class="typ">Direction</span> = <span class="kw">typeof</span> <span class="typ">Direction</span>[<span class="kw">keyof typeof</span> <span class="typ">Direction</span>];
<span class="cmt">// → "up" | "down" | "left" | "right"</span>

<span class="cmt">// Step 3: use it</span>
<span class="kw">function</span> move(dir: <span class="typ">Direction</span>): <span class="typ">void</span> { }

move(<span class="typ">Direction</span>.Up); <span class="ok">// &#10003; dot-access works</span>
move(<span class="str">"up"</span>);          <span class="ok">// &#10003; string literal also works</span>
move(<span class="err"><span class="str">"sideways"</span></span>);   <span class="err">// &#10007; correctly rejected</span></pre></div>

        <div class="section-label">Compiled JavaScript — just a plain object</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">javascript (compiled output)</span></div>
        <pre><span class="cmt">// const Direction = { ... } as const compiles to:</span>
<span class="kw">const</span> Direction = {
  Up:    <span class="str">"up"</span>,
  Down:  <span class="str">"down"</span>,
  Left:  <span class="str">"left"</span>,
  Right: <span class="str">"right"</span>
};
<span class="cmt">// No IIFE. No reverse mapping. No self-executing function.
// Just a plain object — exactly what you'd write by hand.
// Tree-shakes perfectly.</span></pre></div>

        <div class="section-label">Real-world example — HTTP methods</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">const</span> HttpMethod = {
  Get:    <span class="str">"GET"</span>,
  Post:   <span class="str">"POST"</span>,
  Put:    <span class="str">"PUT"</span>,
  Delete: <span class="str">"DELETE"</span>,
  Patch:  <span class="str">"PATCH"</span>
} <span class="kw">as const</span>;

<span class="kw">type</span> HttpMethod = <span class="kw">typeof</span> HttpMethod[<span class="kw">keyof typeof</span> HttpMethod];
<span class="cmt">// → "GET" | "POST" | "PUT" | "DELETE" | "PATCH"</span>

<span class="kw">function</span> request(url: <span class="typ">string</span>, method: HttpMethod) { }

request(<span class="str">"/api/users"</span>, HttpMethod.Get);  <span class="ok">// &#10003; dot-access</span>
request(<span class="str">"/api/users"</span>, <span class="str">"GET"</span>);           <span class="ok">// &#10003; plain string too</span>
request(<span class="str">"/api/users"</span>, <span class="err"><span class="str">"CONNECT"</span></span>);      <span class="err">// &#10007; correctly rejected</span></pre></div>
      </div>

      <!-- COMPARISON TABLE -->
      <div class="st-pane" id="t09-compare">
        <table class="compare-table">
          <tr><th>Feature</th><th>numeric enum</th><th>string enum</th><th>const enum</th><th>union type</th><th>const object</th></tr>
          <tr><td>Type-safe</td><td class="no">&#10007; any number works</td><td class="yes">&#10003; yes</td><td class="yes">&#10003; yes</td><td class="yes">&#10003; yes</td><td class="yes">&#10003; yes</td></tr>
          <tr><td>Plain string literals accepted</td><td class="no">&#10007;</td><td class="no">&#10007;</td><td class="no">&#10007;</td><td class="yes">&#10003; yes</td><td class="yes">&#10003; yes</td></tr>
          <tr><td>Dot-access (Foo.Bar)</td><td class="yes">&#10003; yes</td><td class="yes">&#10003; yes</td><td class="yes">&#10003; yes</td><td class="no">&#10007;</td><td class="yes">&#10003; yes</td></tr>
          <tr><td>Runtime JS object</td><td>yes — IIFE</td><td>yes — IIFE</td><td>no — inlined</td><td>no — zero</td><td>yes — plain obj</td></tr>
          <tr><td>Reverse mapping</td><td class="yes">&#10003; yes</td><td class="no">&#10007;</td><td class="no">&#10007;</td><td class="no">&#10007;</td><td class="no">&#10007;</td></tr>
          <tr><td>Works with isolatedModules</td><td class="yes">&#10003;</td><td class="yes">&#10003;</td><td class="no">&#10007; breaks</td><td class="yes">&#10003;</td><td class="yes">&#10003;</td></tr>
          <tr><td>Tree-shakeable</td><td class="no">&#10007; poor</td><td class="no">&#10007; poor</td><td class="yes">&#10003; inlined</td><td class="yes">&#10003; perfect</td><td class="yes">&#10003; good</td></tr>
          <tr><td>Works with APIs / external data</td><td class="no">&#10007;</td><td class="no">&#10007; needs cast</td><td class="no">&#10007;</td><td class="yes">&#10003; yes</td><td class="yes">&#10003; yes</td></tr>
          <tr><td>Recommended</td><td class="no">&#10007; avoid</td><td>sometimes</td><td class="no">&#10007; avoid</td><td class="yes">&#10003; prefer</td><td class="yes">&#10003; prefer</td></tr>
        </table>

        <div class="section-label">When enums ARE still the right choice</div>
        <div class="card hl-blue">
          <div class="card-title">Legitimate enum use cases</div>
          <div class="card-body">
            &#8226; Your ORM or decorator library explicitly requires enum types (TypeORM, NestJS decorators)<br/>
            &#8226; You need reverse mapping (<code>Direction[0] === "Up"</code>) for debugging or serialization<br/>
            &#8226; Your team comes from C#/Java and enum semantics feel natural and reduce friction<br/>
            &#8226; You are writing a library and want to prevent consumers from passing plain string literals
          </div>
        </div>

        <div class="section-label">Quick decision guide</div>
        <div class="cflow">
          <div class="crow">
            <div class="cn"><div class="cnt" style="color:var(--blue);">Need runtime dot-access AND plain string literals?</div><div class="cnb">e.g. both <code>Direction.Up</code> and <code>"up"</code> valid</div></div>
            <div class="carr">&#8594;</div>
            <div class="cout" style="border-color:rgba(74,222,144,.25);background:var(--green-bg);"><div class="cnt" style="color:var(--green);">const object</div><div class="cnb">+ as const</div></div>
          </div>
          <div class="crow">
            <div class="cn"><div class="cnt" style="color:var(--blue);">Just need type safety, no dot-access?</div><div class="cnb">Simple named constants</div></div>
            <div class="carr">&#8594;</div>
            <div class="cout" style="border-color:rgba(74,222,144,.25);background:var(--green-bg);"><div class="cnt" style="color:var(--green);">union type</div><div class="cnb">zero JS output</div></div>
          </div>
          <div class="crow">
            <div class="cn"><div class="cnt" style="color:var(--blue);">ORM / framework requires enum?</div><div class="cnb">e.g. TypeORM column type</div></div>
            <div class="carr">&#8594;</div>
            <div class="cout" style="border-color:rgba(107,140,255,.3);background:var(--blue-bg);"><div class="cnt" style="color:var(--blue);">string enum</div><div class="cnb">explicit values</div></div>
          </div>
        </div>
      </div>

  {
    num: '10', tag: 'Type Narrowing', title: 'Type <em>Narrowing</em>',
    desc: 'Narrowing is how TypeScript refines a broad type into a precise one using runtime checks. It is the bridge between the type world and the real world — and the key to unlocking union types safely.',
    content: `
      <div class="card hl-purple">
        <div class="card-title">&#128161; The core idea</div>
        <div class="card-body">When you have <code>string | number</code>, TypeScript blocks you from calling string-only or number-only methods — because it doesn\'t know which one you have. Narrowing is a runtime check that proves to TypeScript which branch you\'re in. Inside that branch, the type is automatically refined to the specific variant.</div>
      </div>

        <button class="st-btn"    onclick="stTab('t10','instanceof')">instanceof</button>
        <button class="st-btn"    onclick="stTab('t10','in')">in operator</button>
        <button class="st-btn"    onclick="stTab('t10','predicates')">type predicates</button>
        <button class="st-btn"    onclick="stTab('t10','exhaustive')">exhaustive checks</button>
        <button class="st-btn"    onclick="stTab('t10','quiz10')">quiz</button>
      </div>

      <!-- TYPEOF -->
      <div class="st-pane on" id="t10-typeof">
        <div class="card hl-blue">
          <div class="card-title">typeof — the most common narrowing technique</div>
          <div class="card-body">Works for: <code>"string"</code>, <code>"number"</code>, <code>"boolean"</code>, <code>"bigint"</code>, <code>"symbol"</code>, <code>"undefined"</code>, <code>"function"</code>, <code>"object"</code>. Critical caveat: <code>typeof null === "object"</code> — always check for null separately.</div>
        </div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">function</span> format(val: <span class="typ">string</span> | <span class="typ">number</span> | <span class="typ">boolean</span>): <span class="typ">string</span> {
  <span class="kw">if</span> (<span class="kw">typeof</span> val === <span class="str">"string"</span>) {
    <span class="cmt">// val: string — full string API available</span>
    <span class="kw">return</span> val.toUpperCase().trim();
  }
  <span class="kw">if</span> (<span class="kw">typeof</span> val === <span class="str">"number"</span>) {
    <span class="cmt">// val: number — full number API available</span>
    <span class="kw">return</span> val.toFixed(<span class="num">2</span>);
  }
  <span class="cmt">// val: boolean — narrowed by elimination</span>
  <span class="kw">return</span> val ? <span class="str">"yes"</span> : <span class="str">"no"</span>;
}</pre></div>

        <div class="section-label">The null trap — typeof null === "object"</div>
        <div class="two-col">
          <div>
            <div class="col-label">Wrong — null slips through</div>
            <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
            <pre><span class="kw">function</span> getLen(v: <span class="typ">string</span> | <span class="kw">null</span>) {
  <span class="kw">if</span> (<span class="kw">typeof</span> v === <span class="str">"object"</span>) {
    <span class="cmt">// v could be null here!</span>
    v.length; <span class="err">// &#10007; crashes if null</span>
  }
}</pre></div>
          </div>
          <div>
            <div class="col-label">Correct — null checked first</div>
            <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
            <pre><span class="kw">function</span> getLen(v: <span class="typ">string</span> | <span class="kw">null</span>) {
  <span class="kw">if</span> (v === <span class="kw">null</span>) <span class="kw">return</span> <span class="num">0</span>;
  <span class="cmt">// v: string — null excluded</span>
  <span class="kw">return</span> v.length; <span class="ok">// &#10003;</span>
}</pre></div>
          </div>
        </div>

        <div class="section-label">How TypeScript models narrowing — control flow analysis</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">function</span> process(val: <span class="typ">string</span> | <span class="typ">number</span> | <span class="kw">null</span> | <span class="kw">undefined</span>) {
  <span class="cmt">// val: string | number | null | undefined</span>

  <span class="kw">if</span> (val === <span class="kw">null</span> || val === <span class="kw">undefined</span>) <span class="kw">return</span>;
  <span class="cmt">// val: string | number  ← null and undefined eliminated</span>

  <span class="kw">if</span> (<span class="kw">typeof</span> val === <span class="str">"string"</span>) {
    val.toUpperCase(); <span class="ok">// val: string</span>
    <span class="kw">return</span>;
  }
  <span class="cmt">// val: number  ← string eliminated by early return</span>
  val.toFixed(<span class="num">2</span>); <span class="ok">// &#10003;</span>
}</pre></div>
      </div>

      <!-- TRUTHINESS -->
      <div class="st-pane" id="t10-truthiness">
        <div class="card hl-blue">
          <div class="card-title">Truthiness narrowing — if (value)</div>
          <div class="card-body">When you put a value in an <code>if</code> condition, TypeScript eliminates <code>null</code>, <code>undefined</code>, <code>false</code>, <code>0</code>, <code>""</code>, and <code>NaN</code> from the truthy branch. Useful for optional values — but be careful with <code>0</code> and empty string which are valid values you might want to keep.</div>
        </div>
        <div class="two-col">
          <div>
            <div class="col-label">Removing nullish values</div>
            <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
            <pre><span class="kw">function</span> greet(name: <span class="typ">string</span> | <span class="kw">null</span> | <span class="kw">undefined</span>) {
  <span class="kw">if</span> (name) {
    <span class="cmt">// name: string — null and undefined removed</span>
    console.log(<span class="str">"Hello, "</span> + name.toUpperCase());
  } <span class="kw">else</span> {
    <span class="cmt">// name: string | null | undefined
    // "" (empty string) also lands here!</span>
    console.log(<span class="str">"Hello, stranger"</span>);
  }
}</pre></div>
          </div>
          <div>
            <div class="col-label">The 0 and "" trap</div>
            <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
            <pre><span class="kw">function</span> display(count: <span class="typ">number</span> | <span class="kw">undefined</span>) {
  <span class="kw">if</span> (count) {
    <span class="cmt">// 0 is falsy — this branch skips 0!</span>
    show(count); <span class="err">// misses count === 0</span>
  }
}

<span class="cmt">// Fix: check specifically for undefined</span>
<span class="kw">function</span> display2(count: <span class="typ">number</span> | <span class="kw">undefined</span>) {
  <span class="kw">if</span> (count !== <span class="kw">undefined</span>) {
    show(count); <span class="ok">// &#10003; 0 is now included</span>
  }
}</pre></div>
          </div>
        </div>

        <div class="section-label">Double-bang narrowing (!!) with arrays</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">const</span> users = [<span class="str">"Alice"</span>, <span class="kw">null</span>, <span class="str">"Bob"</span>, <span class="kw">undefined</span>, <span class="str">"Carol"</span>];
<span class="cmt">// users: (string | null | undefined)[]</span>

<span class="cmt">// .filter(Boolean) removes falsy values
// but TS doesn\'t narrow the type automatically:</span>
<span class="kw">const</span> names1 = users.filter(Boolean);
<span class="cmt">// names1: (string | null | undefined)[] — not narrowed!</span>

<span class="cmt">// Fix: use a type predicate with filter:</span>
<span class="kw">const</span> names2 = users.filter((u): u <span class="kw">is</span> <span class="typ">string</span> => u !== <span class="kw">null</span> && u !== <span class="kw">undefined</span>);
<span class="cmt">// names2: string[] &#10003; properly narrowed</span></pre></div>
      </div>

      <!-- EQUALITY -->
      <div class="st-pane" id="t10-equality">
        <div class="card hl-blue">
          <div class="card-title">Equality narrowing — === and !==</div>
          <div class="card-body">Direct equality checks let TypeScript narrow to exact literal types. This is the cleanest form of narrowing for discriminated unions and null/undefined checks. Always prefer <code>===</code> over <code>==</code> — loose equality has coercion quirks that confuse TypeScript\'s narrowing.</div>
        </div>
        <div class="two-col">
          <div>
            <div class="col-label">Null / undefined checks</div>
            <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
            <pre><span class="kw">function</span> process(x: <span class="typ">string</span> | <span class="kw">null</span> | <span class="kw">undefined</span>) {
  <span class="kw">if</span> (x === <span class="kw">null</span>) {
    <span class="cmt">// x: null</span>
    handleNull(); <span class="kw">return</span>;
  }
  <span class="kw">if</span> (x === <span class="kw">undefined</span>) {
    <span class="cmt">// x: undefined</span>
    handleMissing(); <span class="kw">return</span>;
  }
  <span class="cmt">// x: string — both eliminated</span>
  x.toUpperCase(); <span class="ok">// &#10003;</span>
}

<span class="cmt">// Shorthand for both at once:</span>
<span class="kw">if</span> (x == <span class="kw">null</span>) { <span class="cmt">/* null OR undefined */</span> }
<span class="kw">if</span> (x != <span class="kw">null</span>) { <span class="cmt">/* neither null nor undefined */</span> }</pre></div>
          </div>
          <div>
            <div class="col-label">Literal type narrowing</div>
            <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
            <pre><span class="kw">type</span> <span class="typ">Direction</span> = <span class="str">"north"</span> | <span class="str">"south"</span> | <span class="str">"east"</span> | <span class="str">"west"</span>;

<span class="kw">function</span> move(dir: <span class="typ">Direction</span>) {
  <span class="kw">if</span> (dir === <span class="str">"north"</span>) {
    <span class="cmt">// dir: "north"</span>
    goNorth(); <span class="kw">return</span>;
  }
  <span class="kw">if</span> (dir === <span class="str">"south"</span>) {
    <span class="cmt">// dir: "south"</span>
    goSouth(); <span class="kw">return</span>;
  }
  <span class="cmt">// dir: "east" | "west"</span>
  goHorizontal(dir);
}</pre></div>
          </div>
        </div>

        <div class="section-label">Narrowing two variables simultaneously</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">function</span> compare(a: <span class="typ">string</span> | <span class="typ">number</span>, b: <span class="typ">string</span> | <span class="typ">number</span>) {
  <span class="kw">if</span> (a === b) {
    <span class="cmt">// TypeScript narrows BOTH a and b to string | number
    // specifically: the intersection — they must be the same type
    // a: string & (string | number) = string, or
    // a: number & (string | number) = number</span>
    a.toString(); <span class="ok">// &#10003; safe on both</span>
  }
}</pre></div>
      </div>

      <!-- INSTANCEOF -->
      <div class="st-pane" id="t10-instanceof">
        <div class="card hl-blue">
          <div class="card-title">instanceof — narrowing class instances</div>
          <div class="card-body"><code>instanceof</code> checks whether an object was created by a specific constructor. TypeScript narrows to that class type in the truthy branch, giving full access to all its methods and properties.</div>
        </div>
        <div class="two-col">
          <div>
            <div class="col-label">Basic class narrowing</div>
            <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
            <pre><span class="kw">class</span> <span class="typ">Dog</span> {
  bark() { console.log(<span class="str">"woof"</span>); }
  fetch() { console.log(<span class="str">"fetching"</span>); }
}
<span class="kw">class</span> <span class="typ">Cat</span> {
  meow() { console.log(<span class="str">"meow"</span>); }
  purr()  { console.log(<span class="str">"purr"</span>); }
}

<span class="kw">function</span> speak(animal: <span class="typ">Dog</span> | <span class="typ">Cat</span>) {
  <span class="kw">if</span> (animal <span class="kw">instanceof</span> <span class="typ">Dog</span>) {
    animal.bark();  <span class="ok">// &#10003; animal: Dog</span>
    animal.fetch(); <span class="ok">// &#10003;</span>
  } <span class="kw">else</span> {
    animal.meow();  <span class="ok">// &#10003; animal: Cat</span>
    animal.purr();  <span class="ok">// &#10003;</span>
  }
}</pre></div>
          </div>
          <div>
            <div class="col-label">Error handling — most common use</div>
            <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
            <pre><span class="kw">function</span> handleError(err: <span class="typ">unknown</span>) {
  <span class="kw">if</span> (err <span class="kw">instanceof</span> <span class="typ">Error</span>) {
    <span class="cmt">// err: Error</span>
    console.log(err.message); <span class="ok">// &#10003;</span>
    console.log(err.stack);   <span class="ok">// &#10003;</span>
    <span class="kw">return</span>;
  }
  <span class="kw">if</span> (err <span class="kw">instanceof</span> <span class="typ">TypeError</span>) {
    <span class="cmt">// err: TypeError (subclass of Error)</span>
    console.log(err.name); <span class="ok">// &#10003;</span>
    <span class="kw">return</span>;
  }
  <span class="cmt">// err: unknown — unrecognised error</span>
  console.log(String(err));
}</pre></div>
          </div>
        </div>

        <div class="section-label">instanceof with custom error classes</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">class</span> <span class="typ">ValidationError</span> <span class="kw">extends</span> <span class="typ">Error</span> {
  constructor(<span class="kw">public</span> field: <span class="typ">string</span>, message: <span class="typ">string</span>) {
    <span class="kw">super</span>(message);
    <span class="kw">this</span>.name = <span class="str">"ValidationError"</span>;
  }
}
<span class="kw">class</span> <span class="typ">NetworkError</span> <span class="kw">extends</span> <span class="typ">Error</span> {
  constructor(<span class="kw">public</span> statusCode: <span class="typ">number</span>, message: <span class="typ">string</span>) {
    <span class="kw">super</span>(message);
  }
}

<span class="kw">function</span> handle(err: <span class="typ">unknown</span>) {
  <span class="kw">if</span> (err <span class="kw">instanceof</span> <span class="typ">ValidationError</span>) {
    <span class="cmt">// err: ValidationError — field is available</span>
    showFieldError(err.field, err.message); <span class="ok">// &#10003;</span>
  } <span class="kw">else if</span> (err <span class="kw">instanceof</span> <span class="typ">NetworkError</span>) {
    <span class="cmt">// err: NetworkError — statusCode available</span>
    retry(<span class="kw">err</span>.statusCode); <span class="ok">// &#10003;</span>
  }
}</pre></div>
      </div>

      <!-- IN OPERATOR -->
      <div class="st-pane" id="t10-in">
        <div class="card hl-blue">
          <div class="card-title">"in" operator — narrow by property existence</div>
          <div class="card-body">The <code>in</code> operator narrows based on whether a property exists on the object. Perfect for distinguishing union members that don\'t share a common discriminant field — and for narrowing <code>unknown</code> values safely.</div>
        </div>
        <div class="two-col">
          <div>
            <div class="col-label">Distinguishing object shapes</div>
            <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
            <pre><span class="kw">type</span> <span class="typ">Bird</span> = { fly(): <span class="typ">void</span>;  wings: <span class="typ">number</span> };
<span class="kw">type</span> <span class="typ">Fish</span> = { swim(): <span class="typ">void</span>; gills: <span class="typ">number</span> };

<span class="kw">function</span> move(animal: <span class="typ">Bird</span> | <span class="typ">Fish</span>) {
  <span class="kw">if</span> (<span class="str">"fly"</span> <span class="kw">in</span> animal) {
    <span class="cmt">// animal: Bird</span>
    animal.fly(); <span class="ok">// &#10003;</span>
  } <span class="kw">else</span> {
    <span class="cmt">// animal: Fish</span>
    animal.swim(); <span class="ok">// &#10003;</span>
  }
}</pre></div>
          </div>
          <div>
            <div class="col-label">Narrowing unknown safely</div>
            <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
            <pre><span class="kw">function</span> isError(val: <span class="typ">unknown</span>): <span class="typ">boolean</span> {
  <span class="kw">return</span> (
    <span class="kw">typeof</span> val === <span class="str">"object"</span> &&
    val !== <span class="kw">null</span>            &&
    <span class="str">"message"</span> <span class="kw">in</span> val      &&
    <span class="kw">typeof</span> val.message === <span class="str">"string"</span>
  );
}

<span class="kw">const</span> e: <span class="typ">unknown</span> = fetchError();
<span class="kw">if</span> (<span class="str">"message"</span> <span class="kw">in</span> (e <span class="kw">as</span> <span class="typ">object</span>)) {
  <span class="cmt">// e has a message property</span>
}</pre></div>
          </div>
        </div>

        <div class="section-label">Combining in with optional properties</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">interface</span> <span class="typ">Admin</span> { role: <span class="typ">string</span>; permissions: <span class="typ">string[]</span> }
<span class="kw">interface</span> <span class="typ">User</span>  { name: <span class="typ">string</span> }

<span class="kw">type</span> <span class="typ">Person</span> = <span class="typ">Admin</span> | <span class="typ">User</span>;

<span class="kw">function</span> check(person: <span class="typ">Person</span>) {
  <span class="kw">if</span> (<span class="str">"role"</span> <span class="kw">in</span> person) {
    <span class="cmt">// person: Admin</span>
    console.log(person.permissions); <span class="ok">// &#10003;</span>
  } <span class="kw">else</span> {
    <span class="cmt">// person: User</span>
    console.log(person.name); <span class="ok">// &#10003;</span>
  }
}</pre></div>
      </div>

      <!-- TYPE PREDICATES -->
      <div class="st-pane" id="t10-predicates">
        <div class="card hl-purple">
          <div class="card-title">Type predicates — <code>val is Type</code></div>
          <div class="card-body">A type predicate is a function whose return type annotation is <code>val is Type</code>. When it returns <code>true</code>, TypeScript narrows <code>val</code> to <code>Type</code> in the calling scope. You write the check — TypeScript trusts and uses it for narrowing throughout the codebase.</div>
        </div>

        <div class="two-col">
          <div>
            <div class="col-label">Basic predicate</div>
            <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
            <pre><span class="cmt">// Without predicate — doesn\'t narrow:</span>
<span class="kw">function</span> checkStr(v: <span class="typ">unknown</span>): <span class="typ">boolean</span> {
  <span class="kw">return typeof</span> v === <span class="str">"string"</span>;
}
<span class="kw">if</span> (checkStr(val)) {
  val.toUpperCase(); <span class="err">// &#10007; still unknown</span>
}

<span class="cmt">// With predicate — narrows!</span>
<span class="kw">function</span> isString(v: <span class="typ">unknown</span>): v <span class="kw">is</span> <span class="typ">string</span> {
  <span class="kw">return typeof</span> v === <span class="str">"string"</span>;
}
<span class="kw">if</span> (isString(val)) {
  val.toUpperCase(); <span class="ok">// &#10003; val: string</span>
}</pre></div>
          </div>
          <div>
            <div class="col-label">Validating API responses</div>
            <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
            <pre><span class="kw">interface</span> <span class="typ">User</span> { name: <span class="typ">string</span>; age: <span class="typ">number</span> }

<span class="kw">function</span> isUser(val: <span class="typ">unknown</span>): val <span class="kw">is</span> <span class="typ">User</span> {
  <span class="kw">return</span> (
    <span class="kw">typeof</span> val === <span class="str">"object"</span> &&
    val !== <span class="kw">null</span>            &&
    <span class="str">"name"</span> <span class="kw">in</span> val          &&
    <span class="str">"age"</span>  <span class="kw">in</span> val          &&
    <span class="kw">typeof</span> (val <span class="kw">as</span> <span class="typ">any</span>).name === <span class="str">"string"</span> &&
    <span class="kw">typeof</span> (val <span class="kw">as</span> <span class="typ">any</span>).age  === <span class="str">"number"</span>
  );
}

<span class="kw">const</span> data: <span class="typ">unknown</span> = <span class="kw">await</span> fetch(<span class="str">"/api/user"</span>).then(r => r.json());
<span class="kw">if</span> (isUser(data)) {
  console.log(data.name); <span class="ok">// &#10003; data: User</span>
}</pre></div>
          </div>
        </div>

        <div class="section-label">Predicate with array filter — very common pattern</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">const</span> items: (<span class="typ">string</span> | <span class="kw">null</span> | <span class="kw">undefined</span>)[] = [<span class="str">"a"</span>, <span class="kw">null</span>, <span class="str">"b"</span>, <span class="kw">undefined</span>, <span class="str">"c"</span>];

<span class="cmt">// filter(Boolean) doesn\'t narrow — type stays polluted:</span>
<span class="kw">const</span> a = items.filter(Boolean);
<span class="cmt">// a: (string | null | undefined)[]  &#10007;</span>

<span class="cmt">// Predicate narrows correctly:</span>
<span class="kw">function</span> notNullish&lt;T&gt;(val: T | <span class="kw">null</span> | <span class="kw">undefined</span>): val <span class="kw">is</span> T {
  <span class="kw">return</span> val !== <span class="kw">null</span> && val !== <span class="kw">undefined</span>;
}
<span class="kw">const</span> b = items.filter(notNullish);
<span class="cmt">// b: string[]  &#10003;</span>

<span class="cmt">// Or inline arrow predicate:</span>
<span class="kw">const</span> c = items.filter((x): x <span class="kw">is</span> <span class="typ">string</span> => x !== <span class="kw">null</span> && x !== <span class="kw">undefined</span>);
<span class="cmt">// c: string[]  &#10003;</span></pre></div>

        <div class="card" style="border-color:rgba(251,191,36,.25);background:var(--amber-bg);margin-top:10px;">
          <div class="card-title">&#9888;&#65039; You own the predicate's correctness</div>
          <div class="card-body">TypeScript trusts your predicate completely. A lying predicate narrows incorrectly and causes silent runtime errors. Always make the runtime check thorough and match what you claim in the return type.</div>
        </div>
      </div>

      <!-- EXHAUSTIVE CHECKS -->
      <div class="st-pane" id="t10-exhaustive">
        <div class="card hl-purple">
          <div class="card-title">Exhaustive checking — the never trick</div>
          <div class="card-body">Assign the remaining narrowed value to <code>never</code> in the default branch of a switch. When all union members are handled, TypeScript knows the value is <code>never</code> there — so the assignment compiles. Add a new member without handling it and TypeScript errors immediately. Bugs become compile errors.</div>
        </div>

        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">function</span> assertNever(x: <span class="typ">never</span>): <span class="typ">never</span> {
  <span class="kw">throw new</span> Error(<span class="str">"Unhandled case: "</span> + JSON.stringify(x));
}

<span class="kw">type</span> <span class="typ">Shape</span> =
  | { kind: <span class="str">"circle"</span>;    radius: <span class="typ">number</span> }
  | { kind: <span class="str">"square"</span>;    side:   <span class="typ">number</span> }
  | { kind: <span class="str">"triangle"</span>;  base:   <span class="typ">number</span>; height: <span class="typ">number</span> };

<span class="kw">function</span> area(s: <span class="typ">Shape</span>): <span class="typ">number</span> {
  <span class="kw">switch</span> (s.kind) {
    <span class="kw">case</span> <span class="str">"circle"</span>:
      <span class="kw">return</span> Math.PI * s.radius ** <span class="num">2</span>;
    <span class="kw">case</span> <span class="str">"square"</span>:
      <span class="kw">return</span> s.side ** <span class="num">2</span>;
    <span class="kw">case</span> <span class="str">"triangle"</span>:
      <span class="kw">return</span> <span class="num">0.5</span> * s.base * s.height;
    <span class="kw">default</span>:
      <span class="kw">return</span> assertNever(s);
      <span class="cmt">// s: never — all cases handled &#10003;
      // Add "pentagon" to Shape → error here immediately</span>
  }
}</pre></div>

        <div class="section-label">Narrowing cheat sheet — all techniques</div>
        <table class="compare-table">
          <tr><th>Technique</th><th>Use when</th><th>Example</th></tr>
          <tr><td>typeof</td><td>Primitive types</td><td><code>typeof x === "string"</code></td></tr>
          <tr><td>Truthiness</td><td>Removing null/undefined</td><td><code>if (x) { ... }</code></td></tr>
          <tr><td>Equality (===)</td><td>Literal values or null</td><td><code>x === null</code>, <code>x === "up"</code></td></tr>
          <tr><td>instanceof</td><td>Class instances</td><td><code>x instanceof Error</code></td></tr>
          <tr><td>in operator</td><td>Property presence</td><td><code>"fly" in animal</code></td></tr>
          <tr><td>Type predicate</td><td>Reusable custom validation</td><td><code>isUser(x)</code> → <code>x is User</code></td></tr>
          <tr><td>Discriminant field</td><td>Union variants</td><td><code>switch (shape.kind)</code></td></tr>
          <tr><td>assertNever</td><td>Exhaustiveness guarantee</td><td><code>default: assertNever(x)</code></td></tr>
        </table>

        <div class="section-label">Control flow analysis — TypeScript tracks narrowing across branches</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">function</span> process(x: <span class="typ">string</span> | <span class="typ">number</span> | <span class="typ">boolean</span> | <span class="kw">null</span>) {
  <span class="cmt">// x: string | number | boolean | null</span>

  <span class="kw">if</span> (x === <span class="kw">null</span>) <span class="kw">return</span>;
  <span class="cmt">// x: string | number | boolean</span>

  <span class="kw">if</span> (<span class="kw">typeof</span> x === <span class="str">"boolean"</span>) <span class="kw">return</span>;
  <span class="cmt">// x: string | number</span>

  <span class="kw">if</span> (<span class="kw">typeof</span> x === <span class="str">"string"</span>) {
    x.toUpperCase(); <span class="ok">// x: string &#10003;</span>
    <span class="kw">return</span>;
  }
  <span class="cmt">// x: number — the only type left</span>
  x.toFixed(<span class="num">2</span>); <span class="ok">// &#10003;</span>
}</pre></div>
      </div>

  /* ══ TOPIC 11 — TYPING FUNCTIONS ══ */
  {
    num: '11', tag: 'Typing Functions', title: 'Typing <em>Functions</em>',
    desc: 'In a Node.js backend every controller, service, middleware and utility is a function. Typing them precisely is the single highest-leverage thing you can do — it makes every call site safe and self-documenting.',
    content: `
      <div class="card hl-purple">
        <div class="card-title">&#128161; Why function typing matters most at the boundary</div>
        <div class="card-body">Functions are the <em>boundaries</em> of your system — where data enters, transforms, and exits. Annotating parameters and return types at those boundaries lets TypeScript verify every call site automatically. The interior of the function is then inferred for free.</div>
      </div>

      <div class="st-bar">
        <button class="st-btn on" onclick="stTab('t11','basics')">basics</button>
