  /* ══ TOPIC 15 — ERROR HANDLING WITH TYPES ══ */
  {
    num: '15', tag: 'Error Handling', title: 'Error Handling <em>with Types</em>',
    desc: 'TypeScript makes error handling explicit — instead of hoping callers remember to catch exceptions, you can encode errors into the return type itself. This is the final piece of a fully type-safe Node.js backend.',
    content: `
      <div class="card hl-purple">
        <div class="card-title">&#128161; The problem with thrown exceptions</div>
        <div class="card-body">In JavaScript, any function can throw at any time — and the type system gives you <strong>zero indication</strong>. There is no <code>throws</code> clause, no checked exceptions. A function typed as <code>Promise&lt;User&gt;</code> can throw a network error, a validation error, or a database constraint violation — and TypeScript will not warn the caller. The solution is to make errors part of the return type.</div>
      </div>

      <div class="st-bar">
        <button class="st-btn on" onclick="stTab('t15','unknown')">catch unknown</button>
        <button class="st-btn"    onclick="stTab('t15','custom')">custom errors</button>
        <button class="st-btn"    onclick="stTab('t15','result')">Result type</button>
        <button class="st-btn"    onclick="stTab('t15','discriminated15')">discriminated errors</button>
        <button class="st-btn"    onclick="stTab('t15','http')">HTTP error layer</button>
        <button class="st-btn"    onclick="stTab('t15','middleware15')">error middleware</button>
        <button class="st-btn"    onclick="stTab('t15','quiz15')">quiz</button>
      </div>

      <!-- CATCH UNKNOWN -->
      <div class="st-pane on" id="t15-unknown">
        <div class="card hl-blue">
          <div class="card-title">TypeScript 4.0+ — caught errors are <code>unknown</code>, not <code>any</code></div>
          <div class="card-body">With <code>useUnknownInCatchVariables: true</code> (included in <code>strict</code> mode since TS 4.4), the <code>e</code> in a <code>catch</code> block is typed as <code>unknown</code> — not <code>any</code>. This forces you to narrow before using it. It prevents the silent bug of treating any thrown value as an <code>Error</code> instance.</div>
        </div>

        <div class="section-label">The wrong way — assuming e is an Error</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="cmt">// &#10060; Wrong — e could be anything</span>
<span class="kw">try</span> {
  <span class="kw">await</span> db.connect();
} <span class="kw">catch</span> (e) {
  <span class="cmt">// With strict mode, e: unknown</span>
  console.error(e.message);    <span class="err">// &#10007; Object is of type unknown</span>
  console.error(e.stack);      <span class="err">// &#10007;</span>

  <span class="cmt">// Thrown values can be anything:</span>
  <span class="kw">throw</span> <span class="str">"oops"</span>;                <span class="cmt">// a string</span>
  <span class="kw">throw</span> <span class="num">404</span>;                   <span class="cmt">// a number</span>
  <span class="kw">throw</span> { code: <span class="str">"DB_DOWN"</span> };  <span class="cmt">// a plain object</span>
  <span class="kw">throw</span> <span class="kw">new</span> <span class="typ">Error</span>(<span class="str">"failed"</span>);  <span class="cmt">// an Error — but not guaranteed</span>
}</pre></div>

        <div class="section-label">The right way — narrow before using</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="cmt">// &#10003; Narrow e before accessing its properties</span>
<span class="kw">try</span> {
  <span class="kw">await</span> db.connect();
} <span class="kw">catch</span> (e) {
  <span class="kw">if</span> (e <span class="kw">instanceof</span> <span class="typ">Error</span>) {
    console.error(e.message); <span class="ok">// &#10003; e: Error</span>
    console.error(e.stack);   <span class="ok">// &#10003;</span>
  } <span class="kw">else</span> {
    console.error(<span class="str">"Unknown error:"</span>, String(e));
  }
}

<span class="cmt">// Utility function — normalise any thrown value to Error:</span>
<span class="kw">function</span> toError(e: <span class="typ">unknown</span>): <span class="typ">Error</span> {
  <span class="kw">if</span> (e <span class="kw">instanceof</span> <span class="typ">Error</span>) <span class="kw">return</span> e;
  <span class="kw">if</span> (<span class="kw">typeof</span> e === <span class="str">"string"</span>)  <span class="kw">return</span> <span class="kw">new</span> <span class="typ">Error</span>(e);
  <span class="kw">return</span> <span class="kw">new</span> <span class="typ">Error</span>(JSON.stringify(e));
}

<span class="cmt">// Usage:</span>
<span class="kw">try</span> {
  <span class="kw">await</span> riskyOperation();
} <span class="kw">catch</span> (e) {
  <span class="kw">const</span> err = toError(e);
  logger.error(err.message, { stack: err.stack });
}</pre></div>
      </div>

      <!-- CUSTOM ERRORS -->
      <div class="st-pane" id="t15-custom">
        <div class="card hl-blue">
          <div class="card-title">Custom error classes — typed, structured, instanceof-narrowable</div>
          <div class="card-body">Extending <code>Error</code> lets you create domain-specific error types that carry extra context (HTTP status, error code, metadata) and narrow cleanly with <code>instanceof</code>. Every layer of your backend can throw and catch specific error types rather than generic <code>Error</code> objects.</div>
        </div>

        <div class="section-label">Base application error</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="cmt">// Base — all app errors extend this</span>
<span class="kw">class</span> <span class="typ">AppError</span> <span class="kw">extends</span> <span class="typ">Error</span> {
  <span class="kw">constructor</span>(
    message: <span class="typ">string</span>,
    <span class="kw">public readonly</span> code:       <span class="typ">string</span>,
    <span class="kw">public readonly</span> statusCode: <span class="typ">number</span> = <span class="num">500</span>,
    <span class="kw">public readonly</span> meta?:      <span class="typ">Record</span>&lt;<span class="typ">string</span>, <span class="typ">unknown</span>&gt;
  ) {
    <span class="kw">super</span>(message);
    <span class="kw">this</span>.name = <span class="kw">this</span>.constructor.name;
    <span class="cmt">// Fix prototype chain for instanceof to work correctly:</span>
    Object.setPrototypeOf(<span class="kw">this</span>, <span class="kw">new</span>.target.prototype);
  }
}

<span class="cmt">// Domain errors — specific types with HTTP status baked in</span>
<span class="kw">class</span> <span class="typ">NotFoundError</span> <span class="kw">extends</span> <span class="typ">AppError</span> {
  <span class="kw">constructor</span>(resource: <span class="typ">string</span>, id: <span class="typ">string</span> | <span class="typ">number</span>) {
    <span class="kw">super</span>(<span class="str">\`\${resource} \${id} not found\`</span>, <span class="str">"NOT_FOUND"</span>, <span class="num">404</span>);
  }
}

<span class="kw">class</span> <span class="typ">ValidationError</span> <span class="kw">extends</span> <span class="typ">AppError</span> {
  <span class="kw">constructor</span>(
    message: <span class="typ">string</span>,
    <span class="kw">public readonly</span> fields: <span class="typ">Record</span>&lt;<span class="typ">string</span>, <span class="typ">string</span>[]&gt;
  ) {
    <span class="kw">super</span>(message, <span class="str">"VALIDATION_ERROR"</span>, <span class="num">422</span>, { fields });
  }
}

<span class="kw">class</span> <span class="typ">ConflictError</span> <span class="kw">extends</span> <span class="typ">AppError</span> {
  <span class="kw">constructor</span>(message: <span class="typ">string</span>) {
    <span class="kw">super</span>(message, <span class="str">"CONFLICT"</span>, <span class="num">409</span>);
  }
}

<span class="kw">class</span> <span class="typ">UnauthorizedError</span> <span class="kw">extends</span> <span class="typ">AppError</span> {
  <span class="kw">constructor</span>(message = <span class="str">"Unauthorized"</span>) {
    <span class="kw">super</span>(message, <span class="str">"UNAUTHORIZED"</span>, <span class="num">401</span>);
  }
}</pre></div>

        <div class="section-label">Throwing and catching typed errors</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="cmt">// Service throws typed errors:</span>
<span class="kw">async function</span> createUser(dto: <span class="typ">CreateUserDto</span>): <span class="typ">Promise</span>&lt;<span class="typ">User</span>&gt; {
  <span class="kw">const</span> existing = <span class="kw">await</span> repo.findByEmail(dto.email);
  <span class="kw">if</span> (existing) <span class="kw">throw new</span> <span class="typ">ConflictError</span>(<span class="str">"Email already in use"</span>);

  <span class="kw">if</span> (dto.password.length &lt; <span class="num">8</span>) {
    <span class="kw">throw new</span> <span class="typ">ValidationError</span>(<span class="str">"Invalid input"</span>, {
      password: [<span class="str">"Must be at least 8 characters"</span>]
    });
  }
  <span class="kw">return</span> repo.create(dto);
}

<span class="cmt">// Controller catches and narrows:</span>
<span class="kw">try</span> {
  <span class="kw">const</span> user = <span class="kw">await</span> userService.create(req.body);
  res.status(<span class="num">201</span>).json(user);
} <span class="kw">catch</span> (e) {
  <span class="kw">if</span> (e <span class="kw">instanceof</span> <span class="typ">ValidationError</span>) {
    res.status(<span class="num">422</span>).json({ error: e.message, fields: e.fields }); <span class="kw">return</span>;
  }
  <span class="kw">if</span> (e <span class="kw">instanceof</span> <span class="typ">ConflictError</span>) {
    res.status(<span class="num">409</span>).json({ error: e.message }); <span class="kw">return</span>;
  }
  <span class="kw">throw</span> e; <span class="cmt">// re-throw unknown errors to global handler</span>
}</pre></div>
      </div>

      <!-- RESULT TYPE -->
      <div class="st-pane" id="t15-result">
        <div class="card hl-purple">
          <div class="card-title">Result&lt;T, E&gt; — encode errors in the return type</div>
          <div class="card-body">Instead of throwing, return a <code>Result</code> that is either a success value or a typed error. The caller <strong>cannot ignore the error case</strong> — they must handle it to access the value. This eliminates the "I forgot to try-catch" class of bugs entirely.</div>
        </div>

        <div class="section-label">Defining the Result type</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="cmt">// The core Result type — a discriminated union</span>
<span class="kw">type</span> <span class="typ">Ok</span>&lt;T&gt;  = { ok: <span class="kw">true</span>;  value: T };
<span class="kw">type</span> <span class="typ">Err</span>&lt;E&gt; = { ok: <span class="kw">false</span>; error: E };
<span class="kw">type</span> <span class="typ">Result</span>&lt;T, E = <span class="typ">AppError</span>&gt; = <span class="typ">Ok</span>&lt;T&gt; | <span class="typ">Err</span>&lt;E&gt;;

<span class="cmt">// Helper constructors for ergonomics:</span>
<span class="kw">const</span> ok  = &lt;T&gt;(value: T): <span class="typ">Ok</span>&lt;T&gt;  => ({ ok: <span class="kw">true</span>,  value });
<span class="kw">const</span> err = &lt;E&gt;(error: E): <span class="typ">Err</span>&lt;E&gt; => ({ ok: <span class="kw">false</span>, error });

<span class="cmt">// Functions that return Result — no throws:</span>
<span class="kw">async function</span> createUser(
  dto: <span class="typ">CreateUserDto</span>
): <span class="typ">Promise</span>&lt;<span class="typ">Result</span>&lt;<span class="typ">User</span>, <span class="typ">ConflictError</span> | <span class="typ">ValidationError</span>&gt;&gt; {
  <span class="kw">const</span> existing = <span class="kw">await</span> repo.findByEmail(dto.email);
  <span class="kw">if</span> (existing) <span class="kw">return</span> err(<span class="kw">new</span> <span class="typ">ConflictError</span>(<span class="str">"Email already in use"</span>));

  <span class="kw">if</span> (dto.password.length &lt; <span class="num">8</span>)
    <span class="kw">return</span> err(<span class="kw">new</span> <span class="typ">ValidationError</span>(<span class="str">"Invalid input"</span>, {
      password: [<span class="str">"Min 8 characters"</span>]
    }));

  <span class="kw">const</span> user = <span class="kw">await</span> repo.create(dto);
  <span class="kw">return</span> ok(user);
}

<span class="cmt">// Caller is forced to check ok before accessing value:</span>
<span class="kw">const</span> result = <span class="kw">await</span> createUser(dto);
<span class="kw">if</span> (!result.ok) {
  <span class="cmt">// result.error: ConflictError | ValidationError</span>
  <span class="kw">if</span> (result.error <span class="kw">instanceof</span> <span class="typ">ConflictError</span>) {
    res.status(<span class="num">409</span>).json({ error: result.error.message }); <span class="kw">return</span>;
  }
  res.status(<span class="num">422</span>).json({ error: result.error.message,
                            fields: (result.error <span class="kw">as</span> <span class="typ">ValidationError</span>).fields });
  <span class="kw">return</span>;
}
<span class="cmt">// result.value: User — only accessible in the ok branch</span>
res.status(<span class="num">201</span>).json(result.value);</pre></div>
      </div>

      <!-- DISCRIMINATED ERRORS -->
      <div class="st-pane" id="t15-discriminated15">
        <div class="card hl-purple">
          <div class="card-title">Discriminated error unions — exhaustive, precise, zero instanceof</div>
          <div class="card-body">Instead of class hierarchy + instanceof, model errors as a discriminated union. Each error variant has a unique <code>type</code> literal. TypeScript narrows automatically in switch statements — and forces you to handle every case.</div>
        </div>

        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="cmt">// Error union — each variant fully typed</span>
<span class="kw">type</span> <span class="typ">UserError</span> =
  | { type: <span class="str">"NOT_FOUND"</span>;     id: <span class="typ">number</span>                           }
  | { type: <span class="str">"CONFLICT"</span>;      field: <span class="typ">string</span>; value: <span class="typ">string</span>          }
  | { type: <span class="str">"VALIDATION"</span>;    fields: <span class="typ">Record</span>&lt;<span class="typ">string</span>, <span class="typ">string</span>[]&gt;      }
  | { type: <span class="str">"UNAUTHORIZED"</span>;  reason: <span class="typ">string</span>                         }
  | { type: <span class="str">"RATE_LIMITED"</span>;  retryAfter: <span class="typ">number</span>                    };

<span class="kw">type</span> <span class="typ">UserResult</span>&lt;T&gt; = <span class="typ">Result</span>&lt;T, <span class="typ">UserError</span>&gt;;

<span class="cmt">// Function returning a discriminated error:</span>
<span class="kw">async function</span> getUser(id: <span class="typ">number</span>): <span class="typ">Promise</span>&lt;<span class="typ">UserResult</span>&lt;<span class="typ">User</span>&gt;&gt; {
  <span class="kw">const</span> user = <span class="kw">await</span> repo.findById(id);
  <span class="kw">if</span> (!user) <span class="kw">return</span> err({ type: <span class="str">"NOT_FOUND"</span>, id });
  <span class="kw">return</span> ok(user);
}

<span class="cmt">// Exhaustive error handling with switch:</span>
<span class="kw">function</span> handleUserError(error: <span class="typ">UserError</span>, res: Response): <span class="typ">void</span> {
  <span class="kw">switch</span> (error.type) {
    <span class="kw">case</span> <span class="str">"NOT_FOUND"</span>:
      res.status(<span class="num">404</span>).json({ error: <span class="str">\`User \${error.id} not found\`</span> }); <span class="kw">return</span>;
    <span class="kw">case</span> <span class="str">"CONFLICT"</span>:
      res.status(<span class="num">409</span>).json({ error: <span class="str">\`\${error.field} already taken\`</span> }); <span class="kw">return</span>;
    <span class="kw">case</span> <span class="str">"VALIDATION"</span>:
      res.status(<span class="num">422</span>).json({ error: <span class="str">"Validation failed"</span>, fields: error.fields }); <span class="kw">return</span>;
    <span class="kw">case</span> <span class="str">"UNAUTHORIZED"</span>:
      res.status(<span class="num">401</span>).json({ error: error.reason }); <span class="kw">return</span>;
    <span class="kw">case</span> <span class="str">"RATE_LIMITED"</span>:
      res.status(<span class="num">429</span>)
         .set(<span class="str">"Retry-After"</span>, String(error.retryAfter))
         .json({ error: <span class="str">"Too many requests"</span> }); <span class="kw">return</span>;
    <span class="kw">default</span>:
      assertNever(error); <span class="cmt">// &#10003; compile error if new variant unhandled</span>
  }
}</pre></div>
      </div>

      <!-- HTTP ERROR LAYER -->
      <div class="st-pane" id="t15-http">
        <div class="section-label">HTTP-aware error layer — map domain errors to HTTP responses</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="cmt">// Typed HTTP error response shape</span>
<span class="kw">interface</span> <span class="typ">ErrorResponse</span> {
  error:    <span class="typ">string</span>;
  code:     <span class="typ">string</span>;
  details?: <span class="typ">unknown</span>;
  traceId:  <span class="typ">string</span>;
}

<span class="cmt">// Map AppError subclasses to HTTP responses:</span>
<span class="kw">function</span> toHttpError(e: <span class="typ">unknown</span>, traceId: <span class="typ">string</span>): {
  status: <span class="typ">number</span>;
  body:   <span class="typ">ErrorResponse</span>;
} {
  <span class="kw">if</span> (e <span class="kw">instanceof</span> <span class="typ">ValidationError</span>) {
    <span class="kw">return</span> { status: <span class="num">422</span>, body: { error: e.message, code: e.code, details: e.fields, traceId } };
  }
  <span class="kw">if</span> (e <span class="kw">instanceof</span> <span class="typ">NotFoundError</span>) {
    <span class="kw">return</span> { status: <span class="num">404</span>, body: { error: e.message, code: e.code, traceId } };
  }
  <span class="kw">if</span> (e <span class="kw">instanceof</span> <span class="typ">ConflictError</span>) {
    <span class="kw">return</span> { status: <span class="num">409</span>, body: { error: e.message, code: e.code, traceId } };
  }
  <span class="kw">if</span> (e <span class="kw">instanceof</span> <span class="typ">UnauthorizedError</span>) {
    <span class="kw">return</span> { status: <span class="num">401</span>, body: { error: e.message, code: e.code, traceId } };
  }
  <span class="kw">if</span> (e <span class="kw">instanceof</span> <span class="typ">AppError</span>) {
    <span class="kw">return</span> { status: e.statusCode, body: { error: e.message, code: e.code, traceId } };
  }
  <span class="cmt">// Unknown error — do not expose internals</span>
  <span class="kw">return</span> { status: <span class="num">500</span>, body: { error: <span class="str">"Internal server error"</span>, code: <span class="str">"INTERNAL"</span>, traceId } };
}</pre></div>
      </div>

      <!-- ERROR MIDDLEWARE -->
      <div class="st-pane" id="t15-middleware15">
        <div class="card hl-blue">
          <div class="card-title">Express global error middleware — typed catch-all</div>
          <div class="card-body">Express error middleware has a 4-parameter signature <code>(err, req, res, next)</code>. By centralising all error-to-HTTP mapping here, controllers can simply throw typed errors and trust that the middleware handles the response — no try-catch needed in every route handler.</div>
        </div>

        <div class="section-label">Typed error middleware</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">import</span> { ErrorRequestHandler } <span class="kw">from</span> <span class="str">"express"</span>;

<span class="cmt">// Must have EXACTLY 4 parameters for Express to recognise as error handler</span>
<span class="kw">export const</span> errorHandler: <span class="typ">ErrorRequestHandler</span> = (
  err: <span class="typ">unknown</span>,
  req: Request,
  res: Response,
  _next: NextFunction   <span class="cmt">// must be present even if unused</span>
) => {
  <span class="kw">const</span> traceId = req.headers[<span class="str">"x-trace-id"</span>] <span class="kw">as</span> <span class="typ">string</span> ?? crypto.randomUUID();
  <span class="kw">const</span> { status, body } = toHttpError(err, traceId);

  <span class="cmt">// Log all 500 errors, not client errors</span>
  <span class="kw">if</span> (status >= <span class="num">500</span>) {
    logger.error(<span class="str">"Unhandled error"</span>, { err, traceId, path: req.path });
  }

  res.status(status).json(body);
};

<span class="cmt">// Register LAST in Express — after all routes:</span>
app.use(router);
app.use(errorHandler); <span class="cmt">// &#10003; catches anything thrown in routes</span></pre></div>

        <div class="section-label">Async wrapper — automatically pass errors to next()</div>
        <div class="code-block"><div class="code-header"><div class="code-dots"><span></span><span></span><span></span></div><span class="code-lang">typescript</span></div>
        <pre><span class="kw">type</span> <span class="typ">AsyncHandler</span> = (
  req: Request, res: Response, next: NextFunction
) => <span class="typ">Promise</span>&lt;<span class="typ">void</span>&gt;;

<span class="cmt">// Wraps async handlers — passes any rejection to next(err)</span>
<span class="kw">function</span> asyncHandler(fn: <span class="typ">AsyncHandler</span>) {
  <span class="kw">return</span> (req: Request, res: Response, next: NextFunction): <span class="typ">void</span> => {
    fn(req, res, next).catch(next);
  };
}

<span class="cmt">// Now controllers throw freely — no try-catch needed:</span>
router.post(<span class="str">"/users"</span>, asyncHandler(<span class="kw">async</span> (req, res) => {
  <span class="kw">const</span> user = <span class="kw">await</span> userService.create(req.body);
  <span class="cmt">// If create() throws, asyncHandler passes it to errorHandler</span>
  res.status(<span class="num">201</span>).json(user);
}));

router.get(<span class="str">"/users/:id"</span>, asyncHandler(<span class="kw">async</span> (req, res) => {
  <span class="kw">const</span> user = <span class="kw">await</span> userService.findOrFail(Number(req.params.id));
  <span class="cmt">// findOrFail throws NotFoundError if missing — handled globally</span>
  res.json(user);
}));</pre></div>

        <div class="section-label">Complete error handling architecture</div>
        <div class="cflow">
          <div class="crow">
            <div class="cn"><div class="cnt" style="color:var(--blue);">Repository layer</div><div class="cnb">Throws database errors — wraps Prisma/pg errors into <code>AppError</code> subclasses</div></div>
            <div class="carr">&#8595;</div>
          </div>
          <div class="crow">
            <div class="cn"><div class="cnt" style="color:var(--blue);">Service layer</div><div class="cnb">Throws domain errors — <code>NotFoundError</code>, <code>ConflictError</code>, <code>ValidationError</code></div></div>
            <div class="carr">&#8595;</div>
          </div>
          <div class="crow">
            <div class="cn"><div class="cnt" style="color:var(--blue);">Controller layer</div><div class="cnb">No try-catch — wrapped in <code>asyncHandler</code>, errors pass to next()</div></div>
            <div class="carr">&#8595;</div>
          </div>
          <div class="crow">
            <div class="cn" style="border-color:rgba(74,222,144,.25);background:var(--green-bg);"><div class="cnt" style="color:var(--green);">Global error middleware</div><div class="cnb">Maps any AppError to HTTP response. Logs 500s. Never exposes stack traces to clients.</div></div>
            <div class="carr"></div>
          </div>
        </div>
      </div>

      <!-- QUIZ -->
      <div class="st-pane" id="t15-quiz15">
        <div id="quiz15-out"></div>
      </div>
    `
  }];

/* ══════════════════════════════════════════════
   QUIZ DATA
══════════════════════════════════════════════ */
const quizData = [
  { q: "What does TypeScript compile to?", opts: ["Its own runtime format", "Plain JavaScript", "WebAssembly", "Bytecode"], ans: 1, exp: "TypeScript compiles to plain JavaScript. Types are completely erased — no TypeScript-specific code exists at runtime." },

  { q: "What type does TypeScript infer for: const x = []?", opts: ["any[]", "unknown[]", "never[]", "object[]"], ans: 2, exp: "An empty array with no annotation is inferred as never[] — you can\'t push anything. Always annotate empty arrays." },
  { q: "Which is the type-safe version of 'any'?", opts: ["void", "object", "unknown", "undefined"], ans: 2, exp: "unknown accepts any value but forces you to narrow the type before using it — unlike any which bypasses all checks." },
  { q: "What is the return type of a function that always throws?", opts: ["void", "undefined", "null", "never"], ans: 3, exp: "never is the return type of functions that never complete normally — they always throw or run forever." }
,
  { q: "Which of these can ONLY be written with <code>type</code>, not <code>interface</code>?",
    opts: ["An object with optional properties", "A union of string literals", "A shape a class can implement", "An object extending another"],
    ans: 1, exp: "Unions (A | B) are only expressible with type aliases. interface cannot describe 'one of these shapes' — it can only describe a single fixed object shape." },
  { q: "What happens if you declare the same interface name twice in TypeScript?",
    opts: ["TypeScript throws a duplicate error", "The second overwrites the first", "TypeScript merges both automatically", "Only the first is used"],
    ans: 2, exp: "Declaration merging: TypeScript silently combines multiple interface declarations with the same name into one. Type aliases produce a duplicate identifier error instead." },
  { q: "When does <code>interface extends</code> catch a property conflict vs <code>type</code> intersection?",
    opts: ["Both catch it at runtime", "interface extends catches it at the declaration site; type intersection creates a never property silently", "type intersection catches it earlier", "Neither catches it — it only fails at assignment"],
    ans: 1, exp: "interface extends errors immediately when a conflicting property type is detected. Type intersection silently produces a never property that only errors when you try to assign a value — making the bug harder to find." },
  { q: "What type does <code>email?</code> have inside a function that receives a <code>User</code> with <code>email?: string</code>?",
    opts: ["string", "string | null", "string | undefined", "optional"],

  { q: "Which operator returns the right-hand value ONLY when the left is null or undefined (not 0 or '')?",

function stTab(group, id) {
  var page = document.querySelector('.topic-page.active');
  if (!page) return;
  page.querySelectorAll('[id^="' + group + '-"]').forEach(function(p) { p.classList.remove('on'); });
  page.querySelectorAll('.st-btn').forEach(function(b) {
    b.classList.remove('on');
    var oc = b.getAttribute('onclick') || '';
    if (oc.indexOf("'" + id + "'") !== -1) b.classList.add('on');
  });
  var pane = document.getElementById(group + '-' + id);
  if (pane) pane.classList.add('on');
  if (id === 'live') setLive06(0);
  if (id === 'quiz08') setTimeout(buildQuiz08, 60);
  if (id === 'quiz09') setTimeout(buildQuiz09, 60);
  if (id === 'quiz10') setTimeout(buildQuiz10, 60);
  if (id === 'quiz11') setTimeout(buildQuiz11, 60);
  if (id === 'quiz12') setTimeout(buildQuiz12, 60);
  if (id === 'quiz13') setTimeout(buildQuiz13, 60);
  if (id === 'quiz14') setTimeout(buildQuiz14, 60);
  if (id === 'quiz15') setTimeout(buildQuiz15, 60);
}

function buildQuiz() {
  const el = document.getElementById('quiz');
  if (!el) return;
  el.innerHTML = quizData.map((q, qi) => `
    <div class="quiz-q">
      <p>${qi + 1}. ${q.q}</p>
      <div class="quiz-opts">
        ${q.opts.map((o, oi) => `
          <button class="quiz-opt" id="q${qi}o${oi}" onclick="answer(${qi},${oi})">${o}</button>
        `).join('')}
      </div>
      <div class="quiz-feedback" id="qf${qi}"></div>
    </div>`).join('');
}

function answer(qi, oi) {
  const q = quizData[qi];
  const opts = document.querySelectorAll(`#q${qi}o0, #q${qi}o1, #q${qi}o2, #q${qi}o3`);
  opts.forEach(btn => btn.disabled = true);
  opts[oi].classList.add(oi === q.ans ? 'correct' : 'wrong');
  if (oi !== q.ans) opts[q.ans].classList.add('correct');
  const fb = document.getElementById(`qf${qi}`);
  fb.textContent = (oi === q.ans ? '✓ Correct! ' : '✗ Not quite. ') + q.exp;
  fb.style.background = oi === q.ans ? 'var(--green-bg)' : 'var(--red-bg)';
  fb.style.color = oi === q.ans ? 'var(--green)' : 'var(--red)';
  fb.style.padding = '8px 12px';
  fb.style.borderRadius = '6px';
  fb.style.fontSize = '12px';
  fb.classList.add('show');
}

function goTo(i) {
  if (i < 0 || i >= topics.length) return;
  seen.add(currentTopic);
  document.querySelectorAll('.topic-page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(`page-${i}`).classList.add('active');
  document.getElementById(`nav-${i}`).classList.add('active');
  seen.forEach(s => document.getElementById(`nav-${s}`).classList.add('done'));
  currentTopic = i;
  updateProgress();
  window.scrollTo(0, 0);
  if (i === 4) setTimeout(buildQuiz, 100);
}

function updateProgress() {
  const pct = Math.round(((seen.size) / topics.length) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = `${seen.size} / ${topics.length}`;
}

function switchTab(group, id) {
  const allPanes = document.querySelectorAll(`[id^="${group}-"]`);
  const allBtns = document.querySelectorAll(`.tab-btn`);
  allPanes.forEach(p => { if(p.id.startsWith(group+'-')) p.classList.remove('active'); });

  const activePanes = document.querySelectorAll(`[id="${group}-${id}"]`);
  activePanes.forEach(p => p.classList.add('active'));

  // Update tab buttons in the currently visible page
  const page = document.querySelector('.topic-page.active');
  if (page) {
    page.querySelectorAll('.tab-btn').forEach(btn => {
      btn.classList.remove('active');
      if (btn.getAttribute('onclick') && btn.getAttribute('onclick').includes(`'${id}'`)) {
        btn.classList.add('active');
      }
    });
  }
}
